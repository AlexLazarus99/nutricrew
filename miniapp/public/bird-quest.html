/* ============================================================================
   ПТИЧКА-ЧЕМПИОН · HEALTHY BIRD QUEST
   Прогрессивная мини-игра для Telegram Mini App.
   Толстенькая птичка постепенно становится стройной, питаясь здоровой едой.
   Бесконечный полёт; новые локации открываются за пролёты (625, 875, 1125…).
   Всё рисуется процедурно через Canvas API. Никаких внешних картинок.
   ========================================================================== */

/* ----------------------------- Telegram SDK ------------------------------ */
const TG = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
let tgReady = false;
function initTelegram(){
  if(!TG) return;
  try{
    TG.ready();
    TG.expand();
    if(TG.setHeaderColor) TG.setHeaderColor('#1a2a24');
    if(TG.setBackgroundColor) TG.setBackgroundColor('#1a2a24');
    if(TG.enableClosingConfirmation) TG.enableClosingConfirmation();
    if(TG.disableVerticalSwipes) TG.disableVerticalSwipes();
    tgReady = true;
  }catch(e){ /* graceful fallback for desktop browser */ }
}
function haptic(type){
  if(!TG || !TG.HapticFeedback) return;
  try{
    if(type==='light'||type==='medium'||type==='heavy'||type==='rigid'||type==='soft')
      TG.HapticFeedback.impactOccurred(type);
    else if(type==='success'||type==='warning'||type==='error')
      TG.HapticFeedback.notificationOccurred(type);
    else if(type==='select')
      TG.HapticFeedback.selectionChanged();
  }catch(e){}
}
function tgSendScore(score, level){
  if(!TG) return;
  try{ TG.sendData(JSON.stringify({event:'game_result', score, level})); }catch(e){}
}
function notifyParent(payload){
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage(Object.assign({ source:'nutrirun' }, payload), '*');
    }
  }catch(e){}
}

/* ----------------------------- Canvas setup ------------------------------ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha:false });
let W = 0, H = 0, DPR = 1;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize,120));

/* ------------------------------- Utilities ------------------------------- */
const TAU = Math.PI*2;
const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
const lerp  = (a,b,t)=> a+(b-a)*t;
const smoothstep = (a,b,t)=>{ const x=clamp((t-a)/(b-a),0,1); return x*x*(3-2*x); };
const rand  = (a,b)=> a+Math.random()*(b-a);
const randi = (a,b)=> Math.floor(rand(a,b+1));
const easeOut = t=> 1-Math.pow(1-t,3);
const easeInOut = t=> t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

/* Typography — match NutriCrew miniapp */
const FONT_SANS = '"Plus Jakarta Sans", system-ui, -apple-system, sans-serif';
const FONT_DISPLAY = '"Fraunces", Georgia, serif';
const FONT_EPIC = '"Russo One", Impact, "Arial Black", sans-serif';
const TYPE = {
  text:'#eef5f0', muted:'#a8b8ae', soft:'rgba(238,245,240,0.78)',
  accent:'#7ec4a0', accentDim:'#9fd9b8', gold:'#e8c080', warn:'#fff59d', danger:'#ff6b6b'
};
const FONT_SCALE = 0.85;
function fontPx(px){ return Math.max(8, Math.round(px * FONT_SCALE)); }
function fontSans(px, weight){ return (weight||'500')+' '+fontPx(px)+'px '+FONT_SANS; }
function fontDisplay(px, weight){ return (weight||'600')+' '+fontPx(px)+'px '+FONT_DISPLAY; }
function fontEpic(px){ return '400 '+fontPx(px)+'px '+FONT_EPIC; }
function typeDisplay(px){ return fontDisplay(px,'600'); }
function typeTitle(px){ return fontDisplay(px,'700'); }
function typeUI(px, w){ return fontSans(px, w||'600'); }
function typeBody(px){ return fontSans(px,'500'); }
function typeCaption(px){ return fontSans(px,'500'); }
function drawTextLine(c, text, x, y, font, color, align, baseline){
  c.font = font; c.fillStyle = color;
  c.textAlign = align || 'center'; c.textBaseline = baseline || 'top';
  c.fillText(text, x, y);
}

function rr(c,x,y,w,h,r){ // rounded rect path
  r = Math.min(r, w/2, h/2);
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
}
function shade(hex, amt){ // lighten(+)/darken(-) a #rrggbb hex
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r=clamp(Math.round(r+amt),0,255);
  g=clamp(Math.round(g+amt),0,255);
  b=clamp(Math.round(b+amt),0,255);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* ----------------------------- Audio (synth) ----------------------------- */
let AC = null, muted = false;
let _noiseBuf = null;
let _flameVoice = null;
let _pipeBreakCd = 0;
function audio(){
  if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
  return AC;
}
function beep(freq, dur, type='sine', vol=0.18, slideTo=null){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  if(ac.state==='suspended') ac.resume();
  const t = ac.currentTime;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t+dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t+dur+0.02);
}
function getNoiseBuffer(ac){
  if(_noiseBuf && _noiseBuf.sampleRate === ac.sampleRate) return _noiseBuf;
  const len = Math.floor(ac.sampleRate * 2);
  _noiseBuf = ac.createBuffer(1, len, ac.sampleRate);
  const d = _noiseBuf.getChannelData(0);
  for(let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return _noiseBuf;
}
function noiseBurst(dur, vol, lowHz, highHz, when){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  if(ac.state === 'suspended') ac.resume();
  const t = when != null ? when : ac.currentTime;
  const src = ac.createBufferSource();
  src.buffer = getNoiseBuffer(ac);
  const filter = ac.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = (lowHz + highHz) * 0.5;
  filter.Q.value = clamp((lowHz + highHz) / Math.max(80, highHz - lowHz), 0.4, 2.5);
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(vol, t + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  src.connect(filter); filter.connect(gain); gain.connect(ac.destination);
  src.start(t); src.stop(t + dur + 0.04);
}
function stopDragonFlame(){
  if(!_flameVoice) return;
  const v = _flameVoice;
  _flameVoice = null;
  const ac = audio(); if(!ac) return;
  const t = ac.currentTime;
  try{
    v.gain.gain.cancelScheduledValues(t);
    v.gain.gain.setValueAtTime(Math.max(0.0001, v.gain.gain.value), t);
    v.gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  }catch(e){}
  setTimeout(() => {
    try{ v.src.stop(); }catch(e){}
    try{ v.lfo.stop(); v.lfo2.stop(); }catch(e){}
    try{
      v.src.disconnect(); v.filter.disconnect(); v.gain.disconnect();
      v.lfo.disconnect(); v.lfoG.disconnect(); v.lfo2.disconnect(); v.lfo2G.disconnect();
    }catch(e){}
  }, 260);
}
function startDragonFlame(vol){
  if(muted) return;
  stopDragonFlame();
  const ac = audio(); if(!ac) return;
  if(ac.state === 'suspended') ac.resume();
  const t = ac.currentTime;
  vol = vol == null ? 0.065 : vol * 0.45;
  const src = ac.createBufferSource();
  src.buffer = getNoiseBuffer(ac);
  src.loop = true;
  const filter = ac.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 520;
  filter.Q.value = 0.35;
  const gain = ac.createGain();
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(vol, t + 0.18);
  const lfo = ac.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 4.2;
  const lfoG = ac.createGain();
  lfoG.gain.value = 55;
  lfo.connect(lfoG);
  lfoG.connect(filter.frequency);
  const lfo2 = ac.createOscillator();
  lfo2.type = 'triangle';
  lfo2.frequency.value = 9;
  const lfo2G = ac.createGain();
  lfo2G.gain.value = 0.018;
  lfo2.connect(lfo2G);
  lfo2G.connect(gain.gain);
  src.connect(filter);
  filter.connect(gain);
  gain.connect(ac.destination);
  src.start(t);
  lfo.start(t);
  lfo2.start(t);
  _flameVoice = { src, filter, gain, lfo, lfoG, lfo2, lfo2G, vol };
}
function tickDragonFlame(){
  if(!_flameVoice || muted) return;
  const ac = audio(); if(!ac) return;
  const t = ac.currentTime;
  const wobble = 460 + Math.sin(game.t * 5.5) * 35 + Math.sin(game.t * 2.1) * 18;
  _flameVoice.filter.frequency.setTargetAtTime(wobble, t, 0.08);
}

/* 8-bit ballad BGM — original composition (slow minor pulse, not a cover). */
const BGM = (function(){
  let master = null, active = false, step = 0, nextT = 0;
  const BPM = 63, EIGHTH = 60 / BPM / 2;
  const CHORDS = [
    { b: 110.00, a: [220, 262, 330] },
    { b: 87.31,  a: [175, 220, 262] },
    { b: 130.81, a: [262, 330, 392] },
    { b: 98.00,  a: [196, 247, 294] },
  ];
  const MELODY = [
    0,0,330,392, 440,392,330,0, 294,330,392,0, 440,523,440,392,
    0,0,349,392, 440,392,349,0, 330,349,392,0, 440,392,330,294,
    0,0,330,392, 523,494,440,0, 392,330,294,262, 294,330,0,0,
    0,0,294,330, 392,440,392,0, 330,294,262,0, 294,262,220,0,
  ];
  function note(ac, t, freq, dur, type, vol){
    if(!freq || muted) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.92);
    o.connect(g);
    g.connect(master);
    o.start(t);
    o.stop(t + dur + 0.03);
  }
  function schedule(ac, end){
    while(nextT < end){
      const bar = Math.floor(step / 16) % 4;
      const pos = step % 16;
      const ch = CHORDS[bar];
      const t = nextT;
      if(pos % 4 === 0) note(ac, t, ch.b, EIGHTH * 3.6, 'triangle', 0.07);
      if(pos % 2 === 1){
        const arp = ch.a[pos % ch.a.length];
        note(ac, t, arp, EIGHTH * 0.85, 'square', 0.028);
      }
      const mf = MELODY[step % MELODY.length];
      if(mf && pos % 2 === 0) note(ac, t, mf, EIGHTH * 1.7, 'triangle', 0.045);
      if(pos === 0){
        note(ac, t, ch.a[0] * 0.5, EIGHTH * 3.2, 'sine', 0.035);
      }
      step++;
      nextT += EIGHTH;
    }
  }
  return {
    start(){
      if(muted) return;
      const ac = audio(); if(!ac) return;
      if(ac.state === 'suspended') ac.resume();
      if(!master){
        master = ac.createGain();
        master.connect(ac.destination);
      }
      active = true;
      step = 0;
      nextT = ac.currentTime + 0.08;
      master.gain.setValueAtTime(0.0001, ac.currentTime);
      master.gain.exponentialRampToValueAtTime(0.11, ac.currentTime + 0.55);
    },
    stop(){
      active = false;
      const ac = audio();
      if(master && ac){
        const t = ac.currentTime;
        master.gain.cancelScheduledValues(t);
        master.gain.setValueAtTime(Math.max(0.0001, master.gain.value), t);
        master.gain.exponentialRampToValueAtTime(0.0001, t + 0.35);
      }
    },
    update(){
      if(!active || muted) return;
      const ac = audio(); if(!ac) return;
      schedule(ac, ac.currentTime + 0.28);
    },
  };
})();

/* Очки за один забег на уровне N, чтобы открыть уровень N+1: 625, 875, 1125 … */
function scoreGoalForLevel(levelIdx){
  return (125 + Math.max(0, levelIdx) * 50) * 5;
}
/* Сложность препятствий: 0 на ранних уровнях → 1 на высоких */
function obstacleFairness(){
  const lv = game.level || 0;
  const cycle = Math.floor(lv / LEVELS.length);
  return clamp(lv / 16 + cycle * 0.12, 0, 1);
}
function minPassageForBird(){
  const r = game.bird ? game.bird.r : 30;
  const fat = game.displayFat || 0;
  return r * (1.58 + fat * 0.1) + lerp(30, 14, obstacleFairness());
}
function largestClearSpan(y0, y1, blocks){
  const clipped = blocks
    .map(([a,b]) => [clamp(a, y0, y1), clamp(b, y0, y1)])
    .filter(([a,b]) => b > a)
    .sort((a,b) => a[0] - b[0]);
  let best = 0, cursor = y0;
  for(const [a,b] of clipped){
    best = Math.max(best, a - cursor);
    cursor = Math.max(cursor, b);
  }
  return Math.max(best, y1 - cursor);
}
function pipeBlockedIntervals(pipe){
  const blocks = [];
  for(const gh of game.gapHazards){
    if(gh.pipeId !== pipe.id) continue;
    if(gh.kind === 'bar'){
      blocks.push([pipe.gapY + gh.relY, pipe.gapY + gh.relY + gh.h]);
    } else if(gh.kind === 'spike'){
      const y0 = pipe.gapY + (gh.fromTop ? 0 : pipe.gapH - gh.len);
      blocks.push([y0, y0 + gh.len]);
    } else if(gh.kind === 'orb'){
      const oy = pipe.gapY + gh.relY;
      const swing = gh.amp || 0;
      blocks.push([oy - gh.r - swing, oy + gh.r + swing]);
    }
  }
  return blocks;
}
function pipeHasSafePassage(pipe){
  return largestClearSpan(pipe.gapY, pipe.gapY + pipe.gapH, pipeBlockedIntervals(pipe)) >= minPassageForBird();
}
function trimGapHazardsUntilSafe(pipe){
  let guard = 0;
  while(!pipeHasSafePassage(pipe) && guard++ < 8){
    const idx = game.gapHazards.findIndex(g => g.pipeId === pipe.id);
    if(idx < 0) break;
    game.gapHazards.splice(idx, 1);
  }
}
function estimatedPipeIntervalSec(){
  if(!game.params) return 1.1;
  return game.params.spacing * 0.85;
}
function maxGapCenterDelta(){
  const fair = obstacleFairness();
  const t = estimatedPipeIntervalSec();
  const flapReach = (t / 0.13) * H * 0.052;
  const glideReach = H * 0.075;
  return clamp(flapReach + glideReach, H * 0.11, lerp(H * 0.36, H * 0.24, fair));
}
function ensurePipePassable(pipe){
  trimGapHazardsUntilSafe(pipe);
  const minPass = minPassageForBird();
  let guard = 0;
  while(!pipeHasSafePassage(pipe) && guard++ < 10){
    const hazLeft = game.gapHazards.some(g => g.pipeId === pipe.id);
    if(hazLeft){
      game.gapHazards = game.gapHazards.filter(g => g.pipeId !== pipe.id);
      continue;
    }
    const grow = 10;
    const minTop = pipe.gapYMin != null ? pipe.gapYMin : H * 0.10;
    const maxTop = pipe.gapYMax != null ? pipe.gapYMax : H * 0.80 - pipe.gapH;
    if(pipe.gapH >= minPass * 1.45 + 24) break;
    pipe.gapH += grow;
    pipe.gapY = clamp(pipe.gapY - grow * 0.5, minTop, maxTop);
    pipe.gapYMax = H * 0.80 - pipe.gapH;
    if(pipe.moving) pipe.gapCenter = pipe.gapY - Math.sin(pipe.movingPhase) * pipe.movingAmp;
  }
  const safeAmp = Math.max(12, (pipe.gapH - minPass - 18) * 0.32);
  if(pipe.movingAmp > safeAmp){
    pipe.movingAmp = safeAmp;
    pipe.gapCenter = pipe.gapY - Math.sin(pipe.movingPhase) * pipe.movingAmp;
    pipe.gapY = clamp(pipe.gapCenter + Math.sin(pipe.movingPhase) * pipe.movingAmp, pipe.gapYMin, pipe.gapYMax);
  }
}
function pickFairGapY(gapH, minTop, maxTop, prevPipe){
  const fair = obstacleFairness();
  const minCenter = minTop + gapH * 0.5;
  const maxCenter = maxTop + gapH * 0.5;
  const midCenter = (minCenter + maxCenter) * 0.5;
  const span = maxCenter - minCenter;
  let targetCenter;

  if(prevPipe){
    const prevCenter = prevPipe.gapY + prevPipe.gapH * 0.5;
    const prevHigh = prevCenter < midCenter;
    const maxJump = maxGapCenterDelta();
    const jump = Math.min(lerp(span * 0.42, span * 0.3, fair), maxJump);
    targetCenter = prevHigh
      ? clamp(prevCenter + jump * srandf(0.72, 1.02), minCenter, maxCenter)
      : clamp(prevCenter - jump * srandf(0.72, 1.02), minCenter, maxCenter);
    targetCenter += srandf(-span * 0.04, span * 0.04);
    targetCenter = clamp(targetCenter, minCenter, maxCenter);
  } else {
    targetCenter = midCenter + srandf(-span * 0.38, span * 0.38);
  }

  return clamp(targetCenter - gapH * 0.5, minTop, maxTop);
}
function computeUnlockedFromLevelBests(levelBests){
  let unlocked = 1;
  while(true){
    const idx = unlocked - 1;
    if((levelBests[idx] || 0) >= scoreGoalForLevel(idx)) unlocked++;
    else break;
    if(unlocked > 500) break;
  }
  return unlocked;
}
function migrateProgressFromFlights(p){
  if(!p.levelBests) p.levelBests = [];
  if(p.levelBests.length === 0 && (p.totalFlights || 0) > 0 && (p.unlocked || 1) > 1){
    for(let i = 0; i < (p.unlocked || 1) - 1; i++) p.levelBests[i] = scoreGoalForLevel(i);
  }
}
function recordLevelBest(levelIdx, score){
  if(score <= 0) return;
  progress.levelBests = progress.levelBests || [];
  progress.levelBests[levelIdx] = Math.max(progress.levelBests[levelIdx] || 0, score);
}
function tryUnlockFromRunScore(){
  const goal = scoreGoalForLevel(game.level);
  if(game.score < goal) return;
  recordLevelBest(game.level, game.score);
  const prevUnlocked = progress.unlocked;
  progress.unlocked = Math.max(progress.unlocked || 1, computeUnlockedFromLevelBests(progress.levelBests));
  if(progress.unlocked > prevUnlocked){
    game.unlockBanner = { level: progress.unlocked, time: 3.2 };
    SFX.level();
    haptic('success');
    confetti(W/2, H*0.35, 36);
    addFloatText(W*0.5, H*0.28, 'Ур. '+progress.unlocked+' открыт!', '#7ec4a0', 1.1);
  }
  saveProgress(progress);
}
function getLevel(idx){ return LEVELS[((idx % LEVELS.length) + LEVELS.length) % LEVELS.length]; }
function levelLabel(idx){
  const lv = getLevel(idx);
  const cycle = Math.floor(idx / LEVELS.length);
  return cycle > 0 ? lv.name + ' · ' + (cycle + 1) : lv.name;
}
function levelParams(idx){
  const t = 1 - Math.exp(-idx / 14);
  /** ~22% more pipes: shorter gap between spawns */
  const PIPE_COUNT_MULT = 1.22;
  return {
    speed:   lerp(190, 385, t),
    gap:     lerp(0.48, 0.31, t),
    spacing: lerp(1.68, 1.05, t) / PIPE_COUNT_MULT,
    junkChance: lerp(0.10, 0.34, t),
    fat:     clamp(1 - t, 0.05, 1)
  };
}

const STORE_KEY = 'healthy_bird_progress_v2';
function loadProgress(){
  try{
    const r = JSON.parse(localStorage.getItem(STORE_KEY));
    if(r && typeof r === 'object'){
      r.totalFlights = r.totalFlights || 0;
      r.levelBests = r.levelBests || [];
      r.levelStars = r.levelStars || [];
      r.marathonBest = r.marathonBest || 0;
      migrateProgressFromFlights(r);
      r.unlocked = Math.max(1, computeUnlockedFromLevelBests(r.levelBests));
      return r;
    }
    const legacy = JSON.parse(localStorage.getItem('healthy_bird_progress_v1'));
    if(legacy && typeof legacy === 'object'){
      return {
        unlocked: legacy.unlocked || 1,
        best: legacy.best || 0,
        totalFood: legacy.totalFood || 0,
        totalFlights: 0,
        levelBests: []
      };
    }
  }catch(e){}
  return { unlocked:1, best:0, totalFood:0, totalFlights:0, levelBests:[], levelStars:[], marathonBest:0 };
}
function saveProgress(p){
  p.levelBests = p.levelBests || [];
  migrateProgressFromFlights(p);
  p.unlocked = Math.max(p.unlocked || 1, computeUnlockedFromLevelBests(p.levelBests));
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(p)); }catch(e){}
}

if(progress.marathonBest == null) progress.marathonBest = 0;

let nutriBoost = { active:false, kind:null, label:'', streakDays:0 };
function dailySeedNum(){
  const d = new Date();
  return d.getFullYear()*10000 + (d.getMonth()+1)*100 + d.getDate();
}
function makeRng(seed){
  let s = (seed >>> 0) || 1;
  return ()=>{ s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 4294967296; };
}
let _spawnRng = null;
function setSpawnRng(seed){ _spawnRng = seed != null ? makeRng(seed) : null; }
function srand(){ return _spawnRng ? _spawnRng() : Math.random(); }
function srandf(a,b){ return a + srand()*(b-a); }
function srandi(a,b){ return Math.floor(srandf(a, b+1)); }

function runPhase(){
  if(game.score >= 250) return 2;
  if(game.score >= 100) return 1;
  return 0;
}
function hazardActive(){ return runPhase() >= 1; }

  if(theme === 'desert') return { type:'wind', gust:0, gustVy:0 };

  if(!nutriBoost.active) return;

  if(nutriBoost.kind === 'wellness' && game.lives < MAX_LIVES){

  const w = game.weather;

    if(w.gust <= 0){ w.gust = srandf(2.5, 5.5); w.gustVy = srandf(120, 220); }
    b.vy += w.gustVy * dt * 0.35;
  } else if(w.type === 'ice'){
    if(w.iceTime > 0) w.iceTime -= dt;
    else if(srand() < 0.012) w.iceTime = srandf(0.8, 1.6);
  } else if(w.type === 'buoy'){

  const hitTop = circleRect(b.x,b.y,b.r*0.78, o.x,0,o.w,o.gapY);
  const hitBot = circleRect(b.x,b.y,b.r*0.78, o.x,o.gapY+o.gapH,o.w,H-(o.gapY+o.gapH));

function tryFreezeSmashPipe(b, o){

function computeRunStars(){
  let stars = 0;
  const goal = scoreGoalForLevel(game.level);
  if(game.score >= goal) stars = 1;
  if(game.runStats.junkTaken === 0 && game.foodCollected >= 2) stars = Math.max(stars, 2);
  if(game.runStats.perfectGates >= 3 || game.runStats.nearMisses >= 5) stars = Math.max(stars, 3);
  return stars;
}
function saveRunStars(){
  if(game.marathon || game.runMode !== 'level') return;
  const stars = computeRunStars();
  const goal = scoreGoalForLevel(game.level);
  if(game.score < goal) return;
  progress.levelStars = progress.levelStars || [];
  progress.levelStars[game.level] = Math.max(progress.levelStars[game.level] || 0, stars);
}

const particles = [];
const coconutRays = [];
function spawnParticle(x,y,opts={}){
  particles.push(Object.assign({
    x,y, vx:rand(-60,60), vy:rand(-120,-20),
    g: opts.g!=null?opts.g:240, life:1, decay:rand(1.4,2.4),
    size:rand(3,7), color:'#fff', shape:'circle', spin:rand(-6,6), rot:rand(0,TAU)
  }, opts));
}
function burst(x,y,color,n=14,spread=160){
  for(let i=0;i<n;i++){
    const a = rand(0,TAU), s = rand(40,spread);
    spawnParticle(x,y,{vx:Math.cos(a)*s, vy:Math.sin(a)*s - 40, color,
      size:rand(2.5,6.5), decay:rand(1.6,3), shape: Math.random()<0.4?'star':'circle'});
  }
}
function confetti(x,y,n=26){
  const cols=['#ff5252','#ffca28','#66bb6a','#42a5f5','#ab47bc','#ff7043','#26c6da'];
  for(let i=0;i<n;i++){
    const a=rand(-Math.PI*0.85,-Math.PI*0.15), s=rand(120,360);
    spawnParticle(x,y,{vx:Math.cos(a)*s, vy:Math.sin(a)*s, g:340, color:cols[randi(0,cols.length-1)],
      size:rand(4,9), decay:rand(0.8,1.6), shape:'rect', spin:rand(-10,10)});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.vy += p.g*dt;
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.rot += p.spin*dt;
    p.life -= p.decay*dt;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(c){
  for(const p of particles){
    c.save();
    c.globalAlpha = clamp(p.life,0,1);
    c.translate(p.x,p.y);
    c.rotate(p.rot);
    c.fillStyle = p.color;
    if(p.shape==='wind'){
      c.strokeStyle=p.color; c.lineWidth=2; c.lineCap='round';
      c.beginPath(); c.moveTo(-p.size/2,0); c.lineTo(p.size/2,0); c.stroke();
    }else if(p.shape==='rect'){
      c.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
    }else if(p.shape==='star'){
      drawStar(c,0,0,p.size,p.size*0.45,5);
      c.fill();
    }else{
      c.beginPath(); c.arc(0,0,p.size,0,TAU); c.fill();
    }
    c.restore();
  }
}
function drawStar(c,cx,cy,outer,inner,points){
  c.beginPath();
  for(let i=0;i<points*2;i++){
    const r = i%2===0?outer:inner;
    const a = (i/(points*2))*TAU - Math.PI/2;
    const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  }
  c.closePath();
}

function buildPipeShatter(o, b, opts){
  opts = opts || {};
  if(o.scattered || o.smashed) return;
  const lv = getLevel(game.level);
  const col = obstacleColor(lv);
  const intensity = opts.intensity || 1;
  const ice = !!opts.ice || !!o.frozen;
  const chunks = [];
  const pipeCx = o.x + o.w * 0.5;
  const pipeCy = o.gapY + o.gapH * 0.5;
  let pushX = 0, pushY = 0;
  if(b){
    const dx = pipeCx - b.x, dy = pipeCy - b.y;
    const d = Math.hypot(dx, dy) || 1;
    pushX = (dx / d) * 240 * intensity;
    pushY = (dy / d) * 240 * intensity;
  }

  function addChunks(x, y, w, h, vyBias){
    const rows = Math.max(4, Math.floor(h / 10));
    const cols = Math.max(3, Math.floor(w / 9));
    for(let row = 0; row < rows; row++){
      for(let ci = 0; ci < cols; ci++){
        const cw = (w / cols) * rand(0.7, 1.05);
        const ch = (h / rows) * rand(0.65, 1.05);
        const cx = x + (ci + rand(0.15, 0.85)) * w / cols - cw * 0.5;
        const cy = y + (row + rand(0.1, 0.9)) * h / rows - ch * 0.5;
        chunks.push({
          x: cx, y: cy, w: cw, h: ch,
          vx: pushX + rand(-160, 160) * intensity,
          vy: vyBias + pushY + rand(-180, 180) * intensity,
          rot: rand(0, TAU),
          vr: rand(-14, 14) * intensity,
          shade: rand(-18, 18),
        });
      }
    }
  }

  const topH = Math.max(8, o.gapY);
  const botY = o.gapY + o.gapH;
  const botH = Math.max(8, H - botY);
  addChunks(o.x, 0, o.w, topH, -rand(260, 520) * intensity);
  addChunks(o.x, botY, o.w, botH, rand(260, 520) * intensity);

  o.scattered = true;
  o.smashed = true;
  o.scatterT = 0;
  o.scatterIce = ice;
  o.scatter = { chunks, col, kind: o.kind || opts.theme || lv.theme };

  const sparkPalette = ice
    ? ['#e1f5fe', '#b3e5fc', '#81d4fa', '#fff']
    : ['#ff5722', '#ff9800', '#ffeb3b', '#b71c1c', '#ff1744', '#ffd54f'];
  const particleCount = Math.floor(lerp(22, 48, clamp(intensity / 2.5, 0, 1)));
  for(let i = 0; i < particleCount; i++){
    spawnParticle(pipeCx, pipeCy, {
      vx: rand(-340, 340) * intensity,
      vy: rand(-340, 340) * intensity,
      color: sparkPalette[randi(0, sparkPalette.length - 1)],
      size: rand(3, 11) * Math.min(1.4, intensity * 0.7),
      decay: rand(0.6, 1.8),
      shape: i % 3 ? 'circle' : 'star',
      g: 95,
    });
  }
}

}
function triggerCoconutExplosion(){

function updateCoconutBlast(dt){
  const cb = game.coconutBlast;
  if(!cb) return;
  const b = game.bird;
  if(!b) return;
  if(cb.phase === 'charge'){
    cb.chargeTime -= dt;
    cb.energy = clamp(1 - cb.chargeTime / cb.chargeDur, 0, 1);
    b.vy = 0;
    b.y = H * 0.45 + Math.sin(game.t * 5.2) * 8;
    b.tilt = Math.sin(game.t * 6.5) * 0.05;
    b.wing = 0.18 + Math.sin(game.t * 10) * 0.12;
    b.bodySquash = 1 + cb.energy * 0.12;
    const baseR = b._coconutSavedR || b.r;
    b.r = baseR * (1 + cb.energy * 0.62);
    game.invuln = 999;
    const pulse = Math.floor(cb.chargeTime * 5);
    if(pulse !== cb._pulse){
      cb._pulse = pulse;
      if(cb.chargeTime > 0.05) SFX.coconutChargePulse();
    }
    for(let i = coconutRays.length - 1; i >= 0; i--){
      const ray = coconutRays[i];
      const dx = b.x - ray.x, dy = b.y - ray.y;
      const d = Math.hypot(dx, dy) || 1;
      const spd = ray.speed * (1 + cb.energy * 2.2);
      ray.x += dx / d * spd * dt;
      ray.y += dy / d * spd * dt;
      if(d < b.r * 0.75){
        ray.life -= dt * 5;
        if(Math.random() < 0.7){
          spawnParticle(ray.x, ray.y, { vx: rand(-30, 30), vy: rand(-30, 30), g: 0, color: '#fffde7', size: rand(2, 5), decay: 2.2, shape: 'star' });
        }
        if(ray.life <= 0) coconutRays.splice(i, 1);
      }
    }
    if(coconutRays.length < 90 && Math.random() < 0.72) spawnCoconutRay(Math.random() < 0.28);
    if(cb.chargeTime <= 0) triggerCoconutExplosion();
  } else if(cb.phase === 'burst'){
    cb.burstTime += dt;
    b.vy = 0;
    b.y = H * 0.45;
    game.invuln = 999;
    if(cb.burstTime >= cb.burstDur){
      if(b._coconutSavedR) b.r = b._coconutSavedR;
      game.coconutBlast = null;
      game.invuln = Math.max(game.invuln, 1.8);
    }
  }
}
function drawCoconutAbsorbRays(c, b, energy){
  for(const ray of coconutRays){
    const dx = b.x - ray.x, dy = b.y - ray.y;
    const d = Math.hypot(dx, dy) || 1;
    const tail = Math.min(d, 90 + energy * 60);
    c.save();
    c.globalAlpha = clamp(ray.life, 0, 1) * (0.55 + energy * 0.4);
    const g = c.createLinearGradient(ray.x, ray.y, ray.x + dx / d * tail, ray.y + dy / d * tail);
    g.addColorStop(0, 'rgba(255,235,59,0)');
    g.addColorStop(0.25, 'rgba(255,241,118,0.45)');
    g.addColorStop(0.7, 'rgba(255,255,255,0.92)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    c.strokeStyle = g;
    c.lineWidth = ray.width * (0.65 + energy * 1.1);
    c.lineCap = 'round';
    c.beginPath();
    c.moveTo(ray.x, ray.y);
    c.lineTo(ray.x + dx / d * tail, ray.y + dy / d * tail);
    c.stroke();
    c.fillStyle = 'rgba(255,255,255,' + (0.35 + energy * 0.45) + ')';
    c.beginPath();
    c.arc(ray.x + dx / d * tail * 0.92, ray.y + dy / d * tail * 0.92, ray.width * 0.55, 0, TAU);
    c.fill();
    c.restore();
  }
}
function drawCoconutBirdAura(c, b, energy){
  c.save();
  c.translate(b.x, b.y);
  for(let i = 0; i < 6; i++){
    const p = energy * (1 - i * 0.12);
    c.globalAlpha = (0.55 - i * 0.07) * p;
    c.strokeStyle = i % 2 ? '#fff59d' : '#ff9800';
    c.lineWidth = 2 + energy * 5;
    c.beginPath();
    c.arc(0, 0, b.r * (1.05 + p * 2.4 + i * 0.28), game.t * (2.8 + i * 0.4), game.t * (2.8 + i * 0.4) + Math.PI * 1.15);
    c.stroke();
  }
  c.globalAlpha = 0.35 + energy * 0.45;
  const rg = c.createRadialGradient(0, 0, b.r * 0.08, 0, 0, b.r * (1.6 + energy * 2.8));
  rg.addColorStop(0, 'rgba(255,255,255,' + (0.65 + energy * 0.3) + ')');
  rg.addColorStop(0.35, 'rgba(255,235,59,' + (0.45 + energy * 0.35) + ')');
  rg.addColorStop(0.72, 'rgba(255,152,0,' + (0.2 + energy * 0.25) + ')');
  rg.addColorStop(1, 'rgba(255,152,0,0)');
  c.fillStyle = rg;
  c.beginPath(); c.arc(0, 0, b.r * (1.9 + energy * 2.6), 0, TAU); c.fill();
  c.restore();
}
function drawCoconutBurstFx(c, b){
  const cb = game.coconutBlast;
  if(!cb || cb.phase !== 'burst') return;
  const prog = cb.burstTime / cb.burstDur;
  c.save();
  c.translate(b.x, b.y);
  for(let i = 0; i < 7; i++){
    const p = clamp(prog * 1.5 - i * 0.07, 0, 1);

    c.lineWidth = 10 - i;
    c.beginPath();
    c.arc(0, 0, Math.max(W, H) * 0.15 + p * Math.max(W, H), 0, TAU);
    c.stroke();
  }
  c.globalAlpha = clamp(1 - prog * 0.85, 0, 1) * 0.45;
  const g = c.createRadialGradient(0, 0, 0, 0, 0, Math.max(W, H) * 0.95);
  g.addColorStop(0, '#fff');
  g.addColorStop(0.2, '#fff59d');
  g.addColorStop(0.55, 'rgba(255,193,7,0.55)');
  g.addColorStop(1, 'rgba(255,152,0,0)');

}
function startDragonMutation(){

function updateDragonMode(dt){
  const d = game.dragonMode;
  if(!d) return;
  const b = game.bird;
  if(d.mutating){
    d.mutateTime -= dt;
    const pulse = Math.floor(d.mutateTime * 3.5);
    if(pulse !== d._mutPulse){
      d._mutPulse = pulse;
      if(d.mutateTime > 0.05 && pulse % 2 === 0) SFX.mutatePulse();
    }
    const wingBeat = Math.floor(game.t * 8);
    if(wingBeat !== d._wingBeat){
      d._wingBeat = wingBeat;
      if(Math.random() < 0.35) SFX.flap();
    }
    const p = dragonMutateProgress();
    if(b){
      const targetR = 74;
      b.r = lerp(b._savedR || 30, targetR, p);
      b.bodySquash = 1 + Math.sin(p * Math.PI * 8) * 0.05;
      b.tilt = Math.sin(game.t * 5) * 0.06 * p;
      game.shake = Math.max(game.shake, 3 + p * 7 + Math.sin(game.t * 14) * 2);
    }
    d._partTimer = (d._partTimer || 0) - dt;
    if(d._partTimer <= 0 && b){
      d._partTimer = 0.14;
      const pr = dragonMutateProgress();
      const n = pr > 0.5 ? 2 : 1;
      for(let i = 0; i < n; i++){
        const a = rand(0, TAU);
        spawnParticle(b.x, b.y, {
          vx: Math.cos(a) * rand(70, 180), vy: Math.sin(a) * rand(70, 180),
          color: ['#ffeb3b', '#ff9800', '#ff1744', '#fff59d', '#e040fb'][randi(0, 4)],
          size: rand(3, 8), decay: rand(0.45, 0.95), shape: i % 2 ? 'star' : 'circle', g: 70,
        });
      }
    }
    d._shockTimer = (d._shockTimer || 0) - dt;
    if(d._shockTimer <= 0 && b){
      d._shockTimer = 0.5;
      burst(b.x, b.y, ['#ffd54f', '#ff5722', '#ff1744'][randi(0, 2)], 8, 170);
    }
    if(d.mutateTime <= 0){
      d.mutating = false;
      d.activeTime = d.activeDur;
      d.rampTime = d.rampDur;
      if(b) b.r = 74;
      burst(b.x, b.y, '#ff1744', 40, 280);
      addFloatText(b.x, b.y - 42, '🪶 ЖАР-ПТИЦА!', '#ff8a80', 1.2);
      SFX.dragonRoar();
    }
    return;
  }
  d.activeTime -= dt;
  const wasRamp = d.rampTime > 0;
  d.rampTime = Math.max(0, d.rampTime - dt);
  if(wasRamp && d.rampTime <= 0 && d.activeTime > 0 && !d.flameStarted){
    d.flameStarted = true;
    SFX.startDragonFlame();
  }
  if(isDragonActive()){
    SFX.tickDragonFlame();
    const wingBeat = Math.floor(game.t * 6);
    if(wingBeat !== d._dWingBeat){
      d._dWingBeat = wingBeat;
      SFX.dragonWing();
    }
  }
  if(d.activeTime <= 0){
    SFX.stopDragonFlame();
    if(b && b._savedR) b.r = b._savedR;
    game.dragonMode = null;
    addFloatText(b.x, b.y - 28, 'Мутация закончилась', '#a8b8ae', 0.88);
  }
}
function scatterPipe(o, b){
  buildPipeShatter(o, b, { intensity: 1.45 });
  addScore(18, '🪶', b.x, b.y - 26);
  SFX.pipeBreak('dragon');
}
function updateScatteredPipes(dt){
  for(const o of game.obstacles){
    if(!o.scatter) continue;
    o.scatterT = (o.scatterT || 0) + dt;
    if(o.scatter.chunks){
      for(const ch of o.scatter.chunks){
        ch.x += ch.vx * dt;
        ch.y += ch.vy * dt;
        ch.vy += 480 * dt;
        ch.vx *= 0.988;
        ch.rot += ch.vr * dt;
      }
      continue;
    }
    for(const key of ['top', 'bot']){
      const seg = o.scatter[key];
      if(!seg) continue;
      seg.x += seg.vx * dt;
      seg.y += seg.vy * dt;
      seg.vy += 420 * dt;
      seg.rot += seg.vr * dt;
    }
  }
}
function tryDragonSmashPipe(b, o){
  if(!isDragonActive() || game.dragonMode.rampTime > 0) return false;
  if(o.smashed || o.scattered) return false;
  const reach = b.r * 2.5;
  if(o.x + o.w < b.x - b.r * 0.4 || o.x > b.x + reach) return false;
  if(b.y + b.r < -20 || b.y - b.r > H) return false;
  scatterPipe(o, b);
  haptic('heavy');
  return true;
}
function updateRunSlimming(){
  const start = game.runStartFat ?? game.displayFat;
  const minF = game.runMinFat ?? clamp(start - 0.14, 0.28, 0.92);
  const span = W * 14;
  const prog = clamp(game.distance / span, 0, 1);
  game.targetFat = lerp(start, minF, prog);
}
function applyJunkWeight(){
  const bump = 0.07;
  game.displayFat = clamp(game.displayFat + bump, 0, 1);
  game.targetFat = clamp((game.targetFat ?? game.displayFat) + bump * 0.9, 0, 1);
  game.runStartFat = clamp((game.runStartFat ?? game.displayFat) + bump * 0.75, 0, 1);
  game.runMinFat = clamp((game.runMinFat ?? game.displayFat) + bump * 0.55, 0, 1);
}

/* Bird object factory */
function makeBird(){
  return {
    x: W*0.30, y: H*0.45, vy:0,
    r: 30, wing:0, flapBoost:0, wingCycle:0, bodySquash:1,
    tilt:0, eat:0, eatPop:0, happy:0,
    flapCooldown:0, flapQueued:false, airtime:0,
    stagger:0, moodKind:null, moodPhase:0, moodTime:0.8, moodTimer:rand(2.5, 5)
  };
}

function applyFlapImpulse(b){
  const fatMul = 1 - clamp(game.displayFat, 0, 1) * 0.09;
  const base = -355 * fatMul * weatherFlapMult();
  if(b.vy > 90) b.vy = b.vy * 0.22 + base;
  else if(b.vy > 0) b.vy = b.vy * 0.42 + base;
  else if(b.vy < -230) b.vy = b.vy * 0.68 + base * 0.58;
  else b.vy = b.vy * 0.38 + base;
  b.vy = clamp(b.vy, -400, 130);
  b.airtime = 0.28;
  b.wing = 1;
  b.flapBoost = 1;
  b.wingCycle = 0.02;
  b.bodySquash = 0.84;
}

/* ------------------------------ Buttons (UI) ----------------------------- */
let buttons = []; // {x,y,w,h,label,onClick,id}
function clearButtons(){ buttons = []; }
function addButton(b){ buttons.push(b); }
function pointInBtn(px,py,b){ return px>=b.x && px<=b.x+b.w && py>=b.y && py<=b.y+b.h; }

let levelMapScroll = { y: 0, active: false, startPy: 0, startScroll: 0, moved: false };

function levelsViewport(){
  const top = H * 0.14 + safeTop();
  const bottom = H - 80 - safeBottom();
  return { top, bottom, h: Math.max(120, bottom - top) };
}
function getLevelsLayout(){
  const cols = 3;
  const levelCount = Math.max(6, progress.unlocked + 1);
  const gw = Math.min(W * 0.86, 420);
  const cell = gw / cols;
  const gx = (W - gw) / 2;
  const gy = levelsViewport().top + 4;
  const size = cell - 12;
  const rowH = size + 14;
  const rows = Math.ceil(levelCount / cols);
  const contentH = rows * rowH;
  return { cols, levelCount, gw, cell, gx, gy, size, rowH, rows, contentH };
}
function levelsMaxScroll(){
  const layout = getLevelsLayout();
  const vp = levelsViewport();
  return Math.max(0, layout.gy + layout.contentH - vp.bottom + 12);
}
function syncLevelButtonPositions(){
  for(const b of buttons){
    if(b.baseY != null) b.y = b.baseY - levelMapScroll.y;
  }
}
function scrollLevelsToUnlocked(){
  const layout = getLevelsLayout();
  const idx = Math.max(0, (progress.unlocked || 1) - 1);
  const row = Math.floor(idx / layout.cols);
  const tileY = layout.gy + row * layout.rowH;
  const vp = levelsViewport();
  levelMapScroll.y = clamp(tileY - vp.top - layout.rowH * 0.5, 0, levelsMaxScroll());
}
function drawLevelMapScrollHints(c){
  const max = levelsMaxScroll();
  if(max <= 2) return;
  const vp = levelsViewport();
  if(levelMapScroll.y > 4){
    const g = c.createLinearGradient(0, vp.top, 0, vp.top + 28);
    g.addColorStop(0, 'rgba(8,16,30,0.75)'); g.addColorStop(1, 'rgba(8,16,30,0)');
    c.fillStyle = g; c.fillRect(0, vp.top, W, 28);
  }
  if(levelMapScroll.y < max - 4){
    const g = c.createLinearGradient(0, vp.bottom - 32, 0, vp.bottom);
    g.addColorStop(0, 'rgba(8,16,30,0)'); g.addColorStop(1, 'rgba(8,16,30,0.78)');
    c.fillStyle = g; c.fillRect(0, vp.bottom - 32, W, 32);
    c.fillStyle = 'rgba(238,245,240,0.55)';
    c.font = typeCaption(11); c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('⇅ листай', W / 2, vp.bottom - 12);
  }
}
function levelsPointerDown(py){
  const vp = levelsViewport();
  levelMapScroll.active = py >= vp.top - 8 && py <= vp.bottom + 8;
  levelMapScroll.startPy = py;
  levelMapScroll.startScroll = levelMapScroll.y;
  levelMapScroll.moved = false;
}
function levelsPointerMove(py){
  if(!levelMapScroll.active) return;
  const dy = py - levelMapScroll.startPy;
  if(Math.abs(dy) > 6) levelMapScroll.moved = true;
  if(levelMapScroll.moved){
    levelMapScroll.y = clamp(levelMapScroll.startScroll - dy, 0, levelsMaxScroll());
    syncLevelButtonPositions();
  }
}
function levelsPointerUp(px, py){
  const moved = levelMapScroll.moved;
  levelMapScroll.active = false;
  levelMapScroll.moved = false;
  if(moved) return true;
  for(const b of buttons){
    if(pointInBtn(px, py, b)){ b.onClick(); haptic('light'); return true; }
  }
  return false;
}
function levelsWheel(deltaY){
  const before = levelMapScroll.y;
  levelMapScroll.y = clamp(levelMapScroll.y + deltaY * 0.45, 0, levelsMaxScroll());
  if(levelMapScroll.y !== before) syncLevelButtonPositions();
}

/* --------------------------------- Input --------------------------------- */
let pointer = {x:0,y:0,down:false};
function handleDown(px,py){
  pointer.x=px; pointer.y=py; pointer.down=true;
  // Mute toggle hotspot (top-right) is global
  if(muteHotspot && px>=muteHotspot.x && px<=muteHotspot.x+muteHotspot.w && py>=muteHotspot.y && py<=muteHotspot.y+muteHotspot.h){
    muted=!muted;
    if(muted){ SFX.stopDragonFlame(); BGM.stop(); }
    else if(state===STATE.PLAY) BGM.start();
    haptic('select'); return;
  }
  if(state===STATE.LEVELS){
    levelsPointerDown(py);
    return;
  }
  // Buttons
  for(const b of buttons){ if(pointInBtn(px,py,b)){ b.onClick(); haptic('light'); return; } }
  // Gameplay tap = flap
  if(state===STATE.PLAY && game.intro<=0){
    flap();
  }
}
function flap(){
  if(!game.bird) return;
  if(isMutating() || isDragonActive() || isCoconutActive()) return;
  const b = game.bird;
  if(b.flapCooldown > 0){
    b.flapQueued = true;
    return;
  }
  applyFlapImpulse(b);
  b.flapCooldown = 0.13;
  SFX.flap();
  haptic('light');
  spawnFlapBurst(b);
}
function handleUp(px, py){
  if(state===STATE.LEVELS){
    levelsPointerUp(px, py);
    pointer.down = false;
    return;
  }
  pointer.down = false;
}
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.changedTouches[0]; const r=canvas.getBoundingClientRect(); handleDown(t.clientX-r.left, t.clientY-r.top); }, {passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const r=canvas.getBoundingClientRect();
  if(state===STATE.LEVELS) levelsPointerMove(t.clientY-r.top);
}, {passive:false});
canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  const t=e.changedTouches[0];
  const r=canvas.getBoundingClientRect();
  handleUp(t.clientX-r.left, t.clientY-r.top);
}, {passive:false});
canvas.addEventListener('mousedown', e=>{ const r=canvas.getBoundingClientRect(); handleDown(e.clientX-r.left, e.clientY-r.top); });
canvas.addEventListener('mousemove', e=>{
  if(!pointer.down) return;
  const r=canvas.getBoundingClientRect();
  if(state===STATE.LEVELS) levelsPointerMove(e.clientY-r.top);
});
canvas.addEventListener('mouseup', e=>{ const r=canvas.getBoundingClientRect(); handleUp(e.clientX-r.left, e.clientY-r.top); });
canvas.addEventListener('wheel', e=>{
  if(state!==STATE.LEVELS) return;
  e.preventDefault();
  levelsWheel(e.deltaY);
}, {passive:false});
window.addEventListener('keyup', e=>{
  if(e.code==='Space'||e.code==='ArrowUp') pointer.down=false;
});
window.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){
    e.preventDefault();
    pointer.down=true;
    if(state===STATE.PLAY && game.intro<=0) flap();
    else handleDown(W/2,H/2);
  }
});

function addScore(pts, label, x, y, extraMult){
  const mult = game.multiplier * (extraMult || 1);
  const gain = Math.round(pts * mult);
  game.score += gain;
  progress.best = Math.max(progress.best, game.score);
  if(state === STATE.PLAY && game.intro <= 0) tryUnlockFromRunScore();
  updateRunPhases();
  if(label) addFloatText(x||game.bird.x, y||game.bird.y-30, label+(mult>1?' x'+mult.toFixed(1):''), mult>1?'#ffd54f':'#eef5f0', mult>1?1.15:1);
}
function bumpCombo(){
  game.combo++;
  const boost = game.metabolicBoost > 0 ? 5.5 : 4;
  game.comboTimer = boost;
  game.multiplier = Math.min(maxComboMult(), 1 + Math.floor(game.combo / 4) * 0.5);
}

  game.comboTimer = 0;
  game.multiplier = 1;
}

function spawnThermal(){
  game.thermals.push({
    x: W + rand(40, 120),
    y: rand(H*0.18, H*0.58),
    w: rand(70, 110),
    h: rand(90, 150),
    phase: rand(0, TAU)
  });
}
function drawThermals(c){
  for(const t of game.thermals){
    c.save();
    const pulse = 0.55 + 0.45*Math.sin(game.t*2.2 + t.phase);
    c.globalAlpha = 0.22 * pulse;
    const g = c.createLinearGradient(t.x, t.y+t.h, t.x, t.y);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.55)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    c.fillStyle = g;
    c.beginPath();
    c.moveTo(t.x, t.y+t.h);
    c.quadraticCurveTo(t.x+t.w*0.55, t.y+t.h*0.35, t.x+t.w, t.y);
    c.lineTo(t.x+t.w*0.7, t.y);
    c.quadraticCurveTo(t.x+t.w*0.2, t.y+t.h*0.4, t.x, t.y+t.h);
    c.fill();
    c.strokeStyle = 'rgba(255,255,255,0.35)';
    c.lineWidth = 1.5;
    for(let i=0;i<3;i++){
      const lx = t.x + t.w*0.25 + i*t.w*0.22;
      c.beginPath();
      c.moveTo(lx, t.y+t.h);
      c.quadraticCurveTo(lx+8, t.y+t.h*0.45, lx+4, t.y+12);
      c.stroke();
    }
    c.restore();
  }
}
function drawShieldBubble(c, b){
  if(game.shieldTime<=0) return;
  c.save();
  c.globalAlpha = 0.35 + 0.15*Math.sin(game.t*8);
  c.strokeStyle = '#64b5f6';
  c.lineWidth = 3;
  c.fillStyle = 'rgba(100,181,246,0.12)';
  const rr = b.r * (1.1 + game.displayFat*0.25);
  c.beginPath(); c.arc(0, 0, rr, 0, TAU); c.fill(); c.stroke();
  c.restore();
}
function drawPowerIcons(c){
  const icons = [];
  if(game.shieldTime>0) icons.push({t:game.shieldTime, icon:'🛡', col:'#64b5f6'});
  if(game.magnetTime>0) icons.push({t:game.magnetTime, icon:'🧲', col:'#ba68c8'});
  if(game.chronoTime>0) icons.push({t:game.chronoTime, icon:'⏰', col:'#90caf9'});
  else if(game.slowmoTime>0) icons.push({t:game.slowmoTime, icon:'⏱', col:'#4dd0e1'});
  if(game.nitroTime>0) icons.push({t:game.nitroTime, icon:'🔥', col:'#ff9800'});
  if(isDragonActive()) icons.push({t:game.dragonMode.activeTime, icon:'🪶', col:'#ff5252'});
  if(isMutating()) icons.push({t:game.dragonMode.mutateTime, icon:'🧬', col:'#ff9800'});
  if(isFreezeActive()) icons.push({t:game.freezeTime, icon:'❄', col:'#81d4fa'});
  if(isCoconutCharging()) icons.push({t:game.coconutBlast.chargeTime, icon:'🥥', col:'#fff59d'});
  if(game.pipeSmashReady>0) icons.push({t:game.pipeSmashReady, icon:'💥', col:'#ffd54f', isCount:true});
  let x = W - 18;
  const y = H*0.80 - 42 - safeBottom();
  for(const ic of icons){
    c.save();
    c.textAlign='right'; c.textBaseline='middle';
    c.font = fontSans(11,'600');
    c.fillStyle = ic.col;
    c.fillText(ic.icon+(ic.isCount ? ' x'+ic.t : ' '+Math.ceil(ic.t)+'с'), x, y);
    x -= 72;
    c.restore();
  }
}
function checkNearMiss(b, o){
  if(o.passed || game.nearMissCd>0) return;
  const bx = b.x, by = b.y, br = b.r*0.78;
  if(o.x > bx+br+8 || o.x+o.w < bx-br-8) return;
  const gapTop = o.gapY, gapBot = o.gapY+o.gapH;
  const margin = 14;
  const nearTop = by-br < gapTop+margin && by+br > gapTop-margin && bx > o.x-10 && bx < o.x+o.w+10;
  const nearBot = by+br > gapBot-margin && by-br < gapBot+margin && bx > o.x-10 && bx < o.x+o.w+10;
  if(nearTop || nearBot){
    game.nearMissCd = 1.2;
    if(game.runStats) game.runStats.nearMisses++;
    const riskPts = getBirdSpec().perk === 'storm' ? 8 : 5;
    addScore(riskPts, 'Риск!', bx, by-24);
    haptic('light');
    burst(bx, by, '#ffca28', 8, 90);
  }
}

function drawBirdSpeciesFx(c, spec, b, fat, time, bodyW, bodyH){
  const perk = spec.perk;
  if(perk === 'ember'){
    c.save(); c.globalAlpha = 0.35 + 0.2*Math.sin(time*12);
    const g = c.createRadialGradient(-bodyW*0.5, 0, 4, -bodyW*0.5, 0, bodyW*0.9);
    g.addColorStop(0,'#ffab91'); g.addColorStop(1,'rgba(255,87,34,0)');
    c.fillStyle = g; c.beginPath(); c.arc(-bodyW*0.45, 0, bodyW*0.75, 0, TAU); c.fill();
    for(let i=0;i<3;i++){
      const fy = Math.sin(time*14+i)*bodyH*0.2;
      c.fillStyle = ['#ff7043','#ffca28','#ff5722'][i];
      c.beginPath(); c.ellipse(-bodyW*(1.1+i*0.08), fy, bodyW*0.12, bodyH*0.2, -0.4, 0, TAU); c.fill();
    }
    c.restore();
  } else if(perk === 'frost'){
    c.save(); c.globalAlpha = 0.5;
    c.strokeStyle = '#e1f5fe'; c.lineWidth = 2;
    for(let i=0;i<5;i++){
      const a = time*1.8 + i*TAU/5;
      const sx = Math.cos(a)*bodyW*0.75, sy = Math.sin(a)*bodyH*0.55;
      c.beginPath(); c.moveTo(sx, sy); c.lineTo(sx*1.15, sy*1.15); c.stroke();
      c.fillStyle = '#fff'; c.beginPath(); c.arc(sx*1.18, sy*1.18, 3, 0, TAU); c.fill();
    }
    if(pointer.down){
      c.globalAlpha = 0.25; c.fillStyle = '#b3e5fc';
      c.beginPath(); c.ellipse(bodyW*0.9, 0, bodyW*0.35, bodyH*0.2, 0, 0, TAU); c.fill();
    }
    c.restore();
  } else if(perk === 'neon'){
    c.save(); c.globalAlpha = 0.22 + 0.12*Math.sin(time*8);
    c.strokeStyle = '#ea80fc'; c.lineWidth = 3;
    c.beginPath(); c.ellipse(0, 0, bodyW*1.05, bodyH*1.02, 0, 0, TAU); c.stroke();
    c.strokeStyle = '#26c6da';
    c.beginPath(); c.ellipse(0, 0, bodyW*1.18, bodyH*1.12, 0, 0, TAU); c.stroke();
    c.restore();
  } else if(perk === 'royal'){
    c.save();
    c.fillStyle = '#ffd54f'; c.strokeStyle = '#f9a825'; c.lineWidth = 1.5;
    const cx = bodyW*0.22, cy = -bodyH*0.88;
    for(let i=-2;i<=2;i++){
      c.beginPath(); c.moveTo(cx+i*bodyW*0.14, cy+bodyH*0.12);
      c.lineTo(cx+i*bodyW*0.14 - bodyW*0.05, cy-bodyH*0.2); c.lineTo(cx+i*bodyW*0.14 + bodyW*0.05, cy-bodyH*0.2); c.fill();
    }
    c.fillStyle = '#ffeb3b'; c.fillRect(cx-bodyW*0.32, cy+bodyH*0.08, bodyW*0.64, bodyH*0.1);
    c.restore();
  } else if(perk === 'classic'){
    c.save();
    c.globalAlpha = 0.2 + 0.12*Math.sin(time*8);
    const g = c.createRadialGradient(bodyW*0.1, -bodyH*0.2, 4, 0, 0, bodyW*1.05);
    g.addColorStop(0,'#c8f0e4'); g.addColorStop(1,'rgba(74,143,127,0)');
    c.fillStyle = g; c.beginPath(); c.ellipse(0, 0, bodyW*1.02, bodyH*1.0, 0, 0, TAU); c.fill();
    const wingPulse = Math.max(b.wing, b.flapBoost, 1 - wingFlapAmount(b, time));
    if(wingPulse > 0.35){
      c.globalAlpha = wingPulse * 0.22;
      c.strokeStyle = '#7ec4a0'; c.lineWidth = 2.5; c.lineCap = 'round';
      for(const side of [-1, 1]){
        const arc = 0.4 - wingPulse * 0.9;
        c.beginPath();
        c.ellipse(side*bodyW*0.35, -bodyH*0.05, bodyW*0.55, bodyH*0.42, side*arc, 0, TAU);
        c.stroke();
      }
    }
    c.restore();
  } else if(perk === 'storm'){
    if(b.flapBoost > 0.25){
      c.save(); c.globalAlpha = b.flapBoost*0.85; c.strokeStyle = '#ffee58'; c.lineWidth = 2.5; c.lineCap = 'round';
      c.beginPath(); c.moveTo(-bodyW*0.3, -bodyH*0.2);
      c.lineTo(-bodyW*0.7, -bodyH*0.45); c.lineTo(-bodyW*0.5, -bodyH*0.05); c.lineTo(-bodyW*1.0, bodyH*0.1); c.stroke();
      c.strokeStyle = '#b39ddb';
      c.beginPath(); c.moveTo(-bodyW*0.2, bodyH*0.1); c.lineTo(-bodyW*0.55, bodyH*0.35); c.stroke();
      c.restore();
    }
  }
}

/* ============================ DRAWING: BIRD =============================== */
function wingBeatWave(cycle){
  const t = cycle;
  if(t < 0.27) return smoothstep(0, 1, t / 0.27);
  return 1 - smoothstep(0, 1, (t - 0.27) / 0.73);
}
function wingFlapAmount(b, time){
  let cycle = b.wingCycle ?? 0;
  if(state !== STATE.PLAY || game.intro > 0) cycle = (time * 4.0) % 1;
  let amt = wingBeatWave(cycle);
  const boost = Math.max(b.wing || 0, b.flapBoost || 0);
  if(boost > 0.08) amt = lerp(amt, Math.min(amt + 0.18, 1), smoothstep(0, 1, boost));
  return amt;
}
function updateBirdWingCycle(b, dt){
  let rate = pointer.down ? 3.4 : 4.6;
  if((b.flapBoost || 0) > 0.15) rate = 6.8;
  else if((b.wing || 0) > 0.2) rate = 5.8;
  if(getBirdSpec().perk === 'classic') rate *= 1.04;
  b.wingCycle = ((b.wingCycle || 0) + dt * rate) % 1;
}
const BIRD_MOODS = ['stretch', 'preen', 'bob', 'peek'];
function pickBirdMood(b){
  b.moodKind = BIRD_MOODS[randi(0, BIRD_MOODS.length - 1)];
  b.moodPhase = 0;
  b.moodTime = b.moodKind === 'preen' ? 1.05 : b.moodKind === 'stretch' ? 0.9 : 0.65;
}
function updateBirdAnimations(b, dt){
  if(b.stagger > 0) b.stagger = Math.max(0, b.stagger - dt * 2.4);
  if(state !== STATE.PLAY || game.intro > 0) return;
  const busy = b.stagger > 0.08 || (b.flapBoost || 0) > 0.18 || Math.abs(b.vy) > 200 || game.invuln > 0;
  if(b.moodKind){
    if(busy){ b.moodKind = null; b.moodTimer = rand(2.5, 5); return; }
    b.moodPhase += dt / b.moodTime;
    if(b.moodPhase >= 1){ b.moodKind = null; b.moodTimer = rand(3.5, 7); }
    return;
  }
  if(busy) return;
  b.moodTimer -= dt;
  if(b.moodTimer <= 0 && pointer.down) pickBirdMood(b);
}
function birdEyeExpression(b){
  if((b.stagger || 0) > 0.35) return 'hurt';
  if(b.vy > 220) return 'squint';
  if(b.vy < -185 || (b.flapBoost || 0) > 0.45) return 'wide';
  if(b.moodKind === 'peek') return 'peek';
  if((b.happy || 0) > 0.2) return 'happy';
  return 'normal';
}
function drawBirdEye(c, eyeX, eyeY, eyeR, spec, expr, eat){
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(eyeX, eyeY, eyeR, 0, TAU); c.fill();
  if(expr !== 'hurt' && expr !== 'squint'){
    c.globalAlpha = 0.35;
    c.beginPath(); c.arc(eyeX - eyeR * 0.55, eyeY + eyeR * 0.08, eyeR * 0.72, 0, TAU); c.fill();
    c.globalAlpha = 1;
  }
  if(expr === 'hurt'){
    c.strokeStyle = '#4e342e'; c.lineWidth = 2.4; c.lineCap = 'round';
    c.beginPath();
    c.moveTo(eyeX - eyeR * 0.55, eyeY - eyeR * 0.2); c.lineTo(eyeX - eyeR * 0.1, eyeY + eyeR * 0.15);
    c.moveTo(eyeX + eyeR * 0.1, eyeY - eyeR * 0.15); c.lineTo(eyeX + eyeR * 0.55, eyeY + eyeR * 0.2);
    c.stroke();
    return;
  }
  if(expr === 'squint'){
    c.strokeStyle = spec.eye; c.lineWidth = 2.8; c.lineCap = 'round';
    c.beginPath();
    c.moveTo(eyeX - eyeR * 0.75, eyeY + eyeR * 0.05); c.quadraticCurveTo(eyeX, eyeY - eyeR * 0.12, eyeX + eyeR * 0.75, eyeY + eyeR * 0.05);
    c.stroke();
    return;
  }
  const pupilR = expr === 'wide' ? eyeR * 0.62 : eyeR * 0.55;
  const pupilY = eyeY + (expr === 'peek' ? -eyeR * 0.22 : eat > 0 ? eyeR * 0.1 : 0);
  const pupilX = eyeX + eyeR * 0.18 + (expr === 'peek' ? eyeR * 0.08 : 0);
  c.fillStyle = spec.eye;
  c.beginPath(); c.arc(pupilX, pupilY, pupilR, 0, TAU); c.fill();
  if(expr === 'happy'){
    c.strokeStyle = spec.eye; c.lineWidth = 2;
    c.beginPath(); c.arc(eyeX, eyeY + eyeR * 0.42, eyeR * 0.42, 0.18, Math.PI - 0.18); c.stroke();
  }
  c.fillStyle = '#fff';
  c.beginPath(); c.arc(eyeX + eyeR * 0.08, eyeY - eyeR * 0.22, eyeR * (expr === 'wide' ? 0.28 : 0.22), 0, TAU); c.fill();
  c.beginPath(); c.arc(eyeX - eyeR * 0.12, eyeY - eyeR * 0.05, eyeR * 0.1, 0, TAU); c.fill();
}
function drawBirdRecoverFx(c, b, invuln){
  const t = game.t;
  const fade = clamp(invuln / 1.3, 0, 1);
  const pulse = 0.5 + 0.5 * Math.sin(t * 11);
  const rr = b.r * (1.22 + game.displayFat * 0.22);
  c.save();
  c.translate(b.x, b.y);
  c.globalAlpha = (0.28 + pulse * 0.22) * fade;
  c.strokeStyle = '#fff59d';
  c.lineWidth = 2.5;
  c.setLineDash([7, 9]);
  c.lineDashOffset = -t * 36;
  c.beginPath(); c.arc(0, 0, rr + pulse * 5, 0, TAU); c.stroke();
  c.setLineDash([]);
  for(let i = 0; i < 5; i++){
    const a = t * 3.2 + i * TAU / 5;
    c.globalAlpha = (0.45 + 0.25 * Math.sin(t * 7 + i)) * fade;
    c.fillStyle = ['#fff59d', '#7ec4a0', '#90caf9'][i % 3];
    c.beginPath(); c.arc(Math.cos(a) * rr * 1.08, Math.sin(a) * rr * 0.92, 3.2, 0, TAU); c.fill();
  }
  c.restore();
}
function drawBirdGlideTrail(c, b, time){
  if(!pointer.down || state !== STATE.PLAY || game.intro > 0) return;
  if(Math.abs(b.vy) < 40) return;
  c.save();
  c.translate(b.x, b.y);
  for(let i = 1; i <= 3; i++){
    const alpha = 0.08 + 0.04 * (3 - i);
    c.globalAlpha = alpha;
    c.fillStyle = getBirdSpec().wing;
    c.beginPath();
    c.ellipse(-b.r * (0.55 + i * 0.18), i * 4, b.r * 0.22, b.r * 0.08, -0.2, 0, TAU);
    c.fill();
  }
  c.restore();
}
function drawBird(c, b, fat, time){
  const spec = getBirdSpec();
  const isClassic = spec.perk === 'classic';
  let flapAmt = wingFlapAmount(b, time);
  let wingAmp = isClassic ? 1.55 : 1.12;
  const eatScale = 1 + (b.eatPop||0)*0.12;
  const fitStretch = 1 + (1 - fat) * 0.06;
  const squash = (b.bodySquash || 1) / fitStretch;
  const stagger = b.stagger || 0;
  const mood = b.moodKind;
  const moodT = smoothstep(0, 1, b.moodPhase || 0);

  if(mood === 'stretch') wingAmp *= 1 + Math.sin(moodT * Math.PI) * 0.22;
  if(mood === 'preen') flapAmt = lerp(flapAmt, 0.12, moodT * 0.65);

  c.save();
  c.translate(b.x, b.y + Math.pow(1 - flapAmt, 1.35) * 2.8);
  if(stagger > 0.01){
    c.translate(Math.sin(time * 38) * stagger * 9, Math.sin(time * 24) * stagger * 5);
    c.rotate(Math.sin(time * 18) * 0.14 * stagger);
  }
  if(mood === 'bob') c.translate(0, -Math.sin(moodT * Math.PI) * 7);
  if(mood === 'peek') c.rotate(-0.08 * Math.sin(moodT * Math.PI));
  c.rotate(clamp(b.tilt,-0.5,0.9));
  c.scale(eatScale/squash, squash/eatScale);

  const bodyW = b.r*(1.02 + 0.48*fat);
  const bodyH = b.r*(0.98 + 0.28*fat);

  // Shadow under bird
  c.save();
  c.globalAlpha=0.18; c.fillStyle='#000';
  c.beginPath(); c.ellipse(6, bodyH*0.95, bodyW*0.9, bodyH*0.32,0,0,TAU); c.fill();
  c.restore();

  drawBirdTail(c, bodyW, bodyH, spec.tail, fat, flapAmt);

  const backFlap = clamp(flapAmt * 0.94 + 0.03, 0, 1);
  drawWing(c, -bodyW*0.15, -2, bodyW*0.85, bodyH*0.9, -1, backFlap, shade(spec.wing,-10), wingAmp, true);

  const grad = c.createLinearGradient(0,-bodyH,0,bodyH);
  const top = mixColor(spec.top, shade(spec.top, 30), 1-fat);
  const bot = mixColor(spec.bot, shade(spec.bot, -25), 1-fat);
  grad.addColorStop(0, top);
  grad.addColorStop(1, bot);
  c.fillStyle = grad;
  c.beginPath();
  c.ellipse(0,0, bodyW, bodyH, 0, 0, TAU);
  c.fill();

  // Mint/cream belly (poster NutriCrew style)
  const bellyCol = spec.belly || '#c8f0e4';
  const bellyG = c.createRadialGradient(bodyW*0.12, bodyH*0.28, bodyW*0.08, bodyW*0.22, bodyH*0.42, bodyW*0.72);
  bellyG.addColorStop(0, shade(bellyCol, 18));
  bellyG.addColorStop(0.55, bellyCol);
  bellyG.addColorStop(1, 'rgba(200,240,228,0)');
  c.fillStyle = bellyG;
  c.beginPath();
  c.ellipse(bodyW*0.16, bodyH*0.3, bodyW*0.58, bodyH*0.58*(0.75+0.35*fat), 0.08, 0, TAU);
  c.fill();
  // Soft highlight
  c.fillStyle = 'rgba(255,255,255,'+(0.22)+')';
  c.beginPath();
  c.ellipse(bodyW*0.22, bodyH*0.18, bodyW*0.38, bodyH*0.28, -0.2, 0, TAU);
  c.fill();
  // Cheek blush
  c.fillStyle = spec.cheek;
  c.beginPath(); c.ellipse(bodyW*0.45, bodyH*0.12, bodyW*0.14, bodyH*0.10,0,0,TAU); c.fill();

  // Happy sparkles after eating fruit
  if((b.happy||0)>0.1){
    c.save();
    c.globalAlpha = clamp(b.happy,0,1)*0.9;
    for(let i=0;i<4;i++){
      const a = time*6 + i*TAU/4;
      const sx = bodyW*0.55 + Math.cos(a)*bodyW*0.35;
      const sy = -bodyH*0.35 + Math.sin(a)*bodyH*0.25;
      drawStar(c,sx,sy,5,2.5,4); c.fillStyle='#fff59d'; c.fill();
    }
    c.restore();
  }

  drawWing(c, bodyW*0.05, -bodyH*0.1, bodyW*0.95, bodyH*1.0, 1, flapAmt, spec.wing, wingAmp, false);

  // Headband (sweatband) appears as bird gets fitter
  if(fat<0.7){
    c.save();
    c.globalAlpha = clamp((0.7-fat)/0.5,0,1);
    c.fillStyle='#ff5a5f';
    c.beginPath();
    c.ellipse(bodyW*0.30, -bodyH*0.72, bodyW*0.5, bodyH*0.18, -0.15,0,Math.PI);
    c.fill();
    c.fillStyle='#fff';
    c.fillRect(bodyW*0.18,-bodyH*0.82, bodyW*0.10, bodyH*0.12);
    c.restore();
  }

  // Eye — large expressive (poster style)
  const eyeX=bodyW*0.48, eyeY=-bodyH*0.22, eyeR=b.r*0.30;
  if(mood === 'preen'){
    c.save();
    c.translate(bodyW * 0.08, -bodyH * 0.05);
    c.rotate(0.42 * Math.sin(moodT * Math.PI));
    drawBirdEye(c, eyeX - bodyW * 0.08, eyeY + bodyH * 0.05, eyeR * 0.92, spec, birdEyeExpression(b), b.eat || 0);
    c.restore();
  } else {
    drawBirdEye(c, eyeX, eyeY, eyeR, spec, birdEyeExpression(b), b.eat || 0);
  }

  drawBirdSpeciesFx(c, spec, b, fat, time, bodyW, bodyH);

  c.fillStyle = spec.beak;
  const beakOpen = b.eat>0 ? 0.5*Math.sin(time*30)+0.5 : 0;
  c.beginPath();
  c.moveTo(bodyW*0.85, -bodyH*0.05);
  c.lineTo(bodyW*(1.25), bodyH*0.02 - beakOpen*4);
  c.lineTo(bodyW*0.86, bodyH*0.12);
  c.closePath(); c.fill();
  c.fillStyle = spec.beakLower || shade(spec.beak, -12);
  c.beginPath();
  c.moveTo(bodyW*0.85, bodyH*0.06);
  c.lineTo(bodyW*(1.22), bodyH*0.06 + beakOpen*5);
  c.lineTo(bodyW*0.86, bodyH*0.18);
  c.closePath(); c.fill();

  // Orange feet (poster)
  const legSpread = lerp(0.15,0.05,fat);
  const legTuck = pointer.down && state === STATE.PLAY ? lerp(0, 0.18, smoothstep(0, 1, clamp((b.vy + 80) / 220, 0, 1))) : 0;
  c.strokeStyle='#e8955a'; c.lineWidth=3; c.lineCap='round';
  for(const s of [-1,1]){
    c.beginPath();
    c.moveTo(bodyW*0.05+s*bodyW*legSpread, bodyH*0.85);
    c.lineTo(bodyW*0.05+s*bodyW*(legSpread - legTuck*0.4), bodyH*(1.05 - legTuck));
    c.stroke();
    c.beginPath();
    c.moveTo(bodyW*0.05+s*bodyW*(legSpread - legTuck*0.4), bodyH*(1.05 - legTuck));
    c.lineTo(bodyW*0.05+s*bodyW*(legSpread - legTuck*0.4) - s*4, bodyH*(1.1 - legTuck));
    c.moveTo(bodyW*0.05+s*bodyW*(legSpread - legTuck*0.4), bodyH*(1.05 - legTuck));
    c.lineTo(bodyW*0.05+s*bodyW*(legSpread - legTuck*0.4) + s*5, bodyH*(1.08 - legTuck));
    c.stroke();
  }

  drawShieldBubble(c, b);
  c.restore();
}
function drawWingFeather(c, ox, oy, angle, length, width, color, alpha){
  c.save();
  c.translate(ox, oy);
  c.rotate(angle);
  c.globalAlpha *= alpha;
  const rootW = width * 0.34;
  const midW = width * 0.44;
  const tipW = width * 0.05;
  c.fillStyle = color;
  c.beginPath();
  c.moveTo(0, 0);
  c.lineTo(length * 0.12, -rootW * 0.55);
  c.quadraticCurveTo(length * 0.48, -midW, length * 0.94, -tipW);
  c.lineTo(length, tipW * 0.65);
  c.quadraticCurveTo(length * 0.52, midW * 0.78, length * 0.16, rootW * 0.48);
  c.quadraticCurveTo(length * 0.05, rootW * 0.22, 0, 0);
  c.closePath();
  c.fill();
  c.strokeStyle = shade(color, -32);
  c.lineWidth = Math.max(0.45, width * 0.055);
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(0, 0);
  c.lineTo(length * 0.97, tipW * 0.12);
  c.stroke();
  c.strokeStyle = 'rgba(255,255,255,0.2)';
  c.lineWidth = Math.max(0.35, width * 0.04);
  c.beginPath();
  c.moveTo(length * 0.18, -rootW * 0.18);
  c.quadraticCurveTo(length * 0.62, -midW * 0.52, length * 0.9, -tipW * 0.45);
  c.stroke();
  c.restore();
}
function drawBirdTail(c, bodyW, bodyH, color, fat, flapAmt){
  const count = 9;
  const mid = (count - 1) / 2;
  const rootX = -bodyW * 0.56;
  const rootY = bodyH * 0.04;
  const fanOpen = 0.38 + (1 - flapAmt) * 0.16;
  c.fillStyle = shade(color, 10);
  c.beginPath();
  c.moveTo(rootX + bodyW * 0.06, rootY - bodyH * 0.06);
  c.quadraticCurveTo(rootX - bodyW * 0.28, rootY - bodyH * 0.12, rootX - bodyW * 0.42, rootY);
  c.quadraticCurveTo(rootX - bodyW * 0.28, rootY + bodyH * 0.12, rootX + bodyW * 0.06, rootY + bodyH * 0.08);
  c.closePath();
  c.fill();
  for(let i = 0; i < count; i++){
    const off = i - mid;
    const norm = off / mid;
    const centerBoost = 1 - Math.abs(norm) * 0.28;
    const len = bodyW * (0.62 + centerBoost * 0.32 + fat * 0.04);
    const ang = Math.PI + norm * fanOpen + 0.06;
    const fw = bodyH * (0.09 + centerBoost * 0.08);
    const col = shade(color, -10 + Math.abs(off) * 4);
    drawWingFeather(c, rootX + norm * bodyW * 0.035, rootY + Math.abs(norm) * bodyH * 0.02, ang, len, fw, col, 0.95);
  }
}
function drawWing(c, x, y, w, h, dir, flapAmt, color, wingAmp, isBack){
  wingAmp = wingAmp ?? 1;
  const smoothFlap = smoothstep(0, 1, flapAmt);
  const beat = 1 - smoothFlap;
  c.save();
  c.translate(x, y);
  const downA = 0.52 * wingAmp;
  const upA = -0.92 * wingAmp;
  const a = -lerp(downA, upA, smoothFlap) * dir;
  c.rotate(a);
  const spread = 0.62 + beat * 0.38;
  const span = w * spread;
  const depth = h * (0.48 + beat * 0.16);
  c.globalAlpha = isBack ? 0.82 : 1;
  c.fillStyle = shade(color, 8);
  c.beginPath();
  c.ellipse(dir * w * 0.06, h * 0.02, w * 0.14, h * 0.12, dir * 0.3, 0, TAU);
  c.fill();
  const covertCount = isBack ? 4 : 5;
  for(let i = 0; i < covertCount; i++){
    const t = covertCount > 1 ? i / (covertCount - 1) : 0;
    const ang = dir * lerp(0.08, 0.42, t) + dir * beat * 0.08;
    const len = span * lerp(0.32, 0.52, t);
    const fw = depth * lerp(0.62, 0.44, t);
    drawWingFeather(c, dir * w * 0.01, h * 0.08 + t * h * 0.04, ang, len, fw, shade(color, -8), 0.9);
  }
  const primCount = isBack ? 6 : 8;
  for(let i = 0; i < primCount; i++){
    const t = primCount > 1 ? i / (primCount - 1) : 0;
    const ang = dir * lerp(0.38, 1.12, t) + dir * (0.12 + beat * 0.1);
    const len = span * lerp(0.55, 1.08, t);
    const fw = depth * lerp(0.48, 0.22, t);
    const col = i % 2 ? color : shade(color, -12);
    drawWingFeather(c, dir * w * 0.03, h * 0.02 + t * h * 0.07, ang, len, fw, col, isBack ? 0.92 : 1);
  }
  c.fillStyle = shade(color, 12);
  c.beginPath();
  c.moveTo(0, h * 0.02);
  c.quadraticCurveTo(dir * w * 0.18, -h * 0.12, dir * w * 0.28, h * 0.04);
  c.quadraticCurveTo(dir * w * 0.1, h * 0.18, 0, h * 0.12);
  c.closePath();
  c.fill();
  if(!isBack && beat > 0.35){
    c.globalAlpha = beat * 0.14;
    c.strokeStyle = 'rgba(255,255,255,0.45)';
    c.lineWidth = 1.2;
    c.beginPath();
    c.moveTo(dir * w * 0.1, h * 0.06);
    c.quadraticCurveTo(dir * span * 0.45, -depth * 0.16, dir * span * 0.84, h * 0.1);
    c.stroke();
  }
  c.restore();
}
function mixColor(h1,h2,t){
  const a=parseInt(h1.slice(1),16), b=parseInt(h2.slice(1),16);
  const r=Math.round(lerp((a>>16)&255,(b>>16)&255,t));
  const g=Math.round(lerp((a>>8)&255,(b>>8)&255,t));
  const bl=Math.round(lerp(a&255,b&255,t));
  return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}

/* ============================ DRAWING: FOOD ============================== */
const HEALTHY = ['strawberry','leaf','almond','apple','broccoli','carrot','banana','cherry','grapes','watermelon','pepper','kiwi'];
const JUNK    = ['donut','burger','fries','soda','candy','cake'];
function foodAnimState(f, t){
  const bobA = f.bob ?? 0;
  const sr = f.spinRate ?? 1;
  return {
    x: f.x + Math.cos(t * 1.85 + bobA * 1.35) * 3.2,
    y: f.y + Math.sin(t * 2.55 + bobA) * 6.5 + Math.sin(t * 4.8 + bobA * 2.1) * 2.2,
    spin: Math.sin(t * 1.35 * sr + bobA) * 0.13 + Math.sin(t * 3.1 + bobA * 0.7) * 0.04,
    pulse: 1 + 0.055 * Math.sin(t * 4.1 + bobA),
    bobA,
  };
}
function foodRadial(c, r, stops, ox, oy){
  const g = c.createRadialGradient((ox??-0.28)*r, (oy??-0.32)*r, r*0.08, 0, 0, r);
  stops.forEach(([p,col]) => g.addColorStop(p, col));
  c.fillStyle = g;
}
function foodLinear(c, x0, y0, x1, y1, stops){
  const g = c.createLinearGradient(x0, y0, x1, y1);
  stops.forEach(([p,col]) => g.addColorStop(p, col));
  c.fillStyle = g;
}
function foodSpecular(c, r, x, y, w, h, rot){
  c.save(); c.rotate(rot||0.35);
  c.fillStyle='rgba(255,255,255,0.55)';
  c.beginPath(); c.ellipse(x*r, y*r, w*r, h*r, 0, 0, TAU); c.fill();
  c.restore();
}
function foodDropShadow(c, r, alpha){
  c.save();
  c.globalAlpha = alpha ?? 0.22;
  c.fillStyle = '#081410';
  c.beginPath();
  c.ellipse(0, r * 0.9, r * 0.64, r * 0.13, 0, 0, TAU);
  c.fill();
  c.restore();
}
function foodShimmerDot(c, r, t, bobA){
  c.save();
  c.globalAlpha = 0.4 + 0.35 * Math.sin(t * 6.8 + bobA);
  c.fillStyle = 'rgba(255,255,255,0.92)';
  const sx = Math.cos(t * 2.3 + bobA) * r * 0.24 - r * 0.2;
  const sy = Math.sin(t * 1.9 + bobA) * r * 0.2 - r * 0.3;
  c.beginPath(); c.arc(sx, sy, r * 0.075, 0, TAU); c.fill();
  c.restore();
}
function foodBloom(c, r){
  c.save();
  c.globalAlpha = 0.18;
  c.fillStyle = '#fff';
  c.beginPath(); c.ellipse(-r * 0.08, -r * 0.12, r * 0.42, r * 0.38, -0.25, 0, TAU); c.fill();
  c.restore();
}
function drawFoodAura(c, x, y, r, pulse, t, bobA, color){
  c.save();
  const breathe = 1 + 0.08 * Math.sin(t * 3.8 + bobA);
  c.globalAlpha = 0.24 + 0.14 * Math.sin(t * 5.2 + bobA);
  const g = c.createRadialGradient(x, y, r * 0.2, x, y, r * 1.7 * pulse * breathe);
  g.addColorStop(0, color);
  g.addColorStop(1, 'transparent');
  c.fillStyle = g;
  c.beginPath(); c.arc(x, y, r * 1.7 * pulse * breathe, 0, TAU); c.fill();
  const sparkA = t * 4.5 + bobA;
  c.globalAlpha = 0.35 + 0.3 * Math.sin(t * 8 + bobA);
  c.fillStyle = '#fffde7';
  c.beginPath();
  c.arc(x + Math.cos(sparkA) * r * 1.05, y + Math.sin(sparkA * 1.15) * r * 0.55 - r * 0.15, r * 0.07, 0, TAU);
  c.fill();
  c.restore();
}

  const bobA = bob ?? 0;
  if(isJunkFood){
    c.save();
    c.globalAlpha = 0.16 + 0.1 * Math.sin(t * 4.8 + bobA);
    c.fillStyle = '#ff5252';

  switch(type){

      c.beginPath(); c.moveTo(r * 0.04, -r * 0.52); c.quadraticCurveTo(r * 0.1, -r * 0.78, r * 0.12, -r * 0.95); c.stroke();
      foodLinear(c, -r * 0.2, -r * 0.95, r * 0.45, -r * 0.65, [[0,'#689f38'],[1,'#33691e']]);
      c.beginPath();
      c.moveTo(r * 0.08, -r * 0.88);
      c.quadraticCurveTo(r * 0.42, -r * 0.92, r * 0.52, -r * 0.68);
      c.quadraticCurveTo(r * 0.28, -r * 0.72, r * 0.08, -r * 0.88);
      c.fill();
      c.strokeStyle = '#1b5e20'; c.lineWidth = r * 0.04;
      c.beginPath(); c.moveTo(r * 0.18, -r * 0.82); c.lineTo(r * 0.38, -r * 0.78); c.stroke();

    case 'banana': {
      c.rotate(-0.42);
      c.lineWidth = r * 0.5; c.lineCap = 'round';
      foodLinear(c, -r * 0.6, -r * 0.2, r * 0.5, r, [[0,'#fff9c4'],[0.35,'#ffee58'],[0.72,'#fbc02d'],[1,'#f57f17']]);

        foodLinear(c, i * r * 0.22, -r * 0.75, i * r * 0.22, r * 0.85, [[0,'#fff9c4'],[0.45,'#ffca28'],[1,'#f57c00']]);

      }
      break; }
    case 'soda': {
      foodLinear(c, 0, -r * 0.85, 0, r * 0.85, [[0,'#ef5350'],[0.55,'#c62828'],[1,'#7f0000']]);
      rr(c, -r * 0.5, -r * 0.8, r * 1.0, r * 1.6, r * 0.16); c.fill();
      c.fillStyle = 'rgba(255,255,255,0.7)';
      c.beginPath(); c.ellipse(-r * 0.14, -r * 0.08, r * 0.12, r * 0.45, -0.22, 0, TAU); c.fill();
      c.fillStyle = '#cfd8dc'; c.fillRect(-r * 0.52, -r * 0.92, r * 1.04, r * 0.14);
      c.fillStyle = '#b71c1c'; c.fillRect(-r * 0.38, r * 0.18, r * 0.76, r * 0.28);

      c.fillText('COLA', 0, r * 0.32);

    case 'candy': {
      foodRadial(c, r * 0.54, [[0,'#f3e5f5'],[0.5,'#ba68c8'],[1,'#6a1b9a']]);
      c.beginPath(); c.arc(0, 0, r * 0.54, 0, TAU); c.fill();
      for(const s of [-1, 1]){
        foodLinear(c, s * r * 0.5, 0, s * r * 0.95, 0, [[0,'#fce4ec'],[1,'#f48fb1']]);
        c.beginPath(); c.moveTo(s * r * 0.5, 0); c.lineTo(s * r * 0.98, -r * 0.4); c.lineTo(s * r * 0.98, r * 0.4); c.closePath(); c.fill();
      }
      c.strokeStyle = 'rgba(255,255,255,0.75)'; c.lineWidth = r * 0.08;
      c.beginPath(); c.arc(0, 0, r * 0.3, 0, TAU); c.stroke();
      break; }
    case 'cake': {
      c.fillStyle = '#fff8e1'; c.fillRect(-r * 0.7, r * 0.04, r * 1.4, r * 0.84);
      foodLinear(c, 0, -r * 0.5, 0, r * 0.2, [[0,'#f8bbd0'],[1,'#ec407a']]);
      c.beginPath(); c.moveTo(-r * 0.7, r * 0.04); c.quadraticCurveTo(0, -r * 0.45, r * 0.7, r * 0.04); c.lineTo(r * 0.7, r * 0.16); c.lineTo(-r * 0.7, r * 0.16); c.fill();
      c.fillStyle = '#e53935'; c.beginPath(); c.arc(0, -r * 0.4, r * 0.16, 0, TAU); c.fill();
      c.strokeStyle = '#ffb300'; c.lineWidth = r * 0.07; c.lineCap = 'round';
      c.beginPath(); c.moveTo(0, -r * 0.58); c.lineTo(0, -r * 0.95); c.stroke();
      c.fillStyle = '#ff9800';
      c.beginPath(); c.ellipse(0, -r * 0.98, r * 0.1, r * 0.16, 0, 0, TAU); c.fill();
      foodSpecular(c, r, -0.2, 0.12, 0.26, 0.22);

  }
  if(!isJunkFood && type !== 'golden' && type !== 'alarmclock' && type !== 'turboorange' && type !== 'dragonfruit' && type !== 'firePineapple' && type !== 'iceMango' && type !== 'glowCoconut'){

}

/* ====================== DRAWING: BACKGROUNDS / THEMES ===================== */
function drawSky(c, lv){
  const g=c.createLinearGradient(0,0,0,H);
  const sky = lv.sky || ['#9be7ff','#cdf6c9'];
  g.addColorStop(0, sky[0]);
  g.addColorStop(0.55, sky[1] || sky[0]);
  g.addColorStop(1, sky[2] || sky[1] || sky[0]);
  c.fillStyle=g; c.fillRect(0,0,W,H);
  if(lv.deco){
    c.save(); c.globalAlpha=0.07;
    const rg=c.createRadialGradient(W*0.5,H*0.35,20,W*0.5,H*0.35,W*0.85);
    rg.addColorStop(0, lv.deco); rg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=rg; c.fillRect(0,0,W,H); c.restore();
  }
}
function hill(c, baseY, amp, col, scroll, step, seedOffset){
  c.fillStyle=col;
  c.beginPath(); c.moveTo(0,H);
  c.lineTo(0,baseY);
  for(let x=0;x<=W+step;x+=step){
    const y = baseY - (Math.sin((x+scroll+seedOffset)*0.004)*0.5+0.5)*amp - Math.sin((x+scroll)*0.013+seedOffset)*amp*0.25;
    c.lineTo(x,y);
  }
  c.lineTo(W,H); c.closePath(); c.fill();
}
function cloud(c,x,y,s,alpha){
  c.save(); c.globalAlpha=alpha; c.fillStyle='#fff';
  c.beginPath();
  c.arc(x,y,s,0,TAU); c.arc(x+s*0.9,y+s*0.1,s*0.8,0,TAU); c.arc(x-s*0.9,y+s*0.1,s*0.7,0,TAU); c.arc(x+s*0.2,y-s*0.5,s*0.7,0,TAU);
  c.fill(); c.restore();
}
function sun(c,x,y,r,col){
  const g=c.createRadialGradient(x,y,r*0.2,x,y,r*2.2);
  g.addColorStop(0,col); g.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=g; c.beginPath(); c.arc(x,y,r*2.2,0,TAU); c.fill();
  c.fillStyle=col; c.beginPath(); c.arc(x,y,r,0,TAU); c.fill();
}

function drawBackground(c, lv, scroll, t){

  switch(lv.theme){
    case 'forest':

      hill(c, gy, H*0.28, '#2d5a48', s1, 48, 0);
      hill(c, gy+8, H*0.2, '#3d6b5c', s2, 42, 140);

    case 'desert':
      sun(c, W*0.7, H*0.22, 46, '#ffca28');
      hill(c, gy, H*0.12, '#bf7b1a', s1, 60, 0);
      hill(c, gy+20, H*0.09, '#e6a020', s2, 70, 80);
      hill(c, gy+28, H*0.05, '#f4c04d', s3, 50, 200);
      drawCacti(c, gy, s2);
      drawDesertDeco(c, s1, t);
      break;
    case 'antarctica':
      for(let i=0;i<55;i++){ const x=(i*97 - s2*0.5)%(W+40); const y=(i*53)%H; c.fillStyle='rgba(255,255,255,'+(0.55+0.45*((i%5)/5))+')'; c.beginPath(); c.arc(x,y,2+ (i%3),0,TAU); c.fill(); }
      hill(c, gy, H*0.18, '#b8dcff', s1, 50, 0);
      hill(c, gy+10, H*0.14, '#d8eeff', s2, 44, 90);
      drawIcebergs(c, gy, s2);
      break;
    case 'underwater':
      drawBubbles(c, t, s2);
      drawSeaweed(c, gy, s2);
      drawFishSchool(c, s2, t);
      // light rays
      c.save(); c.globalAlpha=0.12; c.fillStyle='#bfffe8';
      for(let i=0;i<4;i++){ const x=(i*W*0.3 - s1*0.2)%(W+200); c.beginPath(); c.moveTo(x,0); c.lineTo(x+60,0); c.lineTo(x+140,H); c.lineTo(x+40,H); c.fill(); }
      c.restore();
      break;
    default:
      // City themes share generic skyline + landmark
      drawCity(c, lv, scroll, t, gy);
  }
}

/* ---- Gap / floating hazards ---- */
function spawnGapHazards(pipe){
  const minPass = minPassageForBird();
  if(pipe.gapH < minPass + 24) return;
  const fair = obstacleFairness();
  const ph = runPhase();
  let chance = lerp(0.02, ph >= 2 ? 0.26 : ph >= 1 ? 0.14 : 0.08, fair);
  if(fair < 0.22) chance *= 0.4;
  if(srand() > chance) return;
  const maxHazards = fair < 0.28 ? 1 : fair < 0.58 ? 2 : 2;
  if(game.gapHazards.filter(g => g.pipeId === pipe.id).length >= maxHazards) return;

  const roll = srand();
  if(roll < 0.42 && pipe.gapH > minPass * 1.9){
    const barH = clamp(pipe.gapH * lerp(0.06, 0.1, fair), 8, 13);
    const relY = fair < 0.38
      ? (srand() < 0.5 ? pipe.gapH * 0.06 : pipe.gapH * 0.82 - barH)
      : pipe.gapH * srandf(0.28, 0.52);
    game.gapHazards.push({
      pipeId:pipe.id, kind:'bar', x:pipe.x, w:pipe.w, relY, h:barH,
      materialize:pipe.materialize, theme:pipe.kind
    });
  } else if(roll < 0.78 || fair < 0.42){
    const maxLen = pipe.gapH * lerp(0.12, 0.24, fair);
    game.gapHazards.push({
      pipeId:pipe.id, kind:'spike', x:pipe.x, w:pipe.w,
      fromTop: fair < 0.35 ? srand() < 0.5 : srand() < 0.5,
      len: srandf(pipe.gapH * 0.12, maxLen),
      materialize:pipe.materialize, theme:pipe.kind
    });
  } else if(fair >= 0.42){
    game.gapHazards.push({
      pipeId:pipe.id, kind:'orb', x:pipe.x+pipe.w*0.5, w:pipe.w,
      relY:pipe.gapH*0.5, r:srandf(10,15), phase:srandf(0,TAU),
      amp:srandf(pipe.gapH*0.1,pipe.gapH*0.2) * lerp(0.5, 1, fair),
      materialize:pipe.materialize, theme:pipe.kind
    });
  }
  trimGapHazardsUntilSafe(pipe);
}
function spawnFloatMine(){
  const fair = obstacleFairness();
  if(fair < 0.38) return;
  const prev = game.obstacles.length ? game.obstacles[game.obstacles.length - 1] : null;
  const margin = minPassageForBird() * 0.55 + 24;
  let y = H * 0.38, tries = 0;
  while(tries++ < 12){
    y = srandf(H * 0.12, H * 0.58);
    if(!prev || y < prev.gapY - margin || y > prev.gapY + prev.gapH + margin) break;
  }
  game.floatMines.push({
    x:W+srandf(60,160), y, r:srandf(12,18) * lerp(0.85, 1, fair),
    phase:srandf(0,TAU), spin:srandf(-3,3), materialize:0.45
  });
}
function gapHazardWorldY(gh, pipe){
  if(gh.kind === 'orb'){
    return pipe.gapY + gh.relY + Math.sin(game.t*2.8+gh.phase)*gh.amp;
  }
  if(gh.kind === 'bar') return pipe.gapY + gh.relY;
  return pipe.gapY + (gh.fromTop ? gh.len*0.5 : pipe.gapH - gh.len*0.5);
}
function drawGapHazard(c, gh, pipe, lv){
  if(gh.materialize > 0){ c.save(); c.globalAlpha=0.3+0.15*Math.sin(game.t*7); }
  const col = obstacleColor(lv);
  if(gh.kind === 'bar'){
    const y = pipe.gapY + gh.relY;
    c.fillStyle = shade(col.main,-8);
    rr(c, pipe.x+4, y, pipe.w-8, gh.h, 5); c.fill();
    c.fillStyle = col.cap; c.fillRect(pipe.x+2, y, pipe.w-4, 4);
  } else if(gh.kind === 'spike'){
    const y0 = pipe.gapY + (gh.fromTop ? 0 : pipe.gapH - gh.len);
    c.fillStyle = gh.theme==='antarctica' ? '#b3e5fc' : shade(col.main,12);
    c.beginPath();
    if(gh.fromTop){ c.moveTo(pipe.x, y0); c.lineTo(pipe.x+pipe.w, y0); c.lineTo(pipe.x+pipe.w*0.5, y0+gh.len); }
    else { c.moveTo(pipe.x, y0+gh.len); c.lineTo(pipe.x+pipe.w, y0+gh.len); c.lineTo(pipe.x+pipe.w*0.5, y0); }
    c.closePath(); c.fill();
  } else if(gh.kind === 'orb'){
    const ox = pipe.x+pipe.w*0.5, oy = gapHazardWorldY(gh, pipe);
    const g=c.createRadialGradient(ox-gh.r*0.3,oy-gh.r*0.3,2,ox,oy,gh.r);
    g.addColorStop(0,'#ff8a65'); g.addColorStop(1,'#d84315');
    c.fillStyle=g; c.beginPath(); c.arc(ox,oy,gh.r,0,TAU); c.fill();
    c.strokeStyle='rgba(255,255,255,0.45)'; c.lineWidth=2; c.stroke();
  }
  if(gh.materialize > 0) c.restore();
}
function drawFloatMine(c, m, t){
  c.save(); c.translate(m.x,m.y); c.rotate(m.rot||0);
  if(m.materialize > 0) c.globalAlpha = 0.35+0.2*Math.sin(t*8);
  const g=c.createRadialGradient(-m.r*0.2,-m.r*0.2,1,0,0,m.r);
  g.addColorStop(0,'#ffab91'); g.addColorStop(1,'#bf360c');
  c.fillStyle=g; c.beginPath(); c.arc(0,0,m.r,0,TAU); c.fill();
  for(let i=0;i<8;i++){
    const a=i/8*TAU;
    c.fillStyle='#5d4037';
    c.beginPath(); c.moveTo(Math.cos(a)*m.r*0.55,Math.sin(a)*m.r*0.55);
    c.lineTo(Math.cos(a)*m.r*1.15,Math.sin(a)*m.r*1.15); c.lineTo(Math.cos(a+0.2)*m.r*0.55,Math.sin(a+0.2)*m.r*0.55); c.fill();
  }
  c.restore();
}
function gapHazardHit(b, gh, pipe){
  if(gh.materialize > 0) return false;
  if(gh.kind === 'bar'){
    const y = pipe.gapY + gh.relY;
    return circleRect(b.x,b.y,b.r*0.76, pipe.x+2, y, pipe.w-4, gh.h);
  }
  if(gh.kind === 'spike'){
    const cx = pipe.x+pipe.w*0.5;
    const cy = pipe.gapY + (gh.fromTop ? gh.len*0.55 : pipe.gapH - gh.len*0.55);
    const dx=b.x-cx, dy=b.y-cy;
    return dx*dx+dy*dy < (b.r*0.7+gh.len*0.22)*(b.r*0.7+gh.len*0.22);
  }
  if(gh.kind === 'orb'){
    const ox = pipe.x+pipe.w*0.5, oy = gapHazardWorldY(gh, pipe);
    const dx=b.x-ox, dy=b.y-oy;
    return dx*dx+dy*dy < (b.r*0.76+gh.r)*(b.r*0.76+gh.r);
  }
  return false;
}

/* ---- City background + landmark ---- */
function drawCityFarHouses(c, lv, scroll, gy, scenery){
  const mode = scenery.houses || 'sparse';

  const count = mode === 'far' ? 14 : 9;

  const maxH = mode === 'far' ? 95 : 72;

  for(let i = 0; i < count; i++){
    const x = ((i * 118) - s) % (W + 160);
    const xx = x < -80 ? x + W + 160 : x;
    const h = 38 + (i * 41) % maxH;
    const w = 58 + (i * 19) % 36;
    c.globalAlpha = alpha * (0.75 + (i % 4) * 0.06);
    c.fillRect(xx, gy - h, w, h);
    if(mode === 'far' && i % 2 === 0){
      c.fillStyle = 'rgba(255,235,170,0.22)';
      for(let wy = gy - h + 8; wy < gy - 10; wy += 16){
        for(let wx = xx + 8; wx < xx + w - 8; wx += 14){ c.fillRect(wx, wy, 6, 7); }
      }
      c.fillStyle = shade(lv.accent, 55);
    }
  }
  c.globalAlpha = 1;
}
function drawCityBackTerrain(c, lv, scroll, gy, scenery){
  const s = scroll * 0.14;
  if(scenery.terrain === 'desert'){
    c.fillStyle = shade(lv.ground, 18);
    hill(c, gy + 8, H * 0.09, shade(lv.ground, 8), s, 44, 12);

    c.fillStyle = shade(lv.ground, -8);
    hill(c, gy + 6, H * 0.11, shade(lv.ground, 5), s, 42, 0);

function drawCityWater(c, lv, scroll, gy, scenery, t){
  const kind = scenery.water;
  if(!kind || kind === 'none') return;
  const depth = (scenery.waterDepth || 0.15) * H;
  const waterTop = gy - depth;
  const s = scroll * 0.22;
  const waterCol = kind === 'harbor' ? (lv.deco || '#4fc3f7')
    : kind === 'lake' ? '#5eb8d4'
    : kind === 'coast' ? '#3aa8c8'
    : '#4a9ec4';
  const wg = c.createLinearGradient(0, waterTop - 20, 0, gy);
  wg.addColorStop(0, shade(waterCol, 28));
  wg.addColorStop(0.35, waterCol);
  wg.addColorStop(0.85, shade(lv.ground, 5));
  wg.addColorStop(1, lv.ground);
  c.fillStyle = wg;
  c.fillRect(0, waterTop, W, gy - waterTop + 2);
  c.strokeStyle = 'rgba(255,255,255,0.32)';
  c.lineWidth = 1.8;
  const rows = kind === 'harbor' ? 5 : 4;
  for(let row = 0; row < rows; row++){
    const wy = waterTop + 14 + row * (depth / (rows + 0.5));
    c.beginPath();
    for(let x = -20; x <= W + 30; x += 18){
      const wave = Math.sin((x + s) * 0.028 + row * 0.9 + t * 1.8) * (4 + row * 0.6);
      if(x <= -20) c.moveTo(x, wy + wave);
      else c.lineTo(x, wy + wave);
    }
    c.stroke();
  }
  if(kind === 'harbor' || kind === 'coast'){
    c.fillStyle = shade(lv.ground, 8);
    for(let i = 0; i < 3; i++){
      const bx = ((i * 220) - scroll * 0.12) % (W + 140);
      const xx = bx < -70 ? bx + W + 140 : bx;
      c.beginPath();
      c.ellipse(xx, gy - 2, 48 + i * 12, 8, 0, 0, TAU);
      c.fill();
    }
  }
}
