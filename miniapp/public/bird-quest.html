function drawLandmark(c, kind, lv, scroll, gy, t, scenery){
  scenery = scenery || getCityScenery(kind);
  const period = W * 1.4;
  let lx = (W * 0.5 - (scroll % period));
  for(let k = 0; k < 2; k++){
    const x = lx + k * period;
    if(x < -period * 0.6 || x > W + period * 0.6) continue;
    c.save();
    c.translate(x, gy);
    drawLandmarkLocale(c, kind, lv, scenery, t);
    switch(kind){
      case 'eiffel':    landmarkEiffel(c); break;
      case 'bigben':    landmarkBigBen(c); break;
      case 'kremlin':   landmarkKremlin(c, t); break;
      case 'colosseum': landmarkColosseum(c); break;
      case 'liberty':   landmarkLiberty(c); break;
      case 'fuji':      landmarkFuji(c); break;
      case 'pyramids':  landmarkPyramids(c); break;
      case 'opera':     landmarkOpera(c); break;
      case 'greatwall': landmarkGreatWall(c); break;
      case 'rio':       landmarkRio(c); break;
      case 'burj':      landmarkBurj(c); break;
    }
    drawLandmarkWaterReflection(c, kind, scenery, t);
    c.restore();
  }
}

/* ============================ OBSTACLES / FOOD =========================== */
function obstacleColor(lv){
  switch(lv.theme){
    case 'forest': return {main:'#5a4f45', cap:'#43a047'};
    case 'desert': return {main:'#43a047', cap:'#2e7d32'};
    case 'antarctica': return {main:'#cdeefe', cap:'#9ad1f0'};
    case 'underwater': return {main:'#15a37a', cap:'#0e7d5e'};
    default: return {main:shade(lv.accent,10), cap:shade(lv.accent,-20)};
  }
}
function onObstaclePassed(o){
  const b = game.bird;
  game.flightsPassed++;
  progress.totalFlights = (progress.totalFlights || 0) + 1;
  bumpCombo();
  const gapMid = o.gapY + o.gapH*0.5;
  const perfect = Math.abs(b.y - gapMid) < o.gapH*0.12;
  if(perfect){
    if(game.runStats) game.runStats.perfectGates++;
    addScore(15, 'Perfect!', b.x, b.y-24, 2);
    game.invuln = Math.max(game.invuln, 0.45);
    burst(b.x, b.y, '#7ec4a0', 14, 120);
    haptic('medium');
  } else {
    addScore(2, null, b.x, b.y-20);
  }
}
function debrisKindForTheme(theme){
  if(theme==='forest') return 'branch';
  if(theme==='antarctica') return 'icicle';
  if(theme==='desert') return 'stone';
  if(theme==='underwater') return 'kelp';
  return Math.random()<0.5 ? 'branch' : 'stone';
}
function spawnDebrisFromPipe(o){
  const fromTop = Math.random()<0.5;
  const y = fromTop ? o.gapY - rand(24, 58) : o.gapY + o.gapH + rand(24, 58);
  game.debris.push({
    x: o.x + o.w*0.45 + rand(-8, 8),
    y, vy: rand(95, 185), vx: rand(-35, 35),
    type: debrisKindForTheme(o.kind),
    r: rand(12, 20), rot: rand(0, TAU), spin: rand(-5, 5),
    wobble: rand(0, TAU)
  });
}
function spawnObstacle(){
  const p=game.params;
  const lv=getLevel(game.level);
  const fair = obstacleFairness();
  const hazard = hazardActive();
  const treasure = !hazard && fair > 0.28 && srand() < 0.07;
  const minPass = minPassageForBird();
  let gapH = Math.max(H * p.gap * effectiveGapMult(), minPass + lerp(34, 16, fair));
  if(treasure) gapH = Math.max(gapH * 0.84, minPass + 18);
  const minTop = H*0.10, maxTop = H*0.80 - gapH;
  const w = clamp(W*0.13, 56, 92);
  const gapTravel = Math.max(18, (maxTop - minTop) * lerp(0.16, 0.28, fair));
  const prevPipe = game.obstacles.length ? game.obstacles[game.obstacles.length - 1] : null;
  const gapY = pickFairGapY(gapH, minTop, maxTop, prevPipe);
  const moving = true;
  const movingPhase = srandf(0, TAU);
  const movingSpeed = srandf(0.72, 1.18) * lerp(1, 1.2, fair);
  const gapCenter = gapY - Math.sin(movingPhase) * gapTravel;
  const obsId = ++game.nextObstacleId;
  const pipe = {
    id: obsId, x:W+w, w, gapY, gapH, gapYMin:minTop, gapYMax:maxTop,
    gapCenter, movingAmp: gapTravel, movingPhase, movingSpeed,
    moving, passed:false, kind:lv.theme, treasure,
    materialize: lerp(0.72, 0.48, fair), smashed:false,
    frozen: isFreezeActive(),
    debrisTimer: hazard && fair > 0.2 ? srandf(2.8, 5) : 999
  };
  game.obstacles.push(pipe);
  spawnGapHazards(pipe);
  ensurePipePassable(pipe);
  if(fair > 0.42 && srand() < lerp(0.015, 0.06, fair)) spawnFloatMine();
  let treasureSpawned = false;
  const n = randi(2, 4);
  for(let i=0;i<n;i++){
    const junk = i>0 && srand() < p.junkChance;
    const list = junk?JUNK:HEALTHY;
    let type = list[srandi(0,list.length-1)];
    if(!junk && lv.theme==='forest' && srand()<0.58){
      type = ['strawberry','leaf','almond'][srandi(0,2)];
    }

function drawZoneHazard(c, zh, t){
  if(zh.emerge <= 0.01) return;
  c.save();
  const bob = Math.sin(t*3.2 + zh.phase) * 2.5;
  const lift = (1 - zh.emerge) * zh.h * 0.55;
  const lunge = zh.lunge || 0;
  const mouth = zh.mouth || 0;
  c.translate(zh.x, zh.y + lift + bob);
  c.globalAlpha = 0.22 * zh.emerge;
  c.fillStyle = '#000';
  c.beginPath(); c.ellipse(0, 4, zh.w*0.34*zh.emerge, zh.h*0.05, 0, 0, TAU); c.fill();
  c.scale(zh.emerge, zh.emerge);
  c.globalAlpha = 0.94 + 0.06 * Math.sin(t*4 + zh.phase);
  const w = zh.w, h = zh.h;
  if(lunge > 0.6 && ['bear','hunter','shark','wolf','lion','croc','dog'].includes(zh.type)){
    c.save(); c.globalAlpha = lunge*0.35; c.fillStyle = '#ff5252';
    c.font = fontSans(18,'700'); c.textAlign='center';
    c.fillText('!', w*0.1, -h*0.95); c.restore();
  }
  switch(zh.type){
    case 'bear': drawHazardBear(c, w, h, t, lunge, mouth); break;
    case 'hunter': drawHazardHunter(c, w, h, t, lunge); break;
    case 'scorpion': drawHazardScorpion(c, w, h, t, lunge); break;
    case 'vulture': drawHazardVulture(c, w, h, t, lunge); break;

function drawNitroFlames(c, b){
  if(game.nitroTime<=0) return;
  c.save();
  const pulse = 0.75 + 0.25*Math.sin(game.t*22);
  for(let i=0;i<10;i++){
    const fy = b.y + Math.sin(game.t*16 + i*1.4)*12;
    const fx = b.x - b.r*(0.85 + i*0.14);
    c.globalAlpha = pulse * (0.4 + i*0.06);
    c.fillStyle = ['#ff9800','#ffeb3b','#ff5722','#fff176'][i%4];
    c.beginPath(); c.ellipse(fx, fy, 10+i*2.5, 5+i*1.2, 0, 0, TAU); c.fill();
  }
  c.globalAlpha = 0.42*pulse;
  const g = c.createLinearGradient(b.x-b.r*2.8, b.y, b.x, b.y);
  g.addColorStop(0, 'rgba(255,87,34,0)');
  g.addColorStop(0.45, 'rgba(255,152,0,0.85)');
  g.addColorStop(1, 'rgba(255,235,59,0.95)');
  c.fillStyle = g;
  c.beginPath(); c.moveTo(b.x-b.r*1.0, b.y);
  c.lineTo(b.x-b.r*2.9, b.y-b.r*0.55);
  c.lineTo(b.x-b.r*2.6, b.y+b.r*0.55);
  c.closePath(); c.fill();
  c.restore();
}
function drawFirebirdAura(c, b, time, pose){
  if(!pose || !isDragonActive() || game.dragonMode.rampTime > 0) return;
  const { r, bodyBob, tilt } = pose;
  const pulse = 0.72 + 0.28 * Math.sin(time * 13);

  c.save();
  c.translate(b.x, b.y + bodyBob);
  c.rotate(tilt);
  c.globalCompositeOperation = 'lighter';

  for(let ring = 0; ring < 4; ring++){
    const rad = r * (1.05 + ring * 0.32 + pulse * 0.1);
    c.globalAlpha = pulse * (0.14 - ring * 0.028);
    const g = c.createRadialGradient(0, 0, r * 0.15, 0, 0, rad);
    g.addColorStop(0, 'rgba(255,253,231,0.92)');
    g.addColorStop(0.35, 'rgba(255,193,7,0.58)');
    g.addColorStop(0.68, 'rgba(255,87,34,0.32)');
    g.addColorStop(1, 'rgba(183,28,28,0)');
    c.fillStyle = g;
    c.beginPath();
    c.ellipse(0, 0, rad * 1.18, rad * 0.82, 0, 0, TAU);
    c.fill();
  }

  const wispCount = 16;
  for(let i = 0; i < wispCount; i++){
    const a = time * 3.4 + i / wispCount * TAU;
    const dist = r * (0.55 + 0.5 * Math.sin(time * 5.2 + i * 0.65));
    const wx = Math.cos(a) * dist * 1.15;
    const wy = Math.sin(a) * dist * 0.72 - r * 0.08;
    c.globalAlpha = pulse * (0.18 + 0.14 * Math.sin(time * 7.5 + i));
    const rg = c.createRadialGradient(wx, wy, 0, wx, wy, r * 0.24);
    rg.addColorStop(0, 'rgba(255,255,255,0.95)');
    rg.addColorStop(0.38, 'rgba(255,183,77,0.62)');
    rg.addColorStop(1, 'rgba(255,87,34,0)');
    c.fillStyle = rg;
    c.beginPath();
    c.ellipse(wx, wy, r * 0.17, r * 0.1, a, 0, TAU);
    c.fill();
  }

  for(let i = 0; i < 10; i++){
    const t = (time * 2.8 + i * 0.29) % 1;
    const ex = -r * (0.7 + t * 3.1);
    const ey = Math.sin(time * 4.2 + i * 0.8) * r * (0.22 + t * 0.38) + t * r * 0.12;
    c.globalAlpha = (1 - t) * pulse * 0.55;
    c.fillStyle = i % 2 ? '#ffeb3b' : '#ff6f00';
    c.beginPath();
    c.arc(ex, ey, (3.5 + i * 0.35) * (1 - t * 0.45), 0, TAU);
    c.fill();
  }

  c.globalCompositeOperation = 'source-over';
  c.restore();
}
function computeFirebirdPose(b, time, morph){
  morph = clamp(morph ?? 1, 0.15, 1);
  const r = b.r * morph * 1.05;
  const bodyBob = Math.sin(time * 2.8) * r * 0.032;
  const tilt = b.tilt * 0.38;
  const wingPhase = time * 5.2;
  const wingFlap = 0.58 + 0.42 * Math.sin(wingPhase);
  const glow = isDragonActive() ? 1 : 0.5 + morph * 0.4;
  return { r, morph, bodyBob, tilt, wingPhase, wingFlap, glow, tailSway: Math.sin(time * 3.4) * r * 0.05 };
}
function firebirdFeatherColor(u, lit){
  const palette = [
    ['#fff8e1', '#ffd54f', '#ffb300'],
    ['#ffe082', '#ffc107', '#ff9800'],
    ['#ffcc80', '#ff9800', '#f57c00'],
    ['#ffab91', '#ff5722', '#e64a19'],
  ];
  const row = palette[Math.floor(u * palette.length) % palette.length];
  return row[lit % 3];
}
function drawFirebirdTail(c, pose, time){
  const { r, tailSway, glow } = pose;
  const baseX = -r * 0.55;
  const baseY = r * 0.08;
  const featherCount = 9;
  for(let f = 0; f < featherCount; f++){
    const spread = (f - (featherCount - 1) / 2) / (featherCount - 1);
    const len = r * (2.2 + Math.abs(spread) * 0.9);
    const angle = Math.PI * 0.92 + spread * 0.55 + tailSway * 0.02;
    const tipX = baseX + Math.cos(angle) * len;
    const tipY = baseY + Math.sin(angle) * len;
    const fg = c.createLinearGradient(baseX, baseY, tipX, tipY);
    fg.addColorStop(0, firebirdFeatherColor(f * 0.11, 0));
    fg.addColorStop(0.45, firebirdFeatherColor(f * 0.11, 1));
    fg.addColorStop(0.85, firebirdFeatherColor(f * 0.11 + 0.2, 2));
    fg.addColorStop(1, 'rgba(255,87,34,0.05)');
    c.strokeStyle = fg;
    c.lineWidth = Math.max(2, r * 0.028) * (1 - Math.abs(spread) * 0.15);
    c.lineCap = 'round';
    c.beginPath();
    c.moveTo(baseX, baseY);
    const cx = baseX + Math.cos(angle) * len * 0.55 + tailSway;
    const cy = baseY + Math.sin(angle) * len * 0.55;
    c.quadraticCurveTo(cx, cy, tipX, tipY);
    c.stroke();
    if(f % 2 === 0 || Math.abs(spread) < 0.35){
      const ex = baseX + Math.cos(angle) * len * 0.72;
      const ey = baseY + Math.sin(angle) * len * 0.72;
      const eg = c.createRadialGradient(ex, ey, 0, ex, ey, r * 0.16);
      eg.addColorStop(0, '#fff59d');
      eg.addColorStop(0.35, '#ff6f00');
      eg.addColorStop(0.7, '#c62828');
      eg.addColorStop(1, 'rgba(46,125,50,0.4)');
      c.fillStyle = eg;
      c.globalAlpha = 0.55 + glow * 0.35;
      c.beginPath();
      c.ellipse(ex, ey, r * 0.12, r * 0.09, angle, 0, TAU);
      c.fill();
      c.globalAlpha = 1;
      c.fillStyle = '#1b5e20';
      c.beginPath();
      c.ellipse(ex + r * 0.02, ey, r * 0.035, r * 0.055, angle, 0, TAU);
      c.fill();
    }
  }
}
function drawFirebirdWing(c, pose, time, side){
  const { r, wingFlap, wingPhase } = pose;
  const flap = wingFlap * (0.88 + side * 0.06);
  c.save();
  c.translate(0, -r * 0.05);
  c.scale(side, 1);
  c.rotate(-0.25 - flap * 0.55);

  const primaries = 7;
  for(let i = 0; i < primaries; i++){
    const t = i / (primaries - 1);
    const fx = r * (0.05 + t * 0.95);
    const fy = -r * (0.15 - t * 0.35) - Math.sin(wingPhase + i) * r * 0.02;
    const flen = r * (0.65 + (1 - t) * 0.35) * flap;
    const fa = -0.5 - t * 0.35;
    const wingG = c.createLinearGradient(r * 0.1, 0, fx + Math.cos(fa) * flen, fy);
    wingG.addColorStop(0, '#fff8e1');
    wingG.addColorStop(0.35, '#ffd54f');
    wingG.addColorStop(0.65, '#ff9800');
    wingG.addColorStop(1, '#e65100');
    c.fillStyle = wingG;
    c.strokeStyle = '#bf360c';
    c.lineWidth = Math.max(1, r * 0.016);
    c.beginPath();
    c.moveTo(r * 0.1, 0);
    c.quadraticCurveTo(fx, fy - r * 0.15, fx + Math.cos(fa) * flen, fy + Math.sin(fa) * flen * 0.5);
    c.lineTo(fx + Math.cos(fa + 0.15) * flen * 0.72, fy + Math.sin(fa + 0.15) * flen * 0.38);
    c.closePath();
    c.fill();
    c.stroke();
  }

  c.globalAlpha = 0.35;
  c.fillStyle = '#fff9c4';
  c.beginPath();
  c.ellipse(r * 0.35, -r * 0.05, r * 0.42, r * 0.28, -0.3, 0, TAU);
  c.fill();
  c.globalAlpha = 1;
  c.restore();
}
function drawFirebirdBody(c, pose){
  const { r, glow } = pose;
  const bodyG = c.createLinearGradient(-r * 0.35, -r * 0.4, r * 0.5, r * 0.35);
  bodyG.addColorStop(0, '#fff59d');
  bodyG.addColorStop(0.35, '#ffc107');
  bodyG.addColorStop(0.7, '#ff9800');
  bodyG.addColorStop(1, '#e65100');
  c.fillStyle = bodyG;
  c.strokeStyle = '#bf360c';
  c.lineWidth = Math.max(1.2, r * 0.02);
  c.beginPath();
  c.ellipse(0, 0, r * 0.42, r * 0.36, -0.15, 0, TAU);
  c.fill();
  c.stroke();

  c.globalAlpha = 0.4 + glow * 0.35;
  const inner = c.createRadialGradient(0, -r * 0.05, 0, 0, 0, r * 0.35);
  inner.addColorStop(0, 'rgba(255,253,231,0.95)');
  inner.addColorStop(0.5, 'rgba(255,193,7,0.55)');
  inner.addColorStop(1, 'rgba(255,87,34,0)');
  c.fillStyle = inner;
  c.beginPath();
  c.ellipse(0, 0, r * 0.28, r * 0.22, -0.15, 0, TAU);
  c.fill();
  c.globalAlpha = 1;
}
function drawFirebirdHead(c, pose, time){
  const { r, glow } = pose;
  const hx = r * 0.42;
  const hy = -r * 0.12;
  c.save();
  c.translate(hx, hy);

  for(let i = 0; i < 5; i++){
    const fx = (i - 2) * r * 0.06;
    const fh = r * (0.22 + Math.sin(time * 8 + i) * 0.06) * glow;
    const fg = c.createLinearGradient(fx, -fh, fx, r * 0.05);
    fg.addColorStop(0, 'rgba(255,255,255,0.9)');
    fg.addColorStop(0.4, '#ffeb3b');
    fg.addColorStop(1, '#ff5722');
    c.fillStyle = fg;
    c.beginPath();
    c.moveTo(fx - r * 0.03, r * 0.02);
    c.quadraticCurveTo(fx, -fh, fx + r * 0.03, r * 0.02);
    c.closePath();
    c.fill();
  }

  const headG = c.createRadialGradient(-r * 0.02, -r * 0.02, 0, 0, 0, r * 0.22);
  headG.addColorStop(0, '#fff8e1');
  headG.addColorStop(0.5, '#ffc107');
  headG.addColorStop(1, '#f57c00');
  c.fillStyle = headG;
  c.beginPath();
  c.ellipse(0, 0, r * 0.2, r * 0.18, 0.2, 0, TAU);
  c.fill();

  c.fillStyle = '#ff6f00';
  c.beginPath();
  c.moveTo(r * 0.14, r * 0.02);
  c.lineTo(r * 0.32, r * 0.04);
  c.lineTo(r * 0.14, r * 0.08);
  c.closePath();
  c.fill();

  c.fillStyle = '#1a0000';
  c.beginPath();
  c.ellipse(r * 0.04, -r * 0.04, r * 0.028, r * 0.038, 0, 0, TAU);
  c.fill();
  c.fillStyle = 'rgba(255,255,255,0.8)';
  c.beginPath();
  c.arc(r * 0.02, -r * 0.055, r * 0.01, 0, TAU);
  c.fill();

  c.restore();
}
function drawFirebird(c, b, time, morph){
  const pose = computeFirebirdPose(b, time, morph);
  c.save();
  c.translate(b.x, b.y + pose.bodyBob);
  c.rotate(pose.tilt);

  c.globalAlpha = 0.25 + pose.glow * 0.2;
  const under = c.createRadialGradient(0, pose.r * 0.15, 0, 0, 0, pose.r * 1.1);
  under.addColorStop(0, 'rgba(255,193,7,0.6)');
  under.addColorStop(1, 'rgba(255,87,34,0)');
  c.fillStyle = under;
  c.beginPath();
  c.ellipse(0, 0, pose.r * 1.15, pose.r * 0.75, 0, 0, TAU);
  c.fill();
  c.globalAlpha = 1;

  drawFirebirdTail(c, pose, time);
  drawFirebirdWing(c, pose, time, -1);
  drawFirebirdBody(c, pose);
  drawFirebirdWing(c, pose, time, 1);
  drawFirebirdHead(c, pose, time);

  c.restore();
  return pose;
}
function drawEpicMutationTitle(c, y, r, time, progress){
  const pulse = 1 + Math.sin(time * 10) * 0.07 + progress * 0.14;
  const size = fontPx(r * 0.78) * pulse;
  const txt = 'МУТАЦИЯ';
  c.save();

  c.rotate(Math.sin(time * 3.2) * 0.045);

  c.font = fontEpic(size);
  c.textAlign = 'center';

  c.shadowColor = '#ff3d00';
  c.shadowBlur = 34 + progress * 28;
  c.fillStyle = '#ff5722';

  c.fillText(txt, -3, -2);

  c.shadowBlur = 0;
  c.globalAlpha = 1;
  c.strokeStyle = '#2b0000';

  c.fillStyle = '#fff';
  c.fillText(txt, 0, -size * 0.08);
  c.restore();
}
function drawMutationLightning(c, r, time, progress){
  const bolts = 3 + Math.floor(progress * 3);
  for(let i = 0; i < bolts; i++){
    const seed = Math.floor(time * 7.5) + i * 17;
    if((seed * 13) % 5 > 2) continue;
    const a = time * 2.4 + i / bolts * TAU;
    const len = r * (1.6 + progress * 2.2);
    let x = 0, y = 0;
    c.save();
    c.globalAlpha = 0.55 + progress * 0.35;
    c.strokeStyle = i % 2 ? '#fff59d' : '#ffeb3b';
    c.lineWidth = 2 + progress * 2;
    c.shadowColor = '#ff9800';
    c.shadowBlur = 12;
    c.beginPath();
    c.moveTo(x, y);
    const steps = 5 + Math.floor(progress * 4);
    for(let s = 1; s <= steps; s++){
      const t = s / steps;
      x = Math.cos(a) * len * t + Math.sin(time * 18 + s * 3 + i) * r * 0.12;
      y = Math.sin(a) * len * t + Math.cos(time * 15 + s * 2 + i) * r * 0.1;
      c.lineTo(x, y);
    }
    c.stroke();
    c.restore();
  }
}
function drawMutationScreenOverlay(c, progress, time){
  const pulse = 0.55 + 0.45 * Math.sin(time * 7);
  c.save();
  c.globalCompositeOperation = 'screen';
  c.globalAlpha = (0.06 + progress * 0.12) * pulse;
  const g = c.createRadialGradient(W * 0.5, H * 0.5, Math.min(W, H) * 0.08, W * 0.5, H * 0.5, Math.max(W, H) * 0.72);

  c.save();
  c.globalAlpha = 0.28 + progress * 0.22;
  const vg = c.createRadialGradient(W * 0.5, H * 0.5, Math.min(W, H) * 0.2, W * 0.5, H * 0.5, Math.max(W, H) * 0.68);
  vg.addColorStop(0, 'transparent');
  vg.addColorStop(0.75, 'rgba(60,0,0,0.15)');
  vg.addColorStop(1, 'rgba(12,0,0,0.82)');
  c.fillStyle = vg;
  c.fillRect(0, 0, W, H);
  c.restore();
}
function drawMutationFx(c, b, progress, time){
  c.save();
  c.translate(b.x, b.y);
  const r = b.r;
  const burst = 0.85 + 0.15 * Math.sin(time * 11);

  c.globalCompositeOperation = 'lighter';
  for(let i = 0; i < 8; i++){
    const p = clamp(progress * 1.35 - i * 0.09, 0, 1);
    c.globalAlpha = (1 - p) * 0.65;
    const rad = r * (1.1 + p * 3.2 + i * 0.42) * burst;
    const rg = c.createRadialGradient(0, 0, rad * 0.15, 0, 0, rad);
    rg.addColorStop(0, 'rgba(255,253,231,0.85)');
    rg.addColorStop(0.4, 'rgba(255,152,0,0.45)');
    rg.addColorStop(1, 'rgba(183,28,28,0)');
    c.fillStyle = rg;
    c.beginPath();
    c.arc(0, 0, rad, 0, TAU);
    c.fill();
  }
  c.globalCompositeOperation = 'source-over';

  const rays = 8;
  for(let i = 0; i < rays; i++){
    const a = time * 2.8 + i / rays * TAU;
    const len = r * (2.4 + progress * 3.6);
    const w = r * (0.08 + progress * 0.06);
    c.save();
    c.rotate(a);
    c.globalAlpha = 0.22 + progress * 0.28;
    const rg = c.createLinearGradient(0, 0, len, 0);
    rg.addColorStop(0, 'rgba(255,235,59,0.9)');
    rg.addColorStop(0.45, 'rgba(255,87,34,0.55)');
    rg.addColorStop(1, 'rgba(255,23,68,0)');
    c.fillStyle = rg;
    c.beginPath();
    c.moveTo(0, -w);
    c.lineTo(len, 0);
    c.lineTo(0, w);
    c.closePath();
    c.fill();
    c.restore();
  }

  const rings = 6;
  for(let i = 0; i < rings; i++){
    const p = clamp(progress * 1.25 - i * 0.1, 0, 1);
    c.globalAlpha = (1 - p) * 0.7;
    c.strokeStyle = i % 3 === 0 ? '#ffeb3b' : i % 3 === 1 ? '#ff5722' : '#e040fb';
    c.lineWidth = 2.5 + i * 1.2 + progress * 3;
    c.shadowColor = c.strokeStyle;
    c.shadowBlur = 10 + progress * 8;
    c.setLineDash([r * 0.18, r * 0.1 + i * 2]);
    c.lineDashOffset = -time * (80 + i * 25);
    c.beginPath();
    c.arc(0, 0, r * (1.15 + p * 2.8 + i * 0.38), 0, TAU);
    c.stroke();
    c.setLineDash([]);
    c.shadowBlur = 0;
  }

  drawMutationLightning(c, r, time, progress);

  c.globalAlpha = 0.4 + progress * 0.45;
  const core = c.createRadialGradient(0, 0, r * 0.05, 0, 0, r * (2.6 + progress * 2.4));
  core.addColorStop(0, '#fff9c4');
  core.addColorStop(0.35, '#ff9800');
  core.addColorStop(0.7, '#ff1744');
  core.addColorStop(1, 'transparent');
  c.fillStyle = core;
  c.beginPath();
  c.arc(0, 0, r * (2.8 + progress * 2.2), 0, TAU);
  c.fill();
  c.globalAlpha = 1;

  const orbit = 18;
  for(let i = 0; i < orbit; i++){
    const a = time * (4.5 + i * 0.08) + i / orbit * TAU;
    const dist = r * (0.9 + progress * 1.6 + Math.sin(time * 5 + i) * 0.25);
    const ox = Math.cos(a) * dist;
    const oy = Math.sin(a) * dist * 0.72;
    const sz = 3 + progress * 5 + (i % 3);
    c.globalAlpha = 0.5 + Math.sin(time * 8 + i) * 0.3;
    c.fillStyle = ['#ffeb3b', '#ff5722', '#e040fb', '#fff'][i % 4];
    c.shadowColor = c.fillStyle;
    c.shadowBlur = 8;
    c.beginPath();
    if(i % 3 === 0){
      c.save();
      c.translate(ox, oy);
      c.rotate(a + time);
      c.moveTo(0, -sz);
      c.lineTo(sz * 0.35, 0);
      c.lineTo(0, sz);
      c.lineTo(-sz * 0.35, 0);
      c.closePath();
      c.fill();
      c.restore();
    } else {
      c.beginPath();
      c.arc(ox, oy, sz, 0, TAU);
      c.fill();
    }
    c.shadowBlur = 0;
  }

  drawEpicMutationTitle(c, -r * (1.25 + progress * 0.55), r, time, progress);
  c.restore();
}
function drawScatteredPipe(c, o, lv){
  if(!o.scatter) return;
  const col = o.scatter.col || obstacleColor(lv);
  const alpha = clamp(1 - (o.scatterT || 0) * 0.24, 0.32, 1);
  if(o.scatter.chunks){
    for(const ch of o.scatter.chunks){
      if(ch.w <= 0.5 || ch.h <= 0.5) continue;
      c.save();
      c.translate(ch.x + ch.w * 0.5, ch.y + ch.h * 0.5);
      c.rotate(ch.rot);
      c.globalAlpha = alpha;
      if(o.scatterIce){
        const g = c.createLinearGradient(-ch.w * 0.5, -ch.h * 0.5, ch.w * 0.5, ch.h * 0.5);
        g.addColorStop(0, '#e8f7fc');
        g.addColorStop(0.5, '#9dd4ec');
        g.addColorStop(1, '#4aa3c7');
        c.fillStyle = g;
      } else if(o.scatter.kind === 'forest'){
        c.fillStyle = shade('#5d4037', ch.shade || 0);
      } else {
        const g = c.createLinearGradient(-ch.w * 0.5, 0, ch.w * 0.5, 0);
        g.addColorStop(0, shade(col.main, (ch.shade || 0) - 16));
        g.addColorStop(0.5, shade(col.main, ch.shade || 0));
        g.addColorStop(1, shade(col.main, (ch.shade || 0) - 24));
        c.fillStyle = g;
      }
      c.fillRect(-ch.w * 0.5, -ch.h * 0.5, ch.w, ch.h);
      c.strokeStyle = 'rgba(0,0,0,0.22)';
      c.lineWidth = 0.8;
      c.strokeRect(-ch.w * 0.5, -ch.h * 0.5, ch.w, ch.h);
      c.restore();
    }
    return;
  }
  for(const key of ['top', 'bot']){
    const seg = o.scatter[key];
    if(seg.h <= 0) continue;
    c.save();
    c.translate(seg.x + seg.w * 0.5, seg.y + seg.h * 0.5);
    c.rotate(seg.rot);
    c.globalAlpha = clamp(1 - (o.scatterT || 0) * 0.28, 0.45, 1);
    if(o.kind === 'forest'){
      drawForestObstacle(c, -seg.w * 0.5, -seg.h * 0.5, seg.w, seg.h, key === 'top', col);
    } else if(o.scatterIce){
      drawFrozenIceColumn(c, -seg.w * 0.5, -seg.h * 0.5, seg.w, seg.h, key === 'top', o.x);
    } else if(o.kind === 'underwater'){
      drawCoral(c, -seg.w * 0.5, -seg.h * 0.5, seg.w, seg.h, key === 'top');
    } else if(o.kind === 'antarctica'){
      drawIceCol(c, -seg.w * 0.5, -seg.h * 0.5, seg.w, seg.h, key === 'top');
    } else {
      pillar(c, -seg.w * 0.5, -seg.h * 0.5, seg.w, seg.h, key === 'top', col);
    }
    c.restore();
  }
}
function drawFrozenIceColumn(c, x, y, w, h, isTop, seedX){

  const g = c.createLinearGradient(x, y, x + w, y + h);
  g.addColorStop(0, '#5eb8d9');
  g.addColorStop(0.18, '#9dd4ec');
  g.addColorStop(0.42, '#e8f7fc');
  g.addColorStop(0.58, '#d4effa');
  g.addColorStop(0.82, '#7ec8e8');
  g.addColorStop(1, '#4aa3c7');
  c.fillStyle = g;
  c.fillRect(x, y, w, h);

  // inner frost veins
  c.strokeStyle = 'rgba(255,255,255,0.42)';
  c.lineWidth = 1.2;
  const veins = Math.max(3, Math.floor(h / 28));
  for(let i = 0; i < veins; i++){
    const vx = x + w * (0.15 + (i * 0.27) % 0.7);

    c.beginPath();
    c.moveTo(vx, vy0);
    c.bezierCurveTo(vx + w * 0.12, vy0 + h * 0.08, vx - w * 0.08, vy0 + h * 0.16, vx + w * 0.05, vy0 + h * 0.22);
    c.stroke();
  }

  // glossy highlight slab
  c.fillStyle = 'rgba(255,255,255,' + (0.22 * shimmer).toFixed(2) + ')';
  c.fillRect(x + w * 0.12, y + h * 0.06, w * 0.22, h * 0.72);

  // ice cap block
  const capH = Math.min(22, h * 0.14);
  const capY = isTop ? y + h - capH : y;
  const capG = c.createLinearGradient(x, capY, x, capY + capH);
  capG.addColorStop(0, '#f5fcff');
  capG.addColorStop(0.5, '#b8e4f7');
  capG.addColorStop(1, '#6eb6d4');
  c.fillStyle = capG;
  rr(c, x - 5, capY, w + 10, capH, 5);
  c.fill();
  c.strokeStyle = 'rgba(255,255,255,0.65)';
  c.lineWidth = 1.5;
  rr(c, x - 5, capY, w + 10, capH, 5);
  c.stroke();

  // icicles along the gap-facing edge
  const edgeY = isTop ? y + h : y;
  const n = Math.max(3, Math.floor(w / 11));
  c.fillStyle = '#d8f2fc';
  for(let i = 0; i < n; i++){
    const ix = x + (i + 0.5) * w / n;
    const len = 11 + Math.sin(game.t * 3.4 + i * 1.1 + seedX * 0.02) * 5;
    const half = 3.5 + (i % 2) * 0.8;
    c.beginPath();
    if(isTop){
      c.moveTo(ix - half, edgeY);
      c.lineTo(ix, edgeY + len);
      c.lineTo(ix + half, edgeY);
    } else {
      c.moveTo(ix - half, edgeY);
      c.lineTo(ix, edgeY - len);
      c.lineTo(ix + half, edgeY);
    }
    c.closePath();
    c.fill();
    c.strokeStyle = 'rgba(129,212,250,0.75)';
    c.lineWidth = 0.8;
    c.stroke();
  }

  // sparkle crystals
  c.fillStyle = 'rgba(255,255,255,' + (0.55 + 0.35 * Math.sin(game.t * 6 + seedX)).toFixed(2) + ')';
  for(let i = 0; i < 5; i++){
    const sx = x + w * (0.12 + i * 0.18);
    const sy = y + h * (0.1 + (i * 0.17) % 0.75);
    c.beginPath();
    c.moveTo(sx, sy - 3);
    c.lineTo(sx + 2.5, sy);
    c.lineTo(sx, sy + 3);
    c.lineTo(sx - 2.5, sy);
    c.closePath();
    c.fill();
  }
}
function drawFrozenPipeFull(c, o, topH, botY){
  drawFrozenIceColumn(c, o.x, 0, o.w, topH, true, o.x);
  drawFrozenIceColumn(c, o.x, botY, o.w, H - botY, false, o.x + 17);
  // mist at gap edges
  c.save();
  c.globalAlpha = 0.28 + 0.12 * Math.sin(game.t * 5 + o.x * 0.01);
  const mistG = c.createLinearGradient(o.x, topH - 8, o.x, topH + 24);
  mistG.addColorStop(0, 'rgba(225,245,254,0)');
  mistG.addColorStop(0.5, 'rgba(179,229,252,0.85)');
  mistG.addColorStop(1, 'rgba(225,245,254,0)');
  c.fillStyle = mistG;
  c.fillRect(o.x - 4, topH - 10, o.w + 8, 22);
  const mistG2 = c.createLinearGradient(o.x, botY - 24, o.x, botY + 8);
  mistG2.addColorStop(0, 'rgba(225,245,254,0)');
  mistG2.addColorStop(0.5, 'rgba(179,229,252,0.85)');
  mistG2.addColorStop(1, 'rgba(225,245,254,0)');
  c.fillStyle = mistG2;
  c.fillRect(o.x - 4, botY - 12, o.w + 8, 22);
  c.restore();
}
function drawObstacle(c, o, lv){
  if(o.scattered){ drawScatteredPipe(c, o, lv); return; }
  if(o.smashed) return;
  const col=obstacleColor(lv);
  const topH=o.gapY, botY=o.gapY+o.gapH;
  const ghost = o.materialize != null && o.materialize > 0;
  const fullyFrozen = o.frozen && !ghost;
  c.save();
  if(ghost){
    c.globalAlpha = 0.28 + 0.12*Math.sin(game.t*8);
    c.setLineDash([6, 8]);
  } else if(o.treasure && !fullyFrozen){
    c.shadowColor = '#ffd54f'; c.shadowBlur = 12;
  }
  if(fullyFrozen){
    drawFrozenPipeFull(c, o, topH, botY);
    if(o.treasure){
      c.fillStyle = '#e1f5fe'; c.font = fontSans(11,'700'); c.textAlign='center';
      c.fillText('💎', o.x + o.w*0.5, o.gapY + o.gapH*0.5);
    }
    c.restore();
    return;
  }
  if(o.moving && !ghost){
    c.save();
    c.globalAlpha = 0.35 + 0.2*Math.sin(game.t*6 + o.x*0.02);
    c.fillStyle = '#fff59d';
    const ax = o.x + o.w*0.5;
    c.beginPath(); c.moveTo(ax, topH-14); c.lineTo(ax-6, topH-4); c.lineTo(ax+6, topH-4); c.fill();
    c.beginPath(); c.moveTo(ax, botY+14); c.lineTo(ax-6, botY+4); c.lineTo(ax+6, botY+4); c.fill();
    c.restore();
  }
  // style per theme
  if(o.kind==='forest'){
    drawForestObstacle(c,o.x,0,o.w,topH,true,col);
    drawForestObstacle(c,o.x,botY,o.w,H-botY,false,col);
  } else if(o.kind==='underwater'){
    drawCoral(c,o.x,0,o.w,topH,true);
    drawCoral(c,o.x,botY,o.w,H-botY,false);
  } else if(o.kind==='antarctica'){
    drawIceCol(c,o.x,0,o.w,topH,true);
    drawIceCol(c,o.x,botY,o.w,H-botY,false);
  } else {
    // generic pillar (pipe) with cap
    pillar(c,o.x,0,o.w,topH,true,col);
    pillar(c,o.x,botY,o.w,H-botY,false,col);
  }
  if(o.treasure && !ghost){
    c.fillStyle = '#ffd54f'; c.font = fontSans(11,'700'); c.textAlign='center';
    c.fillText('💎', o.x + o.w*0.5, o.gapY + o.gapH*0.5);
  }
  c.restore();
}
function pillar(c,x,y,w,h,top,col){
  const g=c.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,shade(col.main,-20)); g.addColorStop(0.4,col.main); g.addColorStop(1,shade(col.main,-30));
  c.fillStyle=g; c.fillRect(x,y,w,h);
  c.fillStyle=col.cap;
  const capY = top? y+h-18 : y;
  rr(c,x-6,capY,w+12,18,6); c.fill();
}
function drawMossyIsland(c, x, y, w, h, top){
  const rockG = c.createLinearGradient(x, y, x+w, y+h);
  rockG.addColorStop(0,'#5a4f45'); rockG.addColorStop(0.45,'#6d6258'); rockG.addColorStop(1,'#4a4038');
  c.fillStyle = rockG;
  c.beginPath();
  if(top){
    c.moveTo(x, y);
    c.lineTo(x+w, y);
    c.lineTo(x+w*0.94, y+h*0.42);
    c.lineTo(x+w*0.68, y+h);
    c.lineTo(x+w*0.32, y+h*0.95);
    c.lineTo(x+w*0.06, y+h*0.48);
    c.closePath();
  } else {
    c.moveTo(x+w*0.06, y+h*0.52);
    c.lineTo(x+w*0.32, y);
    c.lineTo(x+w*0.68, y+h*0.05);
    c.lineTo(x+w*0.94, y+h*0.58);
    c.lineTo(x+w, y+h);
    c.lineTo(x, y+h);
    c.closePath();
  }
  c.fill();
  c.strokeStyle='rgba(0,0,0,0.12)'; c.lineWidth=1.5;
  c.stroke();
  const grassY = top ? y - 2 : y + h - 2;
  const grassH = Math.min(14, h*0.22);
  const gg = c.createLinearGradient(x, grassY, x, grassY + (top ? -grassH : grassH));
  gg.addColorStop(0,'#66bb6a'); gg.addColorStop(0.5,'#43a047'); gg.addColorStop(1,'#2e7d32');
  c.fillStyle = gg;
  c.beginPath();
  if(top){
    c.moveTo(x-4, y+2);
    for(let i=0;i<=8;i++){
      const px = x + (w+8)*i/8;
      const py = y - grassH + Math.sin(i*1.2)*3;
      c.lineTo(px, py);
    }
    c.lineTo(x+w+4, y+2); c.closePath();
  } else {
    c.moveTo(x-4, y+h-2);
    for(let i=0;i<=8;i++){
      const px = x + (w+8)*i/8;
      const py = y+h + grassH - Math.sin(i*1.1)*3;
      c.lineTo(px, py);
    }
    c.lineTo(x+w+4, y+h-2); c.closePath();
  }
  c.fill();
  c.fillStyle='rgba(126,196,160,0.35)';
  for(let i=0;i<5;i++){
    const bx = x + w*(0.15+i*0.17);
    const by = top ? y + h*0.35 : y + h*0.55;
    c.beginPath(); c.arc(bx, by, 2.5, 0, TAU); c.fill();
  }
}
function drawForestObstacle(c,x,y,w,h,top,col){
  const atm = c.createLinearGradient(x, y, x+w, y+h);
  atm.addColorStop(0,'rgba(35,74,64,0.08)'); atm.addColorStop(0.5,'rgba(61,122,93,0.14)'); atm.addColorStop(1,'rgba(35,74,64,0.08)');
  c.fillStyle = atm; c.fillRect(x,y,w,h);
  const islandH = Math.min(78, Math.max(48, h*0.32), w*1.35);
  const islandW = w * 1.18;
  const ix = x - (islandW - w) * 0.5;
  const iy = top ? y + h - islandH : y;
  drawMossyIsland(c, ix, iy, islandW, islandH, top);
  if(h > islandH + 40){
    c.save(); c.globalAlpha = 0.35;
    const vineY = top ? y + 8 : y + h - islandH - 20;
    c.strokeStyle = '#3d6b5c'; c.lineWidth = 2; c.lineCap = 'round';
    c.beginPath(); c.moveTo(x+w*0.5, vineY); c.quadraticCurveTo(x+w*0.3, vineY+18, x+w*0.45, vineY+36); c.stroke();
    c.restore();
  }
}
function drawTrunk(c,x,y,w,h,top,col){
  const g=c.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#4e342e'); g.addColorStop(0.5,'#6d4c41'); g.addColorStop(1,'#4e342e');
  c.fillStyle=g; c.fillRect(x,y,w,h);
  c.strokeStyle='rgba(0,0,0,0.18)'; c.lineWidth=2;
  for(let i=1;i<3;i++){ c.beginPath(); c.moveTo(x+w*i/3,y); c.lineTo(x+w*i/3,y+h); c.stroke(); }
  // leafy cap
  const cy = top? y+h : y;
  c.fillStyle='#2e7d32';
  c.beginPath(); c.arc(x+w*0.5,cy + (top?-6:6), w*0.7, 0, TAU); c.fill();
  c.fillStyle='#388e3c'; c.beginPath(); c.arc(x+w*0.25,cy+(top?-2:2),w*0.4,0,TAU); c.arc(x+w*0.75,cy+(top?-2:2),w*0.4,0,TAU); c.fill();
}
function drawCoral(c,x,y,w,h,top){
  const g=c.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#0e7d5e'); g.addColorStop(0.5,'#15a37a'); g.addColorStop(1,'#0e7d5e');
  c.fillStyle=g; rr(c,x,y,w,h, w*0.3); c.fill();
  c.fillStyle='#ff7e9d';
  const cy=top?y+h:y;
  for(let i=0;i<4;i++){ c.beginPath(); c.arc(x+w*(0.2+i*0.2), cy+(top?-8:8), 6,0,TAU); c.fill(); }
}
function drawIceCol(c,x,y,w,h,top){
  const g=c.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#a7d8f5'); g.addColorStop(0.5,'#e3f4ff'); g.addColorStop(1,'#a7d8f5');
  c.fillStyle=g; c.fillRect(x,y,w,h);
  c.fillStyle='#cdeefe';
  const cy=top?y+h:y;
  c.beginPath();
  if(top){ c.moveTo(x,cy-10); c.lineTo(x+w*0.5,cy+12); c.lineTo(x+w,cy-10); }
  else   { c.moveTo(x,cy+10); c.lineTo(x+w*0.5,cy-12); c.lineTo(x+w,cy+10); }
  c.fill();
}

/* ============================ HUD / OVERLAYS ============================= */
let muteHotspot=null;
function drawHudPill(c, x, y, w, h, opts){
  c.save();
  rr(c, x, y, w, h, h*0.5);
  c.fillStyle = opts.bg || 'rgba(26,42,36,0.78)';
  c.fill();
  c.strokeStyle = opts.border || 'rgba(126,196,160,0.32)';
  c.lineWidth = 1.2;
  c.stroke();
  if(opts.icon){
    c.font = fontSans(h*0.52,'600');
    c.textAlign = 'left'; c.textBaseline = 'middle';
    c.fillStyle = opts.iconColor || '#7ec4a0';
    c.fillText(opts.icon, x + h*0.28, y + h*0.52);
  }
  c.font = opts.small ? fontSans(h*0.38,'600') : fontSans(h*0.44,'700');
  c.textAlign = 'left'; c.textBaseline = 'middle';
  c.fillStyle = opts.color || TYPE.text;
  const tx = x + (opts.icon ? h*0.88 : h*0.42);
  c.fillText(opts.label, tx, y + h*0.52);
  c.restore();
}
function drawHUD(c){
  const p=game.params;
  const pad = 12 + safeTop();
  const pillH = 30;
  const gap = 8;

  // Poster-style top pills
  const scoreW = Math.min(128, W*0.34);
  drawHudPill(c, 14, pad, scoreW, pillH, {
    icon:'🍃', label: game.score.toLocaleString(), iconColor:'#7ec4a0'
  });
  const lvlW = Math.min(108, W*0.3);
  drawHudPill(c, W - 14 - lvlW, pad, lvlW, pillH, {
    label:'Ур. '+(game.level+1), color: TYPE.accentDim
  });
  if(!game.marathon){
    const heartCount = Math.min(MAX_LIVES, Math.max(3, game.lives));
    const heartsW = Math.min(88, 28 + heartCount*18);
    const heartsX = (W - heartsW) / 2;
    c.save();
    rr(c, heartsX, pad, heartsW, pillH, pillH*0.5);
    c.fillStyle = 'rgba(26,42,36,0.72)'; c.fill();
    c.strokeStyle = 'rgba(126,196,160,0.28)'; c.lineWidth = 1.2; c.stroke();
    const heartSize = heartCount > 3 ? 8 : 9;
    for(let i=0;i<heartCount;i++){
      drawHeart(c, heartsX + heartsW*0.5 - (heartCount-1)*9 + i*18, pad + pillH*0.52, heartSize, i<game.lives ? '#ff6b6b':'rgba(255,255,255,0.22)');
    }
    c.restore();
  } else {
    drawHudPill(c, (W-120)/2, pad, 120, pillH, { icon:'∞', label:' CP '+game.marathonCp, iconColor:'#ffd54f' });
  }

  const barW=Math.min(W-28, 360), barX=(W-barW)/2, barY=pad+pillH+gap, barH=12;
  const runGoal = scoreGoalForLevel(game.level);
  const runProg = clamp(game.score / runGoal, 0, 1);
  const nextLevel = game.level + 2;
  const alreadyUnlocked = nextLevel <= progress.unlocked;
  rr(c,barX,barY,barW,barH,7); c.fillStyle='rgba(0,0,0,0.3)'; c.fill();
  rr(c,barX,barY, Math.max(8,barW*runProg), barH,7);
  const bg=c.createLinearGradient(barX,0,barX+barW,0); bg.addColorStop(0,'#9fd9b8'); bg.addColorStop(1,'#7ec4a0');
  c.fillStyle=bg; c.fill();
  c.fillStyle=TYPE.gold; c.font=typeUI(12,'600'); c.textAlign='center'; c.textBaseline='middle';
  const goalLabel = alreadyUnlocked
    ? game.score+' оч. · цель '+runGoal
    : game.score+'/'+runGoal+' оч. до ур. '+nextLevel;
  c.fillText(goalLabel, barX+barW/2, barY+barH/2+1);

  // Level theme subtitle
  c.fillStyle='rgba(168,184,174,0.85)'; c.font=fontSans(10,'600'); c.textAlign='center'; c.textBaseline='top';
  c.fillText(levelLabel(game.level)+(game.marathon?' · Марафон':''), W/2, barY+barH+5);

  const ph = runPhase();
  let statusY = barY + barH + 20;
  const statusStep = 14;
  if(ph > 0 && state===STATE.PLAY){
    c.textAlign='center'; c.fillStyle='rgba(255,245,157,0.85)'; c.font=fontSans(10,'600');
    c.fillText(ph>=2 ? '⛈ Шторм' : '⚠ Hazard', W/2, statusY);
    statusY += statusStep;
  }
  if(game.metabolicBoost > 0){
    c.fillStyle='#aeea00'; c.font=fontSans(10,'600');
    c.fillText('🔥 Серия '+ (game.runStats?.cleanStreak||0), W/2, statusY);
    statusY += statusStep;
  }
  if(state===STATE.PLAY && game.runStartFat && game.displayFat < game.runStartFat - 0.02){
    const slimPct = Math.round((1 - game.displayFat) * 100);
    c.textAlign='center'; c.font=fontSans(10,'600'); c.fillStyle='rgba(174,234,0,0.85)';
    c.fillText('Стройность '+slimPct+'%', W/2, statusY);
    statusY += statusStep;
  }
  if(nutriBoost.active && game.intro <= 0){
    c.fillStyle='rgba(126,196,160,0.9)'; c.font=fontSans(10,'600');
    c.fillText('NutriCrew ✓', W/2, statusY);
    statusY += statusStep;
  }

  if(game.combo>1){
    c.textAlign='center'; c.fillStyle='#ffd54f'; c.font=fontSans(13,'700');
    c.fillText('Комбо '+game.combo, W/2, H-16-safeBottom());
    c.textAlign='left';
  }
  if(game.hazardBanner && game.hazardBanner.time > 0){
    const a = clamp(game.hazardBanner.time / 2.8, 0, 1);
    c.save(); c.globalAlpha = a * (0.75 + 0.25*Math.sin(game.t*5));
    c.textAlign='center'; c.font=fontSans(12,'700'); c.fillStyle='#fff59d';
    c.fillText('🌿 Ветки и лёд падают с труб!', W/2, statusY);
    statusY += statusStep;
    c.restore();
  }
  if(game.stormBanner && game.stormBanner.time > 0){
    const a = clamp(game.stormBanner.time / 2.5, 0, 1);
    c.save(); c.globalAlpha = a * 0.85;
    c.textAlign='center'; c.font=fontSans(12,'700'); c.fillStyle='#b39ddb';
    c.fillText('⛈ Шторм — термики спасают!', W/2, statusY);
    statusY += statusStep;
    c.restore();
  }
  if(pointer.down && state===STATE.PLAY && game.intro<=0){
    c.textAlign='right'; c.fillStyle='rgba(238,245,240,0.55)'; c.font=fontSans(10,'500');
    c.fillText('Планирование', W-16, H-16-safeBottom());
    c.textAlign='left';
  }
  drawPowerIcons(c);

  // mute button (top-left under title not to overlap)
  const mx=16, my=pad+ (barY-pad) + 0; // we'll place near bottom-right corner instead
  muteHotspot = {x:W-46, y:H-46-safeBottom(), w:34, h:34};
  c.save();
  rr(c,muteHotspot.x,muteHotspot.y,muteHotspot.w,muteHotspot.h,8); c.fillStyle='rgba(0,0,0,0.3)'; c.fill();
  c.fillStyle='#fff'; c.font=fontSans(16,'500'); c.textAlign='center'; c.textBaseline='middle';
  c.fillText(muted?'🔇':'🔊', muteHotspot.x+muteHotspot.w/2, muteHotspot.y+muteHotspot.h/2+1);
  c.restore();
}
function drawHeart(c,x,y,s,col){
  c.save(); c.translate(x,y); c.fillStyle=col;
  c.beginPath();
  c.moveTo(0,s*0.3);
  c.bezierCurveTo(0,-s*0.2, -s, -s*0.2, -s, s*0.25);
  c.bezierCurveTo(-s, s*0.7, 0, s, 0, s*1.1);
  c.bezierCurveTo(0, s, s, s*0.7, s, s*0.25);
  c.bezierCurveTo(s, -s*0.2, 0, -s*0.2, 0, s*0.3);
  c.fill(); c.restore();
}
function safeTop(){ try{ return (TG && TG.safeAreaInset && TG.safeAreaInset.top)||0; }catch(e){ return 0; } }
function safeBottom(){ try{ return (TG && TG.safeAreaInset && TG.safeAreaInset.bottom)||0; }catch(e){ return 0; } }

function buildMenu(){

function buildLevels(){
  clearButtons();
  scrollLevelsToUnlocked();
  levelMapScroll.y = clamp(levelMapScroll.y, 0, levelsMaxScroll());
  const layout = getLevelsLayout();
  const { cols, levelCount, cell, gx, gy, size, rowH } = layout;
  for(let i=0;i<levelCount;i++){
    const cx=gx + (i%cols)*cell + 6;
    const baseY=gy + Math.floor(i/cols)*rowH;
    const unlocked = i < progress.unlocked;
    const need = i > 0 ? scoreGoalForLevel(i - 1) : 0;
    addButton({ x:cx, y:baseY - levelMapScroll.y, baseY, w:size, h:size, label:'', idx:i, locked:!unlocked, needScore:need,
      onClick:()=>{ if(unlocked){ startLevel(i); } else { haptic('warning'); } }, id:'lvl'+i });
  }
  const bw=Math.min(W*0.6,260);
  addButton({ x:(W-bw)/2, y:H-80-safeBottom(), w:bw, h:50, label:'← Назад', onClick:()=>{ state=STATE.MENU; buildMenu(); }, id:'back' });

/* ============================ WORLD RENDER ============================== */
function renderWorld(c, frozen){
  const lv=getLevel(game.level);
  c.save();
  if(game.shake>0){ const s=game.shake; c.translate(rand(-s,s),rand(-s,s)); }
  drawBackground(c, lv, game.scrollX, game.t);
  drawWeatherFx(c);
  // ground strip
  const gy=H*0.80;
  const gg=c.createLinearGradient(0,gy,0,H);
  gg.addColorStop(0, lv.ground); gg.addColorStop(1, shade(lv.ground,-28));
  c.fillStyle=gg; c.fillRect(0,gy,W,H-gy);
  c.fillStyle=shade(lv.ground,-18);
  for(let x=-( (game.scrollX*0.6)%40);x<W;x+=40){ c.fillRect(x,gy,20,6); }

  drawThermals(c);
  for(const d of game.debris){ drawDebris(c, d, game.t); }
  for(const o of game.obstacles){ drawObstacle(c, o, lv); }
  for(const gh of game.gapHazards){
    const pipe = game.obstacles.find(o => o.id === gh.pipeId);
    if(pipe && !pipe.smashed) drawGapHazard(c, gh, pipe, lv);
  }
  for(const m of game.floatMines){ drawFloatMine(c, m, game.t); }
  for(const zh of game.zoneHazards){ drawZoneHazard(c, zh, game.t); }
  // foods
  for(const f of game.foods){ if(f.taken) continue;
    const anim = foodAnimState(f, game.t);
    const by = anim.y;
    const bx = anim.x;
    const pulse = anim.pulse;
    if(!f.junk){
      const glowCol = f.energyJunk ? '#ff9800'
        : f.type==='strawberry' ? '#ff6b6b'
        : f.type==='leaf' ? '#7ec4a0'
        : f.type==='almond' ? '#bcaaa4'
        : f.type==='alarmclock' ? '#90caf9'
        : f.type==='turboorange' ? '#ff9800'
        : f.type==='dragonfruit' ? '#ec407a'
        : f.type==='firePineapple' ? '#ff5722'
        : f.type==='iceMango' ? '#81d4fa'
        : f.type==='glowCoconut' ? '#fff59d'
        : f.power==='golden' ? '#ffd54f'
        : (f.power ? POWER[f.power].color : '#fff59d');
      drawFoodAura(c, bx, by, f.r, pulse, game.t, anim.bobA, glowCol);
    } else if(f.energyJunk){
      c.save(); c.globalAlpha=0.32+0.16*Math.sin(game.t*7+f.bob);
      c.fillStyle='#ff9800'; c.beginPath(); c.arc(bx,by,f.r*1.45*pulse,0,TAU); c.fill(); c.restore();
    }
    drawFood(c, f.type, bx, by, f.r*pulse, game.t, anim.bobA, f.junk, anim.spin);
  }
  if((game.magnetTime>0 || isDragonActive()) && game.bird){
    c.save(); c.globalAlpha=0.12+0.06*Math.sin(game.t*6);
    c.strokeStyle = isDragonActive() ? '#ff5722' : (getBirdSpec().perk==='neon' ? '#ea80fc' : '#ba68c8');
    c.lineWidth=2;
    c.beginPath(); c.arc(game.bird.x, game.bird.y, isDragonActive() ? dragonMagnetRadius() * 0.42 : magnetRadius(), 0, TAU); c.stroke();
    c.restore();
  }
  if(game.chronoTime>0){
    c.save(); c.globalAlpha=0.1+0.05*Math.sin(game.t*4); c.fillStyle='#90caf9'; c.fillRect(0,0,W,H); c.restore();
  } else if(isFreezeActive()){
    c.save(); c.globalAlpha=0.06+0.04*Math.sin(game.t*3); c.fillStyle='#b3e5fc'; c.fillRect(0,0,W,H); c.restore();
  } else if(isCoconutActive()){
    c.save(); c.globalAlpha=0.05+0.04*Math.sin(game.t*5); c.fillStyle='#fff9c4'; c.fillRect(0,0,W,H); c.restore();
  } else if(game.slowmoTime>0){
    c.save(); c.globalAlpha=0.08; c.fillStyle='#4dd0e1'; c.fillRect(0,0,W,H); c.restore();
  }
  if(game.nitroTime>0 && game.bird && !isDragonActive()){
    drawNitroFlames(c, game.bird);
  }
  if(isCoconutCharging() && game.bird){
    drawCoconutAbsorbRays(c, game.bird, coconutEnergy());
    drawCoconutBirdAura(c, game.bird, coconutEnergy());
  }
  if(isMutating()){
    drawMutationScreenOverlay(c, dragonMutateProgress(), game.t);
  }
  // bird / firebird mutation
  let firebirdPose = null;
  if(game.bird){
    const morph = dragonMutateProgress();
    if(isMutating()){
      c.save();
      c.globalAlpha = 1 - morph * 0.65;
      drawBird(c, game.bird, game.displayFat, game.t);
      c.restore();
      firebirdPose = drawFirebird(c, game.bird, game.t, morph * 0.85);
      drawMutationFx(c, game.bird, morph, game.t);
    } else if(isDragonActive()){
      firebirdPose = drawFirebird(c, game.bird, game.t, 1);
      drawFirebirdAura(c, game.bird, game.t, firebirdPose);
    } else {
      drawBirdGlideTrail(c, game.bird, game.t);
      drawBird(c, game.bird, game.displayFat, game.t);
      if(game.invuln > 0) drawBirdRecoverFx(c, game.bird, game.invuln);
    }
    if(isCoconutBursting()){
      drawCoconutBurstFx(c, game.bird);
    }
  }
  drawEatRings(c);
  drawParticles(c);
  drawFloatTexts(c);
  c.restore();

  // flash overlay
  if(game.flashTime>0){
    c.save(); c.globalAlpha=clamp(game.flashTime,0,0.6); c.fillStyle=game.flashColor||'#fff'; c.fillRect(0,0,W,H); c.restore();
  }
  drawHUD(c);

  // intro countdown
  if(game.intro>0){
    c.save();
    c.fillStyle='rgba(0,0,0,0.25)'; c.fillRect(0,0,W,H);
    c.textAlign='center'; c.textBaseline='middle'; c.fillStyle='#eef5f0';
    const n=Math.ceil(game.intro);
    c.font=fontDisplay(80,'700');
    c.globalAlpha=clamp(game.intro%1+0.2,0,1);
    c.fillText(n>0?n:'', W/2, H*0.45);
    c.globalAlpha=1; c.font=fontSans(18,'600');
    c.fillText('Тап — взлёт · Удерживай — планирование', W/2, H*0.45+70);
    c.restore();
  }

  if(game.unlockBanner){
    const ub = game.unlockBanner;
    const alpha = clamp(ub.time / 0.4, 0, 1);
    c.save();
    c.globalAlpha = alpha * 0.92;
    const bw = Math.min(W*0.88, 360), bx = (W-bw)/2, by = H*0.14 + safeTop();
    rr(c, bx, by, bw, 52, 14);
    c.fillStyle = 'rgba(30,42,36,0.92)'; c.fill();
    rr(c, bx, by, bw, 52, 14); c.strokeStyle = '#7ec4a0'; c.lineWidth = 2; c.stroke();
    c.fillStyle = '#7ec4a0'; c.font = fontDisplay(20,'700');
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('🎉 Открыт уровень '+ub.level+'!', W/2, by+26);
    c.restore();
  }
}

/* ============================ UPDATE (PLAY) ============================= */
function updatePlay(dt){
  const p=game.params, b=game.bird;
  if(game.chronoTime>0) game.chronoTime -= dt;
  if(game.slowmoTime>0) game.slowmoTime -= dt;
  if(game.nitroTime>0) game.nitroTime -= dt;
  if(game.shieldTime>0){
    game.shieldTime -= dt;
    if(game.shieldTime < 0) game.shieldTime = 0;
  }
  if(game.magnetTime>0) game.magnetTime -= dt;
  const freezeWas = game.freezeTime > 0;
  if(game.freezeTime>0) game.freezeTime -= dt;
  if(freezeWas && game.freezeTime <= 0){
    for(const o of game.obstacles){
      if(!o.smashed && !o.scattered) o.frozen = false;
    }
  }
  updateDragonMode(dt);
  updateCoconutBlast(dt);
  if(game.comboTimer>0){
    game.comboTimer -= dt;
    if(game.comboTimer<=0) resetCombo();
  }
  if(game.nearMissCd>0) game.nearMissCd -= dt;

  const slow = scrollSlowFactor();
  const scrollDt = dt * slow;
  const stormMult = stormActive() ? 1.12 : 1;
  const speed = p.speed * slow * scrollSpeedMult() * stormMult;
  game.scrollX += speed*scrollDt;
  game.distance += speed*scrollDt;

  if(game.intro>0){ game.intro-=dt; b.y=H*0.45+Math.sin(game.t*4)*8; b.tilt=0; return; }

  if(isMutating()){
    b.vy = 0;
    b.y = H * 0.45 + Math.sin(game.t * 3.2) * 10;
    b.tilt = Math.sin(game.t * 4.5) * 0.06;
    b.wing = 0.35 + Math.sin(game.t * 8) * 0.25;
    updateScatteredPipes(dt);
    game.spawnTimer -= scrollDt;
    if(game.spawnTimer <= 0){ spawnObstacle(); game.spawnTimer = p.spacing * rand(0.74, 0.96); }
    for(let i = game.obstacles.length - 1; i >= 0; i--){
      game.obstacles[i].x -= speed * scrollDt;
      if(game.obstacles[i].moving){
        const o = game.obstacles[i];
        o.movingPhase += o.movingSpeed * dt;
        o.gapY = clamp(o.gapCenter + Math.sin(o.movingPhase) * o.movingAmp, o.gapYMin, o.gapYMax);
      }
    }
    for(let i = game.foods.length - 1; i >= 0; i--){
      game.foods[i].x -= speed * scrollDt;
    }
    if(game.invuln > 0) game.invuln -= dt;
    if(game.shake > 0) game.shake = Math.max(0, game.shake - dt * 30);
    if(game.flashTime > 0) game.flashTime -= dt * 2;
    return;
  }

  if(isCoconutCharging()){
    b.vy = 0;
    b.y = H * 0.45 + Math.sin(game.t * 5.2) * 8;
    b.tilt = Math.sin(game.t * 6.5) * 0.05;
    b.wing = 0.18 + Math.sin(game.t * 10) * 0.12;
    game.invuln = 999;
    updateScatteredPipes(dt);
    game.spawnTimer -= scrollDt;
    if(game.spawnTimer <= 0){ spawnObstacle(); game.spawnTimer = p.spacing * rand(0.74, 0.96); }
    for(let i = game.obstacles.length - 1; i >= 0; i--){
      game.obstacles[i].x -= speed * scrollDt;
      if(game.obstacles[i].moving){
        const o = game.obstacles[i];
        o.movingPhase += o.movingSpeed * dt;
        o.gapY = clamp(o.gapCenter + Math.sin(o.movingPhase) * o.movingAmp, o.gapYMin, o.gapYMax);
      }
    }
    for(let i = game.foods.length - 1; i >= 0; i--){
      game.foods[i].x -= speed * scrollDt;
    }
    if(game.shake > 0) game.shake = Math.max(0, game.shake - dt * 30);
    if(game.flashTime > 0) game.flashTime -= dt * 2;
    return;
  }

  if(isCoconutBursting()){
    b.vy = 0;
    b.y = H * 0.45;
    game.invuln = 999;
    updateScatteredPipes(dt);
    game.spawnTimer -= scrollDt;
    if(game.spawnTimer <= 0){ spawnObstacle(); game.spawnTimer = p.spacing * rand(0.74, 0.96); }
    for(let i = game.obstacles.length - 1; i >= 0; i--){
      game.obstacles[i].x -= speed * scrollDt;
      if(game.obstacles[i].moving){
        const o = game.obstacles[i];
        o.movingPhase += o.movingSpeed * dt;
        o.gapY = clamp(o.gapCenter + Math.sin(o.movingPhase) * o.movingAmp, o.gapYMin, o.gapYMax);
      }
    }
    for(let i = game.foods.length - 1; i >= 0; i--){
      game.foods[i].x -= speed * scrollDt;
    }
    if(game.shake > 0) game.shake = Math.max(0, game.shake - dt * 30);
    if(game.flashTime > 0) game.flashTime -= dt * 2;
    return;
  }

  if(isDragonActive()){
    b.vy = Math.cos(game.t * 2.6) * H * 0.28;
    b.y = H * 0.44 + Math.sin(game.t * 2.6) * H * 0.14;
    b.tilt = Math.sin(game.t * 2.1) * 0.28;
    b.wing = 0.2;
    game.invuln = Math.max(game.invuln, 0.35);
  } else {
  updateRunSlimming();
  game.displayFat = lerp(game.displayFat, game.targetFat, 1-Math.pow(0.5, dt*1.35));

  const gliding = pointer.down;
  const nitro = game.nitroTime > 0;

  if(b.flapCooldown > 0) b.flapCooldown -= dt;
  if(b.flapQueued && b.flapCooldown <= 0){
    b.flapQueued = false;
    applyFlapImpulse(b);
    b.flapCooldown = 0.13;
    SFX.flap();
    spawnFlapBurst(b);
  }

  const gravFall = nitro ? 1180 : 1050;
  const gravGlide = nitro ? 620 : 520;
  if(gliding){
    const planFactor = smoothstep(0, 1, clamp((b.vy + 140) / 300, 0, 1));
    let grav = lerp(gravGlide, gravFall * 0.72, planFactor);
    b.vy += grav * dt;
    if(b.vy > -50 && b.vy < 110) b.vy -= 52 * dt;
    b.vy = clamp(b.vy, -270, 340);
  } else {
    b.vy += gravFall * dt;
    b.vy = clamp(b.vy, -440, 640);
  }
  b.vy *= (1 - dt * (gliding ? 1.15 : 0.42));
  if(b.airtime > 0) b.airtime -= dt;
  b.y += b.vy*dt;
  b.tilt = gliding
    ? clamp(b.vy / 480, -0.32, 0.48) + (b.airtime > 0 ? -0.06 : 0)
    : clamp(b.vy / 680, -0.48, 0.88);
  updateWeather(dt, b);
  updateBirdWingCycle(b, dt);
  updateBirdAnimations(b, dt);
  if(gliding && b.wing<0.6) b.wing = 0.35;
  b.wing = Math.max(0, b.wing - dt*2.2);
  b.flapBoost = Math.max(0, b.flapBoost - dt*3.5);
  b.bodySquash = lerp(b.bodySquash, 1, 1-Math.pow(0.001, dt));
  b.eat=Math.max(0,b.eat-dt*3);
  b.eatPop=Math.max(0,b.eatPop-dt*2.5);
  b.happy=Math.max(0,b.happy-dt*1.8);
  if(game.invuln>0) game.invuln-=dt;
  }

  if(game.shake>0) game.shake=Math.max(0,game.shake-dt*30);
  if(game.flashTime>0) game.flashTime-=dt*2;
  if(game.unlockBanner){
    game.unlockBanner.time -= dt;
    if(game.unlockBanner.time <= 0) game.unlockBanner = null;
  }
  if(game.hazardBanner){
    game.hazardBanner.time -= dt;
    if(game.hazardBanner.time <= 0) game.hazardBanner = null;
  }
  if(game.stormBanner){
    game.stormBanner.time -= dt;
    if(game.stormBanner.time <= 0) game.stormBanner = null;
  }
  if(game.metabolicBoost > 0) game.metabolicBoost -= dt;

  // ground / ceiling collision
  const gy=H*0.80;
  if(!isDragonActive() && !isCoconutActive()){
    if(b.y + b.r*0.8 > gy){ b.y=gy-b.r*0.8; if(game.invuln<=0){ hitPlayer(); } b.vy=-300; }
    if(b.y - b.r < 0){ b.y=b.r; b.vy=0; }
  } else if(isDragonActive()){
    b.y = clamp(b.y, b.r * 0.5, gy - b.r * 0.5);
  }

  game.thermalTimer -= dt;
  if(game.thermalTimer<=0){ spawnThermal(); game.thermalTimer = rand(5, 9); }
  for(let i=game.thermals.length-1;i>=0;i--){
    const t = game.thermals[i];
    t.x -= speed*scrollDt;
    if(b.x>t.x && b.x<t.x+t.w && b.y>t.y && b.y<t.y+t.h){
      b.vy -= 520*dt;
      if(Math.random()<0.25) spawnParticle(b.x, b.y+b.r*0.5, {vx:rand(-20,20), vy:rand(-80,-30), g:80, color:'rgba(255,255,255,0.6)', size:rand(2,4), decay:2});
    }
    if(t.x+t.w<-40) game.thermals.splice(i,1);
  }

  game.spawnTimer-=scrollDt;
  if(game.spawnTimer<=0){ spawnObstacle(); game.spawnTimer=p.spacing*rand(0.74,0.96); }

  updateScatteredPipes(dt);

  const shielded = game.shieldTime>0 || isDragonActive() || isCoconutActive();
  for(let i=game.obstacles.length-1;i>=0;i--){
    const o=game.obstacles[i];
    o.x -= speed*scrollDt;
    if(o.materialize != null && o.materialize > 0) o.materialize -= dt;
    if(o.scattered){
      if((o.scatterT || 0) > 2.8) game.obstacles.splice(i, 1);
      continue;
    }
    if(o.smashed){ if(o.x + o.w < -20) game.obstacles.splice(i,1); continue; }
    if(o.moving){
      o.movingPhase += o.movingSpeed * dt;
      o.gapY = clamp(
        o.gapCenter + Math.sin(o.movingPhase) * o.movingAmp,
        o.gapYMin,
        o.gapYMax
      );
    }
    if(isDragonActive() && game.dragonMode.rampTime <= 0 && !o.scattered && !o.smashed){
      if(o.x < b.x + b.r * 2.8 && o.x + o.w > b.x - b.r * 0.3) tryDragonSmashPipe(b, o);
    }
    if(hazardActive() && !o.passed && o.x < W && o.x > -o.w){
      o.debrisTimer -= dt;
      if(o.debrisTimer <= 0){
        spawnDebrisFromPipe(o);
        o.debrisTimer = rand(3.2, 6.5) / (1 + clamp((game.score-100)/350, 0, 0.45));
      }
    }
    checkNearMiss(b, o);
    if(!o.passed && o.x+o.w < b.x){ o.passed=true; onObstaclePassed(o); }
    if(o.x+o.w < -20) game.obstacles.splice(i,1);
    else if(tryFreezeSmashPipe(b, o)){ continue; }
    else if(tryDragonSmashPipe(b, o)){ continue; }
    else if(trySmashPipe(b, o)){ continue; }
    else if(o.materialize != null && o.materialize > 0){ /* ghost — no hit */ }
    else if(game.invuln<=0 && !shielded && !(o.frozen && isFreezeActive())){
      if(circleRect(b.x,b.y,b.r*0.78, o.x,0,o.w,o.gapY) ||
         circleRect(b.x,b.y,b.r*0.78, o.x,o.gapY+o.gapH,o.w,H-(o.gapY+o.gapH))){
        hitPlayer();
      }
    }
  }
  for(let i=game.gapHazards.length-1;i>=0;i--){
    const gh = game.gapHazards[i];
    const pipe = game.obstacles.find(o => o.id === gh.pipeId);
    if(!pipe || pipe.smashed || pipe.x+pipe.w < -50){
      game.gapHazards.splice(i,1); continue;
    }
    if(gh.materialize != null) gh.materialize = pipe.materialize;
    if(game.invuln<=0 && !shielded && gapHazardHit(b, gh, pipe)) hitPlayer();
  }
  for(let i=game.floatMines.length-1;i>=0;i--){
    const m = game.floatMines[i];
    m.x -= speed*scrollDt;
    m.y += Math.sin(game.t*2.4+m.phase)*20*dt;
    m.rot = (m.rot||0) + m.spin*dt;
    if(m.materialize > 0) m.materialize -= dt;
    if(m.x < -60){ game.floatMines.splice(i,1); continue; }
    if(game.invuln<=0 && !shielded && m.materialize <= 0){
      const dx=b.x-m.x, dy=b.y-m.y;
      if(dx*dx+dy*dy < (b.r*0.76+m.r)*(b.r*0.76+m.r)) hitPlayer();
    }
  }
  for(let i=game.zoneHazards.length-1;i>=0;i--){
    const zh = game.zoneHazards[i];
    zh.x -= speed*scrollDt;
    zh.emerge = Math.min(1, zh.emerge + dt*1.6);
    if(game.intro <= 0) updateZoneHazardAI(zh, b);
    const hb = zoneHazardHitbox(zh);
    if(zh.x + zh.w*0.5 < -60){
      game.zoneHazards.splice(i,1);
      continue;
    }
    if(hb && game.invuln<=0 && !shielded){
      if(circleRect(b.x, b.y, b.r*0.76, hb.x, hb.y, hb.w, hb.h)){
        hitPlayer();
        burst(zh.x, zh.y - zh.h*0.5, '#ff7043', 14);
        game.shake = 10;
      }
    }
  }
  for(let i=game.debris.length-1;i>=0;i--){
    const d = game.debris[i];
    d.x += (d.vx - speed*0.85) * scrollDt;
    d.y += d.vy * dt;
    d.vy += 320 * dt;
    d.rot += d.spin * dt;
    if(d.y > H*0.82 || d.x < -40){
      game.debris.splice(i,1);
      continue;
    }
    if(game.invuln<=0 && !shielded){
      const dx = b.x - d.x, dy = b.y - d.y;
      if(dx*dx + dy*dy < (b.r*0.75 + d.r)*(b.r*0.75 + d.r)){
        hitPlayer();
        burst(d.x, d.y, '#ff7043', 10);
        game.debris.splice(i,1);
      }
    }
  }
  const magnetR = isDragonActive() ? dragonMagnetRadius() : (game.magnetTime>0 ? magnetRadius() : 0);
  const perk = getBirdSpec().perk;
  if(state===STATE.PLAY && game.intro<=0 && (perk==='ember'||perk==='neon') && Math.random()<0.35){
    const col = perk==='ember' ? '#ff7043' : '#ea80fc';
    spawnParticle(b.x-b.r*0.5, b.y+rand(-8,8), {vx:-p.speed*0.15, vy:rand(-15,15), g:30, color:col, size:rand(2,4), decay:2, shape:'circle'});
  }
  for(let i=game.foods.length-1;i>=0;i--){
    const f=game.foods[i]; if(f.taken){ continue; }
    f.x -= speed*scrollDt;
    if(f.pipeId != null){
      const po = game.obstacles.find(o => o.id === f.pipeId);
      if(po) f.y = po.gapY + f.gapRelY;
      else f.pipeId = null;
    }
    const anim = foodAnimState(f, game.t);
    if(magnetR>0 && !f.junk){
      const dx=b.x-anim.x, dy=b.y-anim.y, d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<magnetR){
        const pull = isDragonActive() ? 480 : 240;
        f.x += (dx/d)*pull*dt;
        f.y += (dy/d)*pull*dt;
      }
    }
    const by = anim.y;
    const bx = anim.x;
    const dx=b.x-bx, dy=b.y-by;
    if(dx*dx+dy*dy < (b.r*0.85+f.r)*(b.r*0.85+f.r)){
      f.taken=true; game.foods.splice(i,1);
      if(f.junk){
        SFX.bad(); haptic('warning');
        burst(bx,by,'#ff7043',16);
        game.runStats && game.runStats.junkTaken++;
        breakCleanStreak();
        if(f.energyJunk){
          game.nitroTime = Math.max(game.nitroTime, 2.2);
          game.pipeSmashReady = (game.pipeSmashReady||0) + 1;
          addFloatText(bx, by-28, '⚡ Энергетик', '#ff9800', 0.95);
          game.score = Math.max(0, game.score - 5);
        } else {
          game.score=Math.max(0, game.score-3);
        }
        resetCombo();
        game.flashColor='#ff5252'; game.flashTime=0.5; game.shake=8;
        if(game.metabolicBoost <= 0) applyJunkWeight();
        b.bodySquash=1.28; b.eat=0.8;
        addFloatText(bx, by-18, f.energyJunk ? '-5 · +вес' : '+вес', '#ff7043', 0.95);
      } else if(f.type==='firePineapple'){
        if(!game.dragonMode){
          SFX.eatFruit('firePineapple'); haptic('heavy');
          spawnEatBurst(bx, by, 'firePineapple');
          burst(bx, by, '#ff5722', 30, 240);
          game.foodCollected++;
          bumpCleanStreak();
          startDragonMutation();
        }
      } else if(f.type==='iceMango'){
        SFX.eatFruit('iceMango'); haptic('heavy');
        spawnEatBurst(bx, by, 'iceMango');
        burst(bx, by, '#81d4fa', 28, 220);
        game.foodCollected++;
        bumpCleanStreak();
        b.eat = 1; b.eatPop = 1.15; b.happy = 1;
        startIceFreeze();
      } else if(f.type==='glowCoconut'){
        if(!game.coconutBlast){
          SFX.eatFruit('glowCoconut'); haptic('heavy');
          spawnEatBurst(bx, by, 'glowCoconut');
          burst(bx, by, '#fff59d', 32, 260);
          game.foodCollected++;
          bumpCleanStreak();
          b.eat = 1; b.eatPop = 1.3; b.happy = 1;
          startCoconutCharge();
        }
      } else if(f.type==='dragonfruit'){
        game.foodCollected++;
        bumpCleanStreak();
        b.eat=1; b.eatPop=1.2; b.happy=1; b.bodySquash=1.1;
        SFX.eatFruit('dragonfruit'); haptic('success');
        burst(bx, by, '#ec407a', 26, 220);
        eatRings.push({x:bx,y:by,r:12,life:1,color:'#f48fb1'});
        for(let j=0;j<10;j++){
          spawnParticle(bx, by, {vx:rand(-120,120), vy:rand(-160,-40), color:['#ec407a','#f48fb1','#ff5252'][randi(0,2)], size:rand(3,7), decay:rand(1.4,2.2), shape:'star', g:140});
        }
        if(game.lives < MAX_LIVES){
          game.lives++;
          addFloatText(bx, by-24, '+❤', '#ff5252', 1.35);
          addFloatText(bx, by+4, 'Питахайя', '#f48fb1', 0.82);
        } else {
          addScore(25, '+25', bx, by);
          addFloatText(bx, by-18, 'MAX ❤', '#f48fb1', 0.95);
        }
      } else if(f.type==='alarmclock' || f.type==='turboorange'){
        game.foodCollected++;
        bumpCleanStreak();
        bumpCombo();
        b.eat=1; b.eatPop=1.2; b.happy=1;
        if(f.type==='alarmclock'){
          SFX.eatFruit('alarmclock'); haptic('medium');
          eatRings.push({x:bx,y:by,r:10,life:1,color:'#90caf9'});
          activatePower('chrono');
        } else {
          SFX.eatFruit('turboorange');
          b.bodySquash=1.22;
          activatePower('nitro');
        }
      } else {
        SFX.eatFruit(f.type === 'golden' ? 'golden' : f.type); haptic('light');
        spawnEatBurst(bx, by, f.type==='golden'?'apple':f.type);
        game.foodCollected++;
        bumpCleanStreak();
        bumpCombo();
        b.eat=1; b.eatPop=1; b.happy=1; b.bodySquash=1.14;
        game.targetFat = clamp(game.targetFat - 0.01, game.runMinFat, 1);
        if(f.power==='golden') activatePower('golden');
        else {
          addScore(10, null, bx, by);
          if(f.power && f.power!=='chrono' && f.power!=='nitro') activatePower(f.power);
          else {
            const roll = powerFromFood(f.type);
            if(roll && Math.random()<0.35) activatePower(roll);
          }
        }
      }
    }
  }
  if(game.nitroTime>0 && Math.random()<0.72){
    spawnParticle(b.x-b.r*0.8, b.y+rand(-10,12), {vx:rand(-420,-180), vy:rand(-35,35), g:25, color:['#ff9800','#ffeb3b','#ff5722'][randi(0,2)], size:rand(4,9), decay:1.5, shape:'circle'});
  }
  if(Math.random()<0.3) spawnParticle(b.x-b.r*0.7, b.y+rand(-6,8), {vx:-speed*0.2,vy:rand(-20,20),g:40,color:'rgba(255,255,255,0.5)',size:rand(1.5,3),decay:2.5});
}

function circleRect(cx,cy,r, rx,ry,rw,rh){
  const nx=clamp(cx,rx,rx+rw), ny=clamp(cy,ry,ry+rh);
  const dx=cx-nx, dy=cy-ny;
  return dx*dx+dy*dy < r*r;
}
function hitPlayer(){
  if(game.invuln>0 || game.shieldTime>0) return;
  if(game.marathon && game.marathonCp >= 200 && !game.marathonCpUsed){
    game.marathonCpUsed = true;
    marathonRespawn();
    return;
  }
  resetCombo();
  game.lives--; game.invuln=1.3;
  if(game.bird) game.bird.stagger = 1;
  SFX.hit(); haptic('error');
  game.shake=14; game.flashColor='#ff3b3b'; game.flashTime=0.6;
  burst(game.bird.x,game.bird.y,'#ff5252',20);
  if(game.lives<=0){ gameOver(); }
}
function gameOver(){
  SFX.stopDragonFlame();
  BGM.stop();
  game.coconutBlast = null;
  coconutRays.length = 0;
  progress.best = Math.max(progress.best, game.score);
  progress.totalFood += game.foodCollected;
  if(game.marathon) progress.marathonBest = Math.max(progress.marathonBest || 0, game.score);
  saveRunStars();
  recordLevelBest(game.level, game.score);
  progress.unlocked = Math.max(progress.unlocked || 1, computeUnlockedFromLevelBests(progress.levelBests || []));
  saveProgress(progress);
  const artifactXp = runArtifactBonus();
  notifyParent({
    event:'game_over',
    score: game.score,
    level: progress.unlocked,
    flights: game.flightsPassed,
    fruits: game.foodCollected,
    best: progress.best,
    totalFlights: progress.totalFlights,
    marathon: !!game.marathon,
    marathonBest: progress.marathonBest,
    stars: computeRunStars(),
    artifactXp,
    runPowers: Object.keys(game.runPowers || {}),
    dailySeed: dailySeedNum()
  });
  state=STATE.OVER; buildOver();
  haptic('error');
}

/* ============================== MAIN LOOP ============================== */
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now;
  dt=Math.min(dt, 1/30); // clamp big gaps
  game.t += dt;

  // background animation for menu/levels uses game.t
  if(state===STATE.PLAY){ updatePlay(dt); updateParticles(dt); updateFloatTexts(dt); BGM.update(); }
  else if(state!==STATE.WIN){ updateParticles(dt); updateFloatTexts(dt); }

  // render
  ctx.save();
  switch(state){
    case STATE.MENU: drawMenu(ctx); break;
    case STATE.LEVELS: drawLevels(ctx); break;
    case STATE.PLAY: renderWorld(ctx,false); break;
    case STATE.OVER: drawOver(ctx); break;
    case STATE.WIN: drawWin(ctx); break;
  }
  ctx.restore();

  requestAnimationFrame(loop);
}

/* ============================== BOOTSTRAP ============================== */
function boot(){
  initTelegram();
  resize();
  try{
    const saved = localStorage.getItem('nutrirun_bird');
    if(saved && BIRD_SPECIES[saved]) selectedBirdId = saved;
  }catch(e){}
  buildMenu();
  state=STATE.MENU;
  const loader=document.getElementById('loader');
  setTimeout(()=>{ loader.classList.add('hidden'); }, 500);
  last=performance.now();
  requestAnimationFrame(loop);
}
window.addEventListener('load', boot);
// also try immediately in case load already fired
if(document.readyState==='complete') boot();
</script>
</body>
