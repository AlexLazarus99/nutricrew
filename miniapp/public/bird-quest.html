<script>
"use strict";
/* ============================================================================
   ПТИЧКА-ЧЕМПИОН · HEALTHY BIRD QUEST
   Прогрессивная мини-игра для Telegram Mini App.
   Толстенькая птичка постепенно становится стройной, питаясь здоровой едой.
   Бесконечный полёт; новые локации открываются за пролёты (125, 175, 225…).
   Всё рисуется процедурно через Canvas API. Никаких внешних картинок.
   ========================================================================== */

/* ----------------------------- Telegram SDK ------------------------------ */
const TG = (window.Telegram && window.Telegram.WebApp) ? window.Telegram.WebApp : null;
let tgReady = false;
function initTelegram(){
  if(!TG) return;
  try{
    TG.ready();
    TG.expand();
    if(TG.setHeaderColor) TG.setHeaderColor('#0d1b2a');
    if(TG.setBackgroundColor) TG.setBackgroundColor('#0d1b2a');
    if(TG.enableClosingConfirmation) TG.enableClosingConfirmation();
    if(TG.disableVerticalSwipes) TG.disableVerticalSwipes();
    tgReady = true;
  }catch(e){ /* graceful fallback for desktop browser */ }
}
function haptic(type){
  if(!TG || !TG.HapticFeedback) return;
  try{
    if(type==='light'||type==='medium'||type==='heavy'||type==='rigid'||type==='soft')
      TG.HapticFeedback.impactOccurred(type);
    else if(type==='success'||type==='warning'||type==='error')
      TG.HapticFeedback.notificationOccurred(type);
    else if(type==='select')
      TG.HapticFeedback.selectionChanged();
  }catch(e){}
}
function tgSendScore(score, level){
  if(!TG) return;
  try{ TG.sendData(JSON.stringify({event:'game_result', score, level})); }catch(e){}
}
function notifyParent(payload){
  try{
    if(window.parent && window.parent !== window){
      window.parent.postMessage(Object.assign({ source:'nutrirun' }, payload), '*');
    }
  }catch(e){}
}

/* ----------------------------- Canvas setup ------------------------------ */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d', { alpha:false });
let W = 0, H = 0, DPR = 1;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', ()=>setTimeout(resize,120));

/* ------------------------------- Utilities ------------------------------- */
const TAU = Math.PI*2;
const clamp = (v,a,b)=> v<a?a:(v>b?b:v);
const lerp  = (a,b,t)=> a+(b-a)*t;
const rand  = (a,b)=> a+Math.random()*(b-a);
const randi = (a,b)=> Math.floor(rand(a,b+1));
const easeOut = t=> 1-Math.pow(1-t,3);
const easeInOut = t=> t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

/* Typography — match NutriCrew miniapp */
const FONT_SANS = '"Plus Jakarta Sans", system-ui, -apple-system, sans-serif';
const FONT_DISPLAY = '"Fraunces", Georgia, serif';
function fontSans(px, weight){ return weight+' '+px+'px '+FONT_SANS; }
function fontDisplay(px, weight){ return weight+' '+px+'px '+FONT_DISPLAY; }

function rr(c,x,y,w,h,r){ // rounded rect path
  r = Math.min(r, w/2, h/2);
  c.beginPath();
  c.moveTo(x+r,y);
  c.arcTo(x+w,y,x+w,y+h,r);
  c.arcTo(x+w,y+h,x,y+h,r);
  c.arcTo(x,y+h,x,y,r);
  c.arcTo(x,y,x+w,y,r);
  c.closePath();
}
function shade(hex, amt){ // lighten(+)/darken(-) a #rrggbb hex
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r=clamp(Math.round(r+amt),0,255);
  g=clamp(Math.round(g+amt),0,255);
  b=clamp(Math.round(b+amt),0,255);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* ----------------------------- Audio (synth) ----------------------------- */
let AC = null, muted = false;
function audio(){
  if(!AC){ try{ AC = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ AC=null; } }
  return AC;
}
function beep(freq, dur, type='sine', vol=0.18, slideTo=null){
  if(muted) return;
  const ac = audio(); if(!ac) return;
  if(ac.state==='suspended') ac.resume();
  const t = ac.currentTime;
  const o = ac.createOscillator();
  const g = ac.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t+dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(ac.destination);
  o.start(t); o.stop(t+dur+0.02);
}
const SFX = {
  flap:()=>beep(520,0.10,'triangle',0.12,300),
  eat: ()=>{ beep(660,0.09,'sine',0.16,990); },
  bad: ()=>beep(180,0.22,'sawtooth',0.18,90),
  hit: ()=>beep(120,0.32,'square',0.20,60),
  level:()=>{ beep(523,0.12,'sine',0.16); setTimeout(()=>beep(659,0.12,'sine',0.16),110); setTimeout(()=>beep(784,0.16,'sine',0.18),230); setTimeout(()=>beep(1046,0.22,'sine',0.18),380); },
  win:()=>{ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'sine',0.16),i*130)); },
  start:()=>beep(440,0.12,'triangle',0.14,660)
};

const LEVELS = [

  { name:'Каир',               theme:'cairo',      sky:['#ffcf7a','#ffe7b0'], ground:'#e3b774', accent:'#b88a3e', landmark:'pyramids' },
  { name:'Сидней',             theme:'sydney',     sky:['#8fd3ff','#d9f4ff'], ground:'#6fa9c4', accent:'#3d7fa0', landmark:'opera' },
  { name:'Пекин',              theme:'beijing',    sky:['#ffd5a8','#ffe9c9'], ground:'#a98c6a', accent:'#a83232', landmark:'greatwall' },
  { name:'Рио-де-Жанейро',     theme:'rio',        sky:['#3fa9e0','#9be3c9'], ground:'#3f9e6a', accent:'#2e7d52', landmark:'rio' },
  { name:'Дубай',              theme:'dubai',      sky:['#ffba8a','#ffd9b0'], ground:'#d9b483', accent:'#9c7a4a', landmark:'burj' },
];

/* Пролёты для открытия следующего уровня: ур.2 → 125, ур.3 → 175, ур.4 → 225 … (~×2.5) */
function flightsToUnlockNext(unlockedCount){
  return 125 + Math.max(0, unlockedCount - 1) * 50;
}
function cumulativeFlightsForLevel(levelIndex){
  let sum = 0;
  for(let i = 0; i < levelIndex; i++) sum += flightsToUnlockNext(i + 1);
  return sum;
}
function computeUnlockedFromFlights(totalFlights){
  let unlocked = 1, needed = 0;
  while(true){
    needed += flightsToUnlockNext(unlocked);
    if(totalFlights >= needed) unlocked++;
    else break;
    if(unlocked > 500) break;
  }
  return unlocked;
}
function getLevel(idx){ return LEVELS[((idx % LEVELS.length) + LEVELS.length) % LEVELS.length]; }
function levelLabel(idx){
  const lv = getLevel(idx);
  const cycle = Math.floor(idx / LEVELS.length);
  return cycle > 0 ? lv.name + ' · ' + (cycle + 1) : lv.name;
}
function levelParams(idx){
  const t = 1 - Math.exp(-idx / 14);
  return {
    speed:   lerp(225, 450, t),
    gap:     lerp(0.40, 0.24, t),
    spacing: lerp(2.4, 1.55, t),
    junkChance: lerp(0.12, 0.36, t),
    fat:     clamp(1 - t, 0.05, 1)
  };
}

/* --------------------------- Persistent storage -------------------------- */
const STORE_KEY = 'healthy_bird_progress_v2';
function loadProgress(){
  try{
    const r = JSON.parse(localStorage.getItem(STORE_KEY));
    if(r && typeof r === 'object'){
      r.totalFlights = r.totalFlights || 0;
      r.unlocked = Math.max(1, computeUnlockedFromFlights(r.totalFlights));
      return r;
    }
    const legacy = JSON.parse(localStorage.getItem('healthy_bird_progress_v1'));
    if(legacy && typeof legacy === 'object'){
      return {
        unlocked: legacy.unlocked || 1,
        best: legacy.best || 0,
        totalFood: legacy.totalFood || 0,
        totalFlights: 0
      };
    }
  }catch(e){}
  return { unlocked:1, best:0, totalFood:0, totalFlights:0 };
}
function saveProgress(p){
  p.unlocked = Math.max(p.unlocked || 1, computeUnlockedFromFlights(p.totalFlights || 0));
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(p)); }catch(e){}
}
let progress = loadProgress();

/* ------------------------------- Particles ------------------------------- */
const particles = [];
function spawnParticle(x,y,opts={}){
  particles.push(Object.assign({
    x,y, vx:rand(-60,60), vy:rand(-120,-20),
    g: opts.g!=null?opts.g:240, life:1, decay:rand(1.4,2.4),
    size:rand(3,7), color:'#fff', shape:'circle', spin:rand(-6,6), rot:rand(0,TAU)
  }, opts));
}
function burst(x,y,color,n=14,spread=160){
  for(let i=0;i<n;i++){
    const a = rand(0,TAU), s = rand(40,spread);
    spawnParticle(x,y,{vx:Math.cos(a)*s, vy:Math.sin(a)*s - 40, color,
      size:rand(2.5,6.5), decay:rand(1.6,3), shape: Math.random()<0.4?'star':'circle'});
  }
}
function confetti(x,y,n=26){
  const cols=['#ff5252','#ffca28','#66bb6a','#42a5f5','#ab47bc','#ff7043','#26c6da'];
  for(let i=0;i<n;i++){
    const a=rand(-Math.PI*0.85,-Math.PI*0.15), s=rand(120,360);
    spawnParticle(x,y,{vx:Math.cos(a)*s, vy:Math.sin(a)*s, g:340, color:cols[randi(0,cols.length-1)],
      size:rand(4,9), decay:rand(0.8,1.6), shape:'rect', spin:rand(-10,10)});
  }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.vy += p.g*dt;
    p.x += p.vx*dt; p.y += p.vy*dt;
    p.rot += p.spin*dt;
    p.life -= p.decay*dt;
    if(p.life<=0) particles.splice(i,1);
  }
}
function drawParticles(c){
  for(const p of particles){
    c.save();
    c.globalAlpha = clamp(p.life,0,1);
    c.translate(p.x,p.y);
    c.rotate(p.rot);
    c.fillStyle = p.color;
    if(p.shape==='wind'){
      c.strokeStyle=p.color; c.lineWidth=2; c.lineCap='round';
      c.beginPath(); c.moveTo(-p.size/2,0); c.lineTo(p.size/2,0); c.stroke();
    }else if(p.shape==='rect'){
      c.fillRect(-p.size/2,-p.size/2,p.size,p.size*0.6);
    }else if(p.shape==='star'){
      drawStar(c,0,0,p.size,p.size*0.45,5);
      c.fill();
    }else{
      c.beginPath(); c.arc(0,0,p.size,0,TAU); c.fill();
    }
    c.restore();
  }
}
function drawStar(c,cx,cy,outer,inner,points){
  c.beginPath();
  for(let i=0;i<points*2;i++){
    const r = i%2===0?outer:inner;
    const a = (i/(points*2))*TAU - Math.PI/2;
    const x=cx+Math.cos(a)*r, y=cy+Math.sin(a)*r;
    i===0?c.moveTo(x,y):c.lineTo(x,y);
  }
  c.closePath();
}

/* --------------------------- Eat / flap VFX ------------------------------ */
const floatTexts = [];
const eatRings = [];
const FOOD_COLORS = {
  apple:'#e53935', banana:'#ffd54f', carrot:'#fb8c00', broccoli:'#43a047',
  strawberry:'#e53935', cherry:'#d32f2f', grapes:'#8e24aa', watermelon:'#e53935',

function addFloatText(x,y,text,color,scale){

}
function spawnEatBurst(x,y,type){
  const col = FOOD_COLORS[type] || '#aeea00';

  burst(x,y,col,22,200);
  for(let i=0;i<14;i++){
    const a=rand(0,TAU), s=rand(80,220);
    spawnParticle(x,y,{vx:Math.cos(a)*s,vy:Math.sin(a)*s-50,color:col,size:rand(3,8),decay:rand(1.2,2.2),shape:Math.random()<0.5?'star':'circle',g:180});
  }
  for(let i=0;i<8;i++){
    spawnParticle(x,y,{vx:rand(-40,40),vy:rand(-160,-60),color:'#fff59d',size:rand(2,5),decay:1.8,shape:'star',g:120});
  }
  addFloatText(x,y-12,'+10','#aeea00',1.2);
  addFloatText(x,y+8,'🥗','#fff',0.9);
}
function spawnFlapBurst(b){
  const perk = getBirdSpec().perk;
  const windCol = perk==='ember' ? 'rgba(255,138,101,' : perk==='storm' ? 'rgba(255,241,118,' : perk==='neon' ? 'rgba(234,128,252,' : 'rgba(255,255,255,';
  for(let i=0;i<10;i++){
    spawnParticle(b.x-b.r*0.4, b.y+rand(-10,14), {
      vx:rand(-200,-90), vy:rand(-35,45), g:60,
      color: windCol + rand(0.35,0.75) + ')',
      size:rand(10,26), decay:rand(2.5,4), shape:'wind', rot:rand(-0.2,0.2), spin:0
    });
  }
  const sparkCols = perk==='ember' ? ['#ff7043','#ffca28','#ff5722'] : perk==='frost' ? ['#e1f5fe','#b3e5fc','#fff'] : perk==='neon' ? ['#ea80fc','#26c6da','#fff'] : perk==='royal' ? ['#ffd54f','#fff59d','#fff'] : perk==='storm' ? ['#ffee58','#b39ddb','#fff'] : ['#b2ebf2','#e0f7fa','#fff'];
  for(let i=0;i<6;i++){
    spawnParticle(b.x-b.r*0.2, b.y+rand(-6,10), {
      vx:rand(-120,-50), vy:rand(-20,30), g:140,
      color: sparkCols[randi(0,2)],
      size:rand(2,5), decay:rand(1.8,2.8), shape: perk==='royal'||perk==='ember' ? 'star' : 'circle'
    });
  }
}
function updateFloatTexts(dt){
  for(let i=floatTexts.length-1;i>=0;i--){
    const t=floatTexts[i];
    t.y += t.vy*dt; t.vy *= 0.96; t.life -= dt*1.4;
    if(t.life<=0) floatTexts.splice(i,1);
  }
  for(let i=eatRings.length-1;i>=0;i--){
    const r=eatRings[i];
    r.r += 180*dt; r.life -= dt*1.8;
    if(r.life<=0) eatRings.splice(i,1);
  }
}
function drawEatRings(c){
  for(const r of eatRings){
    c.save();
    c.globalAlpha = clamp(r.life,0,1)*0.55;
    c.strokeStyle = r.color;
    c.lineWidth = 3;
    c.beginPath(); c.arc(r.x,r.y,r.r,0,TAU); c.stroke();
    c.restore();
  }
}
function drawFloatTexts(c){
  for(const t of floatTexts){
    c.save();
    c.globalAlpha = clamp(t.life,0,1);
    const sc = t.scale * (1 + (1-t.life)*0.15);
    c.translate(t.x,t.y);
    c.scale(sc,sc);
    c.fillStyle = t.color;
    c.font = fontSans(18,'800');
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText(t.text,0,0);
    c.restore();
  }
}

/* ------------------------------ Game state ------------------------------- */
const STATE = { MENU:'menu', LEVELS:'levels', PLAY:'play', COMPLETE:'complete', OVER:'over', WIN:'win' };
let state = STATE.MENU;

const game = {
  level:0, params:null,
  scrollX:0, t:0,
  bird:null,
  obstacles:[], foods:[], debris:[], zoneHazards:[],
  spawnTimer:0, distance:0,
  foodCollected:0, flightsPassed:0, score:0, lives:3, invuln:0,
  displayFat:1, targetFat:1, runStartFat:1, runMinFat:0.86,
  shake:0, flashColor:null, flashTime:0,
  intro:0,
  unlockBanner:null,
  combo:0, comboTimer:0, multiplier:1,
  shieldTime:0, magnetTime:0, slowmoTime:0, chronoTime:0, nitroTime:0,
  thermals:[], thermalTimer:8,
  nearMissCd:0, speedMult:1,
  hazardWasActive:false, hazardBanner:null,
};
const POWER = {
  shield:{ label:'Щит', color:'#64b5f6', dur:5 },
  magnet:{ label:'Магнит', color:'#ba68c8', dur:6 },
  slowmo:{ label:'Замедление', color:'#4dd0e1', dur:4 },
  chrono:{ label:'Стоп-время!', color:'#90caf9', dur:5 },
  nitro:{ label:'Нитро!', color:'#ff9800', dur:0 },
  golden:{ label:'Золотой бонус', color:'#ffd54f', dur:0 }
};
function hazardActive(){ return game.score > 100; }
function scrollSlowFactor(){
  if(game.chronoTime > 0) return 0.42;
  if(game.slowmoTime > 0) return 0.62;
  return 1;
}
function nitroSpeedMult(){ return game.nitroTime > 0 ? 1.78 : 1; }
function updateRunSlimming(){
  const start = game.runStartFat ?? game.displayFat;
  const minF = game.runMinFat ?? clamp(start - 0.14, 0.28, 0.92);
  const span = W * 14;
  const prog = clamp(game.distance / span, 0, 1);
  game.targetFat = lerp(start, minF, prog);
}
function applyJunkWeight(){
  const bump = 0.07;
  game.displayFat = clamp(game.displayFat + bump, 0, 1);
  game.targetFat = clamp((game.targetFat ?? game.displayFat) + bump * 0.9, 0, 1);
  game.runStartFat = clamp((game.runStartFat ?? game.displayFat) + bump * 0.75, 0, 1);
  game.runMinFat = clamp((game.runMinFat ?? game.displayFat) + bump * 0.55, 0, 1);
}

/* Bird object factory */
function makeBird(){
  return {
    x: W*0.30, y: H*0.45, vy:0,
    r: 30, wing:0, flapBoost:0, wingCycle:0, bodySquash:1,
    blink:0, blinkTimer:rand(1.5,4),
    tilt:0, eat:0, eatPop:0, happy:0
  };
}

/* ------------------------------ Buttons (UI) ----------------------------- */
let buttons = []; // {x,y,w,h,label,onClick,id}
function clearButtons(){ buttons = []; }
function addButton(b){ buttons.push(b); }
function pointInBtn(px,py,b){ return px>=b.x && px<=b.x+b.w && py>=b.y && py<=b.y+b.h; }

/* --------------------------------- Input --------------------------------- */
let pointer = {x:0,y:0,down:false};
function handleDown(px,py){
  pointer.x=px; pointer.y=py; pointer.down=true;
  // Mute toggle hotspot (top-right) is global
  if(muteHotspot && px>=muteHotspot.x && px<=muteHotspot.x+muteHotspot.w && py>=muteHotspot.y && py<=muteHotspot.y+muteHotspot.h){
    muted=!muted; haptic('select'); return;
  }
  // Buttons
  for(const b of buttons){ if(pointInBtn(px,py,b)){ b.onClick(); haptic('light'); return; } }
  // Gameplay tap = flap
  if(state===STATE.PLAY && game.intro<=0){
    flap();
  }
}
function flap(){
  if(!game.bird) return;
  const b = game.bird;
  b.vy = -420;
  b.wing = 1;
  b.flapBoost = 1;
  b.wingCycle = 0.02;
  b.bodySquash = 0.82;
  SFX.flap();
  haptic('light');
  spawnFlapBurst(b);
}
canvas.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.changedTouches[0]; const r=canvas.getBoundingClientRect(); handleDown(t.clientX-r.left, t.clientY-r.top); }, {passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault(); pointer.down=false; }, {passive:false});
canvas.addEventListener('mousedown', e=>{ const r=canvas.getBoundingClientRect(); handleDown(e.clientX-r.left, e.clientY-r.top); });
canvas.addEventListener('mouseup', ()=>{ pointer.down=false; });
window.addEventListener('keyup', e=>{
  if(e.code==='Space'||e.code==='ArrowUp') pointer.down=false;
});
window.addEventListener('keydown', e=>{
  if(e.code==='Space'||e.code==='ArrowUp'){
    e.preventDefault();
    pointer.down=true;
    if(state===STATE.PLAY && game.intro<=0) flap();
    else handleDown(W/2,H/2);
  }
});

function addScore(pts, label, x, y){
  const mult = game.multiplier;
  const gain = Math.round(pts * mult);
  game.score += gain;
  progress.best = Math.max(progress.best, game.score);
  if(!game.hazardWasActive && game.score > 100){
    game.hazardWasActive = true;
    game.hazardBanner = { time: 2.8 };
    addFloatText(W/2, H*0.26, '⚠ Движущиеся трубы!', '#fff59d', 1.05);
    haptic('warning');
  }
  if(label) addFloatText(x||game.bird.x, y||game.bird.y-30, label+(mult>1?' x'+mult.toFixed(1):''), mult>1?'#ffd54f':'#eef5f0', mult>1?1.15:1);
}
function bumpCombo(){
  game.combo++;
  game.comboTimer = 4;
  game.multiplier = Math.min(maxComboMult(), 1 + Math.floor(game.combo / 4) * 0.5);
}
function resetCombo(){
  game.combo = 0;
  game.comboTimer = 0;
  game.multiplier = 1;
}
function activatePower(kind){
  const p = POWER[kind];
  if(!p) return;
  if(kind==='golden'){
    addScore(50, '+50★', game.bird.x, game.bird.y-40);
    game.magnetTime = Math.max(game.magnetTime, 4);
    game.shieldTime = Math.max(game.shieldTime, 3);
    burst(game.bird.x, game.bird.y, '#ffd54f', 28, 240);
    SFX.level();
    return;
  }
  if(kind==='shield') game.shieldTime = p.dur + (getBirdSpec().perk === 'frost' ? 1.5 : 0);
  if(kind==='magnet') game.magnetTime = p.dur;
  if(kind==='slowmo') game.slowmoTime = p.dur;
  if(kind==='chrono'){
    game.chronoTime = p.dur;
    game.slowmoTime = Math.max(game.slowmoTime, p.dur * 0.6);
    burst(game.bird.x, game.bird.y, '#90caf9', 20, 180);
    game.flashColor = '#90caf9'; game.flashTime = 0.35;
  }
  if(kind==='nitro'){
    game.nitroTime = 4.6;
    burst(game.bird.x, game.bird.y, '#ff9800', 32, 280);
    for(let i=0;i<20;i++){
      spawnParticle(game.bird.x - game.bird.r, game.bird.y+rand(-10,14), {
        vx:rand(-380,-160), vy:rand(-40,40), g:35,
        color:['#ff9800','#ffeb3b','#ff5722','#fff176'][randi(0,3)],
        size:rand(5,11), decay:rand(1.4,2.4), shape:'circle'
      });
    }
    game.flashColor = '#ff9800'; game.flashTime = 0.45;
    SFX.level();
    haptic('heavy');
    addFloatText(game.bird.x, game.bird.y-36, p.label+'!', p.color, 1.15);
    return;
  }
  addFloatText(game.bird.x, game.bird.y-36, p.label+'!', p.color, 1.05);
  SFX.eat();
  haptic('medium');
}
function powerFromFood(type){
  if(type==='broccoli') return 'shield';
  if(type==='grapes') return 'magnet';
  if(type==='kiwi') return 'slowmo';
  return null;
}
function spawnThermal(){
  game.thermals.push({
    x: W + rand(40, 120),
    y: rand(H*0.18, H*0.58),
    w: rand(70, 110),
    h: rand(90, 150),
    phase: rand(0, TAU)
  });
}
function drawThermals(c){
  for(const t of game.thermals){
    c.save();
    const pulse = 0.55 + 0.45*Math.sin(game.t*2.2 + t.phase);
    c.globalAlpha = 0.22 * pulse;
    const g = c.createLinearGradient(t.x, t.y+t.h, t.x, t.y);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(0.5, 'rgba(255,255,255,0.55)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    c.fillStyle = g;
    c.beginPath();
    c.moveTo(t.x, t.y+t.h);
    c.quadraticCurveTo(t.x+t.w*0.55, t.y+t.h*0.35, t.x+t.w, t.y);
    c.lineTo(t.x+t.w*0.7, t.y);
    c.quadraticCurveTo(t.x+t.w*0.2, t.y+t.h*0.4, t.x, t.y+t.h);
    c.fill();
    c.strokeStyle = 'rgba(255,255,255,0.35)';
    c.lineWidth = 1.5;
    for(let i=0;i<3;i++){
      const lx = t.x + t.w*0.25 + i*t.w*0.22;
      c.beginPath();
      c.moveTo(lx, t.y+t.h);
      c.quadraticCurveTo(lx+8, t.y+t.h*0.45, lx+4, t.y+12);
      c.stroke();
    }
    c.restore();
  }
}
function drawShieldBubble(c, b){
  if(game.shieldTime<=0) return;
  c.save();
  c.globalAlpha = 0.35 + 0.15*Math.sin(game.t*8);
  c.strokeStyle = '#64b5f6';
  c.lineWidth = 3;
  c.fillStyle = 'rgba(100,181,246,0.12)';
  const rr = b.r * (1.1 + game.displayFat*0.25);
  c.beginPath(); c.arc(0, 0, rr, 0, TAU); c.fill(); c.stroke();
  c.restore();
}
function drawPowerIcons(c){
  const icons = [];
  if(game.shieldTime>0) icons.push({t:game.shieldTime, icon:'🛡', col:'#64b5f6'});
  if(game.magnetTime>0) icons.push({t:game.magnetTime, icon:'🧲', col:'#ba68c8'});
  if(game.chronoTime>0) icons.push({t:game.chronoTime, icon:'⏰', col:'#90caf9'});
  else if(game.slowmoTime>0) icons.push({t:game.slowmoTime, icon:'⏱', col:'#4dd0e1'});
  if(game.nitroTime>0) icons.push({t:game.nitroTime, icon:'🔥', col:'#ff9800'});
  let x = W - 18;
  const y = H*0.80 - 42 - safeBottom();
  for(const ic of icons){
    c.save();
    c.textAlign='right'; c.textBaseline='middle';
    c.font = fontSans(11,'600');
    c.fillStyle = ic.col;
    c.fillText(ic.icon+' '+Math.ceil(ic.t)+'с', x, y);
    x -= 72;
    c.restore();
  }
}
function checkNearMiss(b, o){
  if(o.passed || game.nearMissCd>0) return;
  const bx = b.x, by = b.y, br = b.r*0.78;
  if(o.x > bx+br+8 || o.x+o.w < bx-br-8) return;
  const gapTop = o.gapY, gapBot = o.gapY+o.gapH;
  const margin = 14;
  const nearTop = by-br < gapTop+margin && by+br > gapTop-margin && bx > o.x-10 && bx < o.x+o.w+10;
  const nearBot = by+br > gapBot-margin && by-br < gapBot+margin && bx > o.x-10 && bx < o.x+o.w+10;
  if(nearTop || nearBot){
    game.nearMissCd = 1.2;
    const riskPts = getBirdSpec().perk === 'storm' ? 8 : 5;
    addScore(riskPts, 'Риск!', bx, by-24);
    haptic('light');
    burst(bx, by, '#ffca28', 8, 90);
  }
}

/* ============================ BIRD SPECIES =============================== */
let selectedBirdId = 'classic';
let ownedBirdIds = ['classic'];
const BIRD_SPECIES = {
  classic: { perk:'classic', top:'#ffd4b8', bot:'#ffab91', wing:'#ff8a65', tail:'#ff7043', beak:'#ffeb3b', beakLower:'#ffc107', cheek:'rgba(255,138,101,0.42)', eye:'#4e342e' },
  ember:   { perk:'ember',   top:'#ffccbc', bot:'#e64a19', wing:'#ff7043', tail:'#bf360c', beak:'#ffca28', cheek:'rgba(255,87,34,0.55)', eye:'#4e342e' },
  frost:   { perk:'frost',   top:'#e1f5fe', bot:'#4fc3f7', wing:'#81d4fa', tail:'#0288d1', beak:'#ffd54f', cheek:'rgba(129,212,250,0.65)', eye:'#01579b' },
  neon:    { perk:'neon',    top:'#f8bbd0', bot:'#26c6da', wing:'#ea80fc', tail:'#00bcd4', beak:'#ffeb3b', cheek:'rgba(234,128,252,0.5)', eye:'#311b92' },
  royal:   { perk:'royal',   top:'#fff9c4', bot:'#9575cd', wing:'#ffd54f', tail:'#7e57c2', beak:'#ffb300', cheek:'rgba(255,213,79,0.55)', eye:'#4a148c' },
  storm:   { perk:'storm',   top:'#fff59d', bot:'#5e35b1', wing:'#ffee58', tail:'#4527a0', beak:'#ffca28', cheek:'rgba(126,87,194,0.55)', eye:'#1a237e' }
};
function getBirdSpec(){ return BIRD_SPECIES[selectedBirdId] || BIRD_SPECIES.classic; }
function maxComboMult(){ return getBirdSpec().perk === 'royal' ? 5 : 4; }
function magnetRadius(){ return getBirdSpec().perk === 'neon' ? 155 : 120; }
function applyRosterMessage(d){
  if(!d || d.source !== 'nutricrew' || d.event !== 'roster') return;
  if(d.selectedBirdId && BIRD_SPECIES[d.selectedBirdId]) selectedBirdId = d.selectedBirdId;
  if(Array.isArray(d.ownedBirdIds)) ownedBirdIds = d.ownedBirdIds.filter(id => BIRD_SPECIES[id]);
  try{ localStorage.setItem('nutrirun_bird', selectedBirdId); }catch(e){}
}
try{
  const saved = localStorage.getItem('nutrirun_bird');
  if(saved && BIRD_SPECIES[saved]) selectedBirdId = saved;
}catch(e){}
window.addEventListener('message', e => applyRosterMessage(e.data));

function drawBirdSpeciesFx(c, spec, b, fat, time, bodyW, bodyH){
  const perk = spec.perk;
  if(perk === 'ember'){
    c.save(); c.globalAlpha = 0.35 + 0.2*Math.sin(time*12);
    const g = c.createRadialGradient(-bodyW*0.5, 0, 4, -bodyW*0.5, 0, bodyW*0.9);
    g.addColorStop(0,'#ffab91'); g.addColorStop(1,'rgba(255,87,34,0)');
    c.fillStyle = g; c.beginPath(); c.arc(-bodyW*0.45, 0, bodyW*0.75, 0, TAU); c.fill();
    for(let i=0;i<3;i++){
      const fy = Math.sin(time*14+i)*bodyH*0.2;
      c.fillStyle = ['#ff7043','#ffca28','#ff5722'][i];
      c.beginPath(); c.ellipse(-bodyW*(1.1+i*0.08), fy, bodyW*0.12, bodyH*0.2, -0.4, 0, TAU); c.fill();
    }
    c.restore();
  } else if(perk === 'frost'){
    c.save(); c.globalAlpha = 0.5;
    c.strokeStyle = '#e1f5fe'; c.lineWidth = 2;
    for(let i=0;i<5;i++){
      const a = time*1.8 + i*TAU/5;
      const sx = Math.cos(a)*bodyW*0.75, sy = Math.sin(a)*bodyH*0.55;
      c.beginPath(); c.moveTo(sx, sy); c.lineTo(sx*1.15, sy*1.15); c.stroke();
      c.fillStyle = '#fff'; c.beginPath(); c.arc(sx*1.18, sy*1.18, 3, 0, TAU); c.fill();
    }
    if(pointer.down){
      c.globalAlpha = 0.25; c.fillStyle = '#b3e5fc';
      c.beginPath(); c.ellipse(bodyW*0.9, 0, bodyW*0.35, bodyH*0.2, 0, 0, TAU); c.fill();
    }
    c.restore();
  } else if(perk === 'neon'){
    c.save(); c.globalAlpha = 0.22 + 0.12*Math.sin(time*8);
    c.strokeStyle = '#ea80fc'; c.lineWidth = 3;
    c.beginPath(); c.ellipse(0, 0, bodyW*1.05, bodyH*1.02, 0, 0, TAU); c.stroke();
    c.strokeStyle = '#26c6da';
    c.beginPath(); c.ellipse(0, 0, bodyW*1.18, bodyH*1.12, 0, 0, TAU); c.stroke();
    c.restore();
  } else if(perk === 'royal'){
    c.save();
    c.fillStyle = '#ffd54f'; c.strokeStyle = '#f9a825'; c.lineWidth = 1.5;
    const cx = bodyW*0.22, cy = -bodyH*0.88;
    for(let i=-2;i<=2;i++){
      c.beginPath(); c.moveTo(cx+i*bodyW*0.14, cy+bodyH*0.12);
      c.lineTo(cx+i*bodyW*0.14 - bodyW*0.05, cy-bodyH*0.2); c.lineTo(cx+i*bodyW*0.14 + bodyW*0.05, cy-bodyH*0.2); c.fill();
    }
    c.fillStyle = '#ffeb3b'; c.fillRect(cx-bodyW*0.32, cy+bodyH*0.08, bodyW*0.64, bodyH*0.1);
    c.restore();
  } else if(perk === 'classic'){
    c.save();
    c.globalAlpha = 0.22 + 0.14*Math.sin(time*8);
    const g = c.createRadialGradient(bodyW*0.1, -bodyH*0.2, 4, 0, 0, bodyW*1.05);
    g.addColorStop(0,'#ffe0b2'); g.addColorStop(1,'rgba(255,171,145,0)');
    c.fillStyle = g; c.beginPath(); c.ellipse(0, 0, bodyW*1.02, bodyH*1.0, 0, 0, TAU); c.fill();
    const wingPulse = Math.max(b.wing, b.flapBoost, 1 - wingFlapAmount(b, time));
    if(wingPulse > 0.35){
      c.globalAlpha = wingPulse * 0.28;
      c.strokeStyle = '#ffb74d'; c.lineWidth = 2.5; c.lineCap = 'round';
      for(const side of [-1, 1]){
        const arc = -0.4 + wingPulse * 0.9;
        c.beginPath();
        c.ellipse(side*bodyW*0.35, -bodyH*0.05, bodyW*0.55, bodyH*0.42, side*arc, 0, TAU);
        c.stroke();
      }
    }
    c.restore();
  } else if(perk === 'storm'){
    if(b.flapBoost > 0.25){
      c.save(); c.globalAlpha = b.flapBoost*0.85; c.strokeStyle = '#ffee58'; c.lineWidth = 2.5; c.lineCap = 'round';
      c.beginPath(); c.moveTo(-bodyW*0.3, -bodyH*0.2);
      c.lineTo(-bodyW*0.7, -bodyH*0.45); c.lineTo(-bodyW*0.5, -bodyH*0.05); c.lineTo(-bodyW*1.0, bodyH*0.1); c.stroke();
      c.strokeStyle = '#b39ddb';
      c.beginPath(); c.moveTo(-bodyW*0.2, bodyH*0.1); c.lineTo(-bodyW*0.55, bodyH*0.35); c.stroke();
      c.restore();
    }
  }
}

/* ============================ DRAWING: BIRD =============================== */
function wingBeatWave(cycle){
  if(cycle < 0.3) return 1 - cycle / 0.3;
  return (cycle - 0.3) / 0.7;
}
function wingFlapAmount(b, time){
  let cycle = b.wingCycle ?? 0;
  if(state !== STATE.PLAY || game.intro > 0) cycle = (time * 8) % 1;
  let amt = wingBeatWave(cycle);
  const boost = Math.max(b.wing || 0, b.flapBoost || 0);
  if(boost > 0.08) amt = clamp(amt + boost * 0.22, 0, 1);
  return amt;
}
function updateBirdWingCycle(b, dt){
  let rate = pointer.down ? 6.5 : 9;
  if((b.flapBoost || 0) > 0.15) rate = 12.5;
  else if((b.wing || 0) > 0.2) rate = 10.5;
  if(getBirdSpec().perk === 'classic') rate *= 1.1;
  b.wingCycle = ((b.wingCycle || 0) + dt * rate) % 1;
}
function drawBird(c, b, fat, time){
  const spec = getBirdSpec();
  const isClassic = spec.perk === 'classic';
  const flapAmt = wingFlapAmount(b, time);
  const wingAmp = isClassic ? 1.55 : 1.12;
  const eatScale = 1 + (b.eatPop||0)*0.12;
  const fitStretch = 1 + (1 - fat) * 0.06;
  const squash = (b.bodySquash || 1) / fitStretch;
  c.save();
  c.translate(b.x, b.y + (1 - flapAmt) * 3.5);
  c.rotate(clamp(b.tilt,-0.5,0.9));
  c.scale(eatScale/squash, squash/eatScale);

  const bodyW = b.r*(1.05 + 0.55*fat);
  const bodyH = b.r*(1.0 + 0.32*fat);

  // Shadow under bird
  c.save();
  c.globalAlpha=0.18; c.fillStyle='#000';
  c.beginPath(); c.ellipse(6, bodyH*0.95, bodyW*0.9, bodyH*0.32,0,0,TAU); c.fill();
  c.restore();

  const tailCol = shade(spec.tail, -20);
  c.fillStyle = tailCol;
  c.beginPath();
  c.moveTo(-bodyW*0.7, 0);
  c.lineTo(-bodyW*1.35, -bodyH*0.45*(0.7+0.4*fat));
  c.lineTo(-bodyW*1.3, bodyH*0.2);
  c.closePath(); c.fill();

  const backFlap = clamp(flapAmt * 0.94 + 0.03, 0, 1);
  drawWing(c, -bodyW*0.15, -2, bodyW*0.85, bodyH*0.9, -1, backFlap, shade(spec.wing,-10), wingAmp, true);

  const grad = c.createLinearGradient(0,-bodyH,0,bodyH);
  const top = mixColor(spec.top, shade(spec.top, 30), 1-fat);
  const bot = mixColor(spec.bot, shade(spec.bot, -25), 1-fat);
  grad.addColorStop(0, top);
  grad.addColorStop(1, bot);
  c.fillStyle = grad;
  c.beginPath();
  c.ellipse(0,0, bodyW, bodyH, 0, 0, TAU);
  c.fill();

  // Belly highlight (bigger when fat)
  c.fillStyle = 'rgba(255,255,255,'+(0.55)+')';
  c.beginPath();
  c.ellipse(bodyW*0.12, bodyH*0.28, bodyW*0.62, bodyH*0.6*(0.7+0.4*fat), 0,0,TAU);
  c.fill();
  // Cheek blush
  c.fillStyle = spec.cheek;
  c.beginPath(); c.ellipse(bodyW*0.45, bodyH*0.12, bodyW*0.14, bodyH*0.10,0,0,TAU); c.fill();

  // Happy sparkles after eating fruit
  if((b.happy||0)>0.1){
    c.save();
    c.globalAlpha = clamp(b.happy,0,1)*0.9;
    for(let i=0;i<4;i++){
      const a = time*6 + i*TAU/4;
      const sx = bodyW*0.55 + Math.cos(a)*bodyW*0.35;
      const sy = -bodyH*0.35 + Math.sin(a)*bodyH*0.25;
      drawStar(c,sx,sy,5,2.5,4); c.fillStyle='#fff59d'; c.fill();
    }
    c.restore();
  }

  drawWing(c, bodyW*0.05, -bodyH*0.1, bodyW*0.95, bodyH*1.0, 1, flapAmt, spec.wing, wingAmp, false);

  // Headband (sweatband) appears as bird gets fitter
  if(fat<0.7){
    c.save();
    c.globalAlpha = clamp((0.7-fat)/0.5,0,1);
    c.fillStyle='#ff5a5f';
    c.beginPath();
    c.ellipse(bodyW*0.30, -bodyH*0.72, bodyW*0.5, bodyH*0.18, -0.15,0,Math.PI);
    c.fill();
    c.fillStyle='#fff';
    c.fillRect(bodyW*0.18,-bodyH*0.82, bodyW*0.10, bodyH*0.12);
    c.restore();
  }

  // Eye
  const eyeX=bodyW*0.5, eyeY=-bodyH*0.18, eyeR=b.r*0.26;
  c.fillStyle='#fff';
  c.beginPath(); c.arc(eyeX,eyeY,eyeR,0,TAU); c.fill();
  const blink = b.blink;
  if(blink>0.5){
    c.strokeStyle='#1a1a1a'; c.lineWidth=2.5; c.beginPath();
    c.moveTo(eyeX-eyeR*0.8,eyeY); c.lineTo(eyeX+eyeR*0.8,eyeY); c.stroke();
  } else {
    c.fillStyle = spec.eye;
    c.beginPath(); c.arc(eyeX+eyeR*0.18,eyeY+ (b.eat>0?eyeR*0.1:0), eyeR*0.55,0,TAU); c.fill();
    c.fillStyle='#fff';
    c.beginPath(); c.arc(eyeX+eyeR*0.05,eyeY-eyeR*0.18, eyeR*0.18,0,TAU); c.fill();
  }

  drawBirdSpeciesFx(c, spec, b, fat, time, bodyW, bodyH);

  c.fillStyle = spec.beak;
  const beakOpen = b.eat>0 ? 0.5*Math.sin(time*30)+0.5 : 0;
  c.beginPath();
  c.moveTo(bodyW*0.85, -bodyH*0.05);
  c.lineTo(bodyW*(1.25), bodyH*0.02 - beakOpen*4);
  c.lineTo(bodyW*0.86, bodyH*0.12);
  c.closePath(); c.fill();
  c.fillStyle = spec.beakLower || shade(spec.beak, -12);
  c.beginPath();
  c.moveTo(bodyW*0.85, bodyH*0.06);
  c.lineTo(bodyW*(1.22), bodyH*0.06 + beakOpen*5);
  c.lineTo(bodyW*0.86, bodyH*0.18);
  c.closePath(); c.fill();

  // Little legs (more visible when slim)
  c.strokeStyle='#ff9800'; c.lineWidth=3;
  const legSpread = lerp(0.15,0.05,fat);
  for(const s of [-1,1]){
    c.beginPath();
    c.moveTo(bodyW*0.05+s*bodyW*legSpread, bodyH*0.85);
    c.lineTo(bodyW*0.05+s*bodyW*legSpread, bodyH*1.05);
    c.stroke();
  }

  drawShieldBubble(c, b);
  c.restore();
}
function drawWing(c, x, y, w, h, dir, flapAmt, color, wingAmp, isBack){
  wingAmp = wingAmp ?? 1;
  const beat = 1 - flapAmt;
  c.save();
  c.translate(x, y);
  const downA = 0.68 * wingAmp;
  const upA = -1.25 * wingAmp;
  const a = lerp(downA, upA, flapAmt) * dir;
  c.rotate(a);
  c.scale(1 + beat * 0.16 * wingAmp, 1 - beat * 0.22 * wingAmp);
  const ew = w * (0.44 + beat * 0.06 + (wingAmp > 1 ? 0.05 : 0));
  const eh = h * (0.3 + beat * 0.08 + (wingAmp > 1 ? 0.1 : 0));
  c.globalAlpha = isBack ? 0.88 : 1;
  c.fillStyle = color;
  c.beginPath();
  c.ellipse(dir * w * 0.1, h * 0.15, ew, eh, dir * 0.3, 0, TAU);
  c.fill();
  c.fillStyle = 'rgba(255,255,255,0.3)';
  c.beginPath();
  c.ellipse(dir * w * 0.05, h * 0.05, ew * 0.6, eh * 0.48, dir * 0.3, 0, TAU);
  c.fill();
  if(beat > 0.35){
    c.globalAlpha = (isBack ? 0.12 : 0.2) * beat;
    c.strokeStyle = color;
    c.lineWidth = 2;
    c.beginPath();
    c.ellipse(dir * w * 0.12, h * 0.2, ew * 1.12, eh * 0.85, dir * 0.3, 0, TAU);
    c.stroke();
  }
  if(!isBack && beat > 0.5){
    c.globalAlpha = beat * 0.25;
    c.fillStyle = 'rgba(255,255,255,0.55)';
    for(let i = 0; i < 3; i++){
      c.beginPath();
      c.ellipse(dir * w * (0.2 + i * 0.12), h * (0.28 + i * 0.06), ew * 0.35, eh * 0.2, dir * 0.2, 0, TAU);
      c.fill();
    }
  }
  c.restore();
}
function mixColor(h1,h2,t){
  const a=parseInt(h1.slice(1),16), b=parseInt(h2.slice(1),16);
  const r=Math.round(lerp((a>>16)&255,(b>>16)&255,t));
  const g=Math.round(lerp((a>>8)&255,(b>>8)&255,t));
  const bl=Math.round(lerp(a&255,b&255,t));
  return '#'+((1<<24)+(r<<16)+(g<<8)+bl).toString(16).slice(1);
}

/* ============================ DRAWING: FOOD ============================== */
const HEALTHY = ['apple','banana','carrot','broccoli','strawberry','cherry','grapes','watermelon','pepper','kiwi'];
const JUNK    = ['donut','burger','fries','soda','candy','cake'];
function foodRadial(c, r, stops, ox, oy){
  const g = c.createRadialGradient((ox??-0.28)*r, (oy??-0.32)*r, r*0.08, 0, 0, r);
  stops.forEach(([p,col]) => g.addColorStop(p, col));
  c.fillStyle = g;
}
function foodSpecular(c, r, x, y, w, h, rot){
  c.save(); c.rotate(rot||0.35);
  c.fillStyle='rgba(255,255,255,0.55)';
  c.beginPath(); c.ellipse(x*r, y*r, w*r, h*r, 0, 0, TAU); c.fill();
  c.restore();
}
function drawFood(c, type, x, y, r, t, bob, isJunkFood){

  const breathe = 1 + 0.05*Math.sin(t*3.6 + bobA);
  c.rotate(sway);
  c.scale(breathe, breathe);
  if(isJunkFood){
    c.save();
    c.globalAlpha = 0.18 + 0.1*Math.sin(t*5 + bobA);
    c.fillStyle = '#ff5252';
    c.beginPath(); c.arc(0,0,r*1.35,0,TAU); c.fill();
    c.restore();

  switch(type){
    case 'apple': {

      c.strokeStyle='#5d4037'; c.lineWidth=r*0.09; c.lineCap='round';

      c.fillStyle='#7cb342'; c.beginPath(); c.ellipse(r*0.42,-r*0.72,r*0.14,r*0.08,-0.8,0,TAU); c.fill();

    case 'banana': {

      c.strokeStyle=bg;
      c.beginPath(); c.arc(0,r*0.35,r*0.88,Math.PI*1.12,Math.PI*1.92); c.stroke();
      c.strokeStyle='rgba(139,119,42,0.45)'; c.lineWidth=r*0.1;

      c.fillStyle=cg;
      c.beginPath();

      c.bezierCurveTo(r*0.42,-r*0.15,r*0.55,r*0.35,0,r*0.92); c.fill();
      c.strokeStyle='rgba(191,54,12,0.35)'; c.lineWidth=r*0.06;

      c.strokeStyle='#388e3c'; c.lineWidth=r*0.13; c.lineCap='round';

    case 'watermelon': {

      for(let i=-2;i<=2;i++){ c.beginPath(); c.ellipse(i*r*0.22,r*0.28,r*0.05,r*0.09,0,0,TAU); c.fill(); }

    case 'pepper': {

      c.strokeStyle='rgba(255,255,255,0.7)'; c.lineWidth=r*0.09; c.beginPath(); c.arc(0,0,r*0.28,0,TAU); c.stroke();

      c.fillStyle='#ff9800'; c.beginPath(); c.ellipse(0,-r*0.96,r*0.1,r*0.15,0,0,TAU); c.fill();
      foodSpecular(c, r, -0.2, 0.1, 0.25, 0.2);
      break; }
  }
  c.restore();
}
function isJunk(type){ return JUNK.includes(type); }

  g.addColorStop(0, lv.sky[0]); g.addColorStop(1, lv.sky[1]);

function hill(c, baseY, amp, col, scroll, step, seedOffset){
  c.fillStyle=col;
  c.beginPath(); c.moveTo(0,H);
  c.lineTo(0,baseY);
  for(let x=0;x<=W+step;x+=step){
    const y = baseY - (Math.sin((x+scroll+seedOffset)*0.004)*0.5+0.5)*amp - Math.sin((x+scroll)*0.013+seedOffset)*amp*0.25;
    c.lineTo(x,y);
  }
  c.lineTo(W,H); c.closePath(); c.fill();
}
function cloud(c,x,y,s,alpha){
  c.save(); c.globalAlpha=alpha; c.fillStyle='#fff';
  c.beginPath();
  c.arc(x,y,s,0,TAU); c.arc(x+s*0.9,y+s*0.1,s*0.8,0,TAU); c.arc(x-s*0.9,y+s*0.1,s*0.7,0,TAU); c.arc(x+s*0.2,y-s*0.5,s*0.7,0,TAU);
  c.fill(); c.restore();
}
function sun(c,x,y,r,col){
  const g=c.createRadialGradient(x,y,r*0.2,x,y,r*2.2);
  g.addColorStop(0,col); g.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=g; c.beginPath(); c.arc(x,y,r*2.2,0,TAU); c.fill();
  c.fillStyle=col; c.beginPath(); c.arc(x,y,r,0,TAU); c.fill();
}

function drawBackground(c, lv, scroll, t){
  drawSky(c,lv);
  const gy = H*0.80; // ground line
  const s1 = scroll*0.15, s2 = scroll*0.35, s3 = scroll*0.6;

  switch(lv.theme){
    case 'forest':
      sun(c, W*0.78, H*0.2, 34, '#fff59d');
      cloud(c,(W*0.3 - s1*0.3)%(W+200),H*0.18,28,0.85);
      cloud(c,(W*0.8 - s1*0.3+300)%(W+200),H*0.12,22,0.7);
      hill(c, gy, H*0.18, '#2e7d32', s1, 40, 0);
      hill(c, gy+10, H*0.12, '#388e3c', s2, 36, 120);
      drawTrees(c, gy, s2, '#1b5e20', 0.7);
      break;
    case 'desert':
      sun(c, W*0.7, H*0.22, 40, '#ffd54f');
      hill(c, gy, H*0.10, '#caa05a', s1, 60, 0);
      hill(c, gy+20, H*0.08, '#d9b277', s2, 70, 80);
      drawCacti(c, gy, s2);
      break;
    case 'antarctica':
      for(let i=0;i<40;i++){ const x=(i*97 - s2*0.5)%(W+40); const y=(i*53)%H; c.fillStyle='rgba(255,255,255,'+(0.5+0.5*((i%5)/5))+')'; c.beginPath(); c.arc(x,y,2+ (i%3),0,TAU); c.fill(); }
      hill(c, gy, H*0.16, '#cfe8ff', s1, 50, 0);
      hill(c, gy+10, H*0.12, '#e8f4ff', s2, 44, 90);
      drawIcebergs(c, gy, s2);
      break;
    case 'underwater':
      drawBubbles(c, t, s2);
      drawSeaweed(c, gy, s2);
      // light rays
      c.save(); c.globalAlpha=0.12; c.fillStyle='#bfffe8';
      for(let i=0;i<4;i++){ const x=(i*W*0.3 - s1*0.2)%(W+200); c.beginPath(); c.moveTo(x,0); c.lineTo(x+60,0); c.lineTo(x+140,H); c.lineTo(x+40,H); c.fill(); }
      c.restore();
      break;
    default:
      // City themes share generic skyline + landmark
      drawCity(c, lv, scroll, t, gy);
  }
}

function drawTrees(c, gy, scroll, col, scale){
  for(let i=0;i<8;i++){
    const x = ((i*180) - scroll) % (W+260); const xx = x<-120?x+W+260:x;
    const h = 90*scale + (i%3)*22;
    c.fillStyle=shade(col,-10); c.fillRect(xx-6, gy-h*0.4, 12, h*0.4);
    c.fillStyle=col;
    c.beginPath(); c.arc(xx,gy-h*0.5,h*0.32,0,TAU); c.arc(xx-h*0.2,gy-h*0.3,h*0.26,0,TAU); c.arc(xx+h*0.2,gy-h*0.3,h*0.26,0,TAU); c.fill();
    c.fillStyle=shade(col,18); c.beginPath(); c.arc(xx+h*0.08,gy-h*0.58,h*0.18,0,TAU); c.fill();
  }
}
function drawCacti(c, gy, scroll){
  for(let i=0;i<6;i++){
    const x=((i*230)-scroll)%(W+300); const xx=x<-150?x+W+300:x;
    const h=70+(i%3)*30;
    c.fillStyle='#388e3c';
    rr(c,xx-9,gy-h,18,h,9); c.fill();
    rr(c,xx-9-22,gy-h*0.55,18,h*0.4,9); c.fill();
    rr(c,xx-9-22,gy-h*0.55,16,8,6); c.fill();
    rr(c,xx+13,gy-h*0.7,16,h*0.4,8); c.fill();
  }
}
function drawIcebergs(c, gy, scroll){
  for(let i=0;i<6;i++){
    const x=((i*240)-scroll)%(W+320); const xx=x<-160?x+W+320:x;
    const h=80+(i%3)*40;
    c.fillStyle='#b3e0ff';
    c.beginPath(); c.moveTo(xx-h*0.6,gy); c.lineTo(xx-h*0.1,gy-h); c.lineTo(xx+h*0.2,gy-h*0.6); c.lineTo(xx+h*0.6,gy); c.fill();
    c.fillStyle='#e3f4ff'; c.beginPath(); c.moveTo(xx-h*0.1,gy-h); c.lineTo(xx+h*0.2,gy-h*0.6); c.lineTo(xx-h*0.05,gy-h*0.55); c.fill();
  }
}
function drawSeaweed(c, gy, scroll){
  c.strokeStyle='#1b9e7a'; c.lineWidth=10; c.lineCap='round';
  for(let i=0;i<10;i++){
    const x=((i*150)-scroll)%(W+200); const xx=x<-100?x+W+200:x;
    const sway=Math.sin(game.t*1.5+i)*16;
    c.beginPath(); c.moveTo(xx,H); c.quadraticCurveTo(xx+sway, gy-30, xx+sway*1.4, gy-110); c.stroke();
  }
}
function drawBubbles(c, t, scroll){
  for(let i=0;i<26;i++){
    const x=(i*73 + Math.sin(t+i)*20)%W;
    const y=H - ((t*40 + i*60)%(H+40));
    c.save(); c.globalAlpha=0.25; c.strokeStyle='#cffaf0'; c.lineWidth=2; c.beginPath(); c.arc(x,y,2+(i%4),0,TAU); c.stroke(); c.restore();
  }
}

/* ---- City background + landmark ---- */
function drawCity(c, lv, scroll, t, gy){
  // soft sun/moon
  sun(c, W*0.2, H*0.18, 30, 'rgba(255,255,255,0.7)');
  // far skyline silhouette
  const s1=scroll*0.12;
  c.fillStyle=shade(lv.accent, 70);
  for(let i=0;i<14;i++){
    const x=((i*120)-s1)%(W+200); const xx=x<-100?x+W+200:x;
    const h=60+((i*53)%90);
    c.globalAlpha=0.5; c.fillRect(xx, gy-h, 80, h); c.globalAlpha=1;
  }
  // landmark in mid layer (parallax slow), centered-ish, repeats slowly
  drawLandmark(c, lv.landmark, lv, scroll*0.18, gy, t);
  // near buildings
  const s3=scroll*0.5;
  c.fillStyle=shade(lv.accent,-10);
  for(let i=0;i<10;i++){
    const x=((i*170)-s3)%(W+260); const xx=x<-130?x+W+260:x;
    const h=80+((i*71)%120);
    c.fillRect(xx, gy-h, 110, h);
    // windows
    c.fillStyle='rgba(255,235,150,0.55)';
    for(let wy=gy-h+10; wy<gy-10; wy+=22){
      for(let wx=xx+12; wx<xx+98; wx+=24){ c.fillRect(wx,wy,12,12); }
    }
    c.fillStyle=shade(lv.accent,-10);
  }
}

function drawLandmark(c, kind, lv, scroll, gy, t){
  // place one landmark that slowly drifts; wrap so it's always visible-ish
  const period = W*1.4;
  let lx = (W*0.5 - (scroll % period));
  // draw two instances for seamless wrap
  for(let k=0;k<2;k++){
    const x = lx + k*period;
    if(x < -period*0.6 || x > W+period*0.6) continue;
    c.save(); c.translate(x, gy);
    switch(kind){
      case 'eiffel':    landmarkEiffel(c); break;
      case 'bigben':    landmarkBigBen(c); break;
      case 'kremlin':   landmarkKremlin(c, t); break;
      case 'colosseum': landmarkColosseum(c); break;
      case 'liberty':   landmarkLiberty(c); break;
      case 'fuji':      landmarkFuji(c); break;
      case 'pyramids':  landmarkPyramids(c); break;
      case 'opera':     landmarkOpera(c); break;
      case 'greatwall': landmarkGreatWall(c); break;
      case 'rio':       landmarkRio(c); break;
      case 'burj':      landmarkBurj(c); break;
    }
    c.restore();
  }
}
function landmarkEiffel(c){
  const H0=240, w=120;
  c.fillStyle='#6d5a48'; c.globalAlpha=0.92;
  // legs
  c.beginPath();
  c.moveTo(-w*0.5,0); c.lineTo(-w*0.18,-H0*0.45); c.lineTo(-w*0.1,-H0*0.45); c.lineTo(-w*0.3,0); c.fill();
  c.beginPath();
  c.moveTo(w*0.5,0); c.lineTo(w*0.18,-H0*0.45); c.lineTo(w*0.1,-H0*0.45); c.lineTo(w*0.3,0); c.fill();
  // arch
  c.beginPath(); c.moveTo(-w*0.4,-H0*0.12); c.quadraticCurveTo(0,-H0*0.32,w*0.4,-H0*0.12); c.lineTo(w*0.34,-H0*0.05); c.quadraticCurveTo(0,-H0*0.2,-w*0.34,-H0*0.05); c.fill();
  // mid tower
  c.beginPath(); c.moveTo(-w*0.18,-H0*0.45); c.lineTo(-w*0.08,-H0*0.78); c.lineTo(w*0.08,-H0*0.78); c.lineTo(w*0.18,-H0*0.45); c.fill();
  c.fillRect(-w*0.1,-H0*0.5,w*0.2,6);
  // top spire
  c.beginPath(); c.moveTo(-w*0.08,-H0*0.78); c.lineTo(0,-H0); c.lineTo(w*0.08,-H0*0.78); c.fill();
  c.globalAlpha=1;
}
function landmarkBigBen(c){
  const H0=240, w=46;
  c.fillStyle='#8d8472'; c.globalAlpha=0.95;
  c.fillRect(-w/2,-H0*0.78,w,H0*0.78);
  // clock face
  c.fillStyle='#f5f0d8'; c.beginPath(); c.arc(0,-H0*0.6,w*0.34,0,TAU); c.fill();
  c.strokeStyle='#5a5142'; c.lineWidth=3; c.beginPath(); c.arc(0,-H0*0.6,w*0.34,0,TAU); c.stroke();
  c.beginPath(); c.moveTo(0,-H0*0.6); c.lineTo(0,-H0*0.66); c.moveTo(0,-H0*0.6); c.lineTo(w*0.18,-H0*0.6); c.stroke();
  // belfry + spire
  c.fillStyle='#7a7160'; c.fillRect(-w*0.6,-H0*0.86,w*1.2,H0*0.1);
  c.beginPath(); c.moveTo(-w*0.6,-H0*0.86); c.lineTo(0,-H0*1.02); c.lineTo(w*0.6,-H0*0.86); c.fill();
  c.beginPath(); c.moveTo(0,-H0*1.02); c.lineTo(0,-H0*1.08); c.lineWidth=4; c.strokeStyle='#7a7160'; c.stroke();

}
function landmarkKremlin(c, t){
  c.globalAlpha=0.96;
  // central tower
  c.fillStyle='#b23a48'; c.fillRect(-26,-200,52,200);
  c.beginPath(); c.moveTo(-30,-200); c.lineTo(0,-236); c.lineTo(30,-200); c.fill();
  // red star
  c.fillStyle='#ffd54f'; c.save(); c.translate(0,-248); drawStar(c,0,0,12,5,5); c.fill(); c.restore();
  // St Basil onion domes
  const domes=[[-78,-120,'#3f9e8c'],[78,-120,'#d4543f'],[-120,-100,'#e0b13a'],[120,-100,'#5a7fb5']];
  for(const d of domes){
    const [dx,dy,col]=d;
    c.fillStyle='#c8b89a'; c.fillRect(dx-16,dy,32,120+ (dy*-1-100));
    // body
    c.fillStyle='#d8c8a8'; c.fillRect(dx-18,dy,36,-dy);
    // onion dome
    c.fillStyle=col;
    c.beginPath();
    c.moveTo(dx-18,dy);
    c.bezierCurveTo(dx-26,dy-26, dx-12,dy-46, dx,dy-54);
    c.bezierCurveTo(dx+12,dy-46, dx+26,dy-26, dx+18,dy);
    c.fill();
    // stripes
    c.strokeStyle=shade(col,40); c.lineWidth=3;
    for(let i=-1;i<=1;i++){ c.beginPath(); c.moveTo(dx+i*8,dy); c.quadraticCurveTo(dx+i*4,dy-30,dx,dy-50); c.stroke(); }
    // cross
    c.strokeStyle='#ffd54f'; c.lineWidth=3; c.beginPath(); c.moveTo(dx,dy-54); c.lineTo(dx,dy-66); c.moveTo(dx-5,dy-60); c.lineTo(dx+5,dy-60); c.stroke();
  }
  c.globalAlpha=1;
}
function landmarkColosseum(c){
  c.globalAlpha=0.95; c.fillStyle='#c2a06a';
  const w=220,h=140;
  c.beginPath(); c.ellipse(0,-h*0.5,w*0.5,h*0.55,0,0,TAU); c.fill();

  c.beginPath(); c.ellipse(0,-h*0.45,w*0.34,h*0.4,0,0,TAU); c.fill();

  c.fillStyle='#c2a06a';
  c.beginPath(); c.ellipse(0,-h*0.45,w*0.34,h*0.4,0,0,TAU); c.ellipse(0,-h*0.45,w*0.28,h*0.32,0,0,TAU,true); c.fill();
  c.fillStyle=shade('#c2a06a',-40);
  for(let row=0;row<3;row++){

function landmarkFuji(c){

function landmarkPyramids(c){

function landmarkGreatWall(c){

  c.fillRect(-6,-180,12,80); // body

function landmarkBurj(c){

/* ============================ OBSTACLES / FOOD =========================== */
function obstacleColor(lv){
  switch(lv.theme){
    case 'forest': return {main:'#5d4037', cap:'#2e7d32'};
    case 'desert': return {main:'#43a047', cap:'#2e7d32'};
    case 'antarctica': return {main:'#cdeefe', cap:'#9ad1f0'};
    case 'underwater': return {main:'#15a37a', cap:'#0e7d5e'};
    default: return {main:shade(lv.accent,10), cap:shade(lv.accent,-20)};
  }
}
function onObstaclePassed(o){
  const b = game.bird;
  game.flightsPassed++;
  progress.totalFlights = (progress.totalFlights || 0) + 1;
  bumpCombo();
  const gapMid = o.gapY + o.gapH*0.5;
  const perfect = Math.abs(b.y - gapMid) < o.gapH*0.16;
  addScore(perfect ? 8 : 2, perfect ? 'Идеально!' : null, b.x, b.y-20);
  if(perfect){ burst(b.x, b.y, '#7ec4a0', 10, 100); haptic('light'); }
  const prevUnlocked = progress.unlocked;
  progress.unlocked = computeUnlockedFromFlights(progress.totalFlights);
  if(progress.unlocked > prevUnlocked){
    game.unlockBanner = { level: progress.unlocked, time: 3.2 };
    SFX.level();
    haptic('success');
    confetti(W/2, H*0.35, 36);
    addFloatText(W*0.5, H*0.28, 'Ур. '+progress.unlocked+' открыт!', '#7ec4a0', 1.1);
  }
  progress.best = Math.max(progress.best, game.score);
  saveProgress(progress);
}
function debrisKindForTheme(theme){
  if(theme==='forest') return 'branch';
  if(theme==='antarctica') return 'icicle';
  if(theme==='desert') return 'stone';
  if(theme==='underwater') return 'kelp';
  return Math.random()<0.5 ? 'branch' : 'stone';
}
function spawnDebrisFromPipe(o){
  const fromTop = Math.random()<0.5;
  const y = fromTop ? o.gapY - 6 : o.gapY + o.gapH + 6;
  game.debris.push({
    x: o.x + o.w*0.45 + rand(-8, 8),
    y, vy: rand(95, 185), vx: rand(-35, 35),
    type: debrisKindForTheme(o.kind),
    r: rand(12, 20), rot: rand(0, TAU), spin: rand(-5, 5),
    wobble: rand(0, TAU)
  });
}
function spawnObstacle(){
  const p=game.params;
  const lv=getLevel(game.level);
  const gapH = H*p.gap;
  const minTop = H*0.10, maxTop = H*0.80 - gapH;
  const gapY = rand(minTop, Math.max(minTop+10,maxTop));
  const w = clamp(W*0.13, 56, 92);
  const hazard = hazardActive();
  const moveChance = hazard ? clamp(0.45 + (game.score-100)/350, 0.45, 0.88) : 0.12;

function drawZoneHazard(c, zh, t){
  if(zh.emerge <= 0.01) return;
  c.save();
  const bob = Math.sin(t*3.2 + zh.phase) * 2.5;
  const lift = (1 - zh.emerge) * zh.h * 0.55;
  const lunge = zh.lunge || 0;
  const mouth = zh.mouth || 0;
  c.translate(zh.x, zh.y + lift + bob);
  c.globalAlpha = 0.22 * zh.emerge;
  c.fillStyle = '#000';
  c.beginPath(); c.ellipse(0, 4, zh.w*0.34*zh.emerge, zh.h*0.05, 0, 0, TAU); c.fill();
  c.scale(zh.emerge, zh.emerge);
  c.globalAlpha = 0.94 + 0.06 * Math.sin(t*4 + zh.phase);
  const w = zh.w, h = zh.h;
  if(lunge > 0.6 && ['bear','hunter','shark','wolf','lion','croc','dog'].includes(zh.type)){
    c.save(); c.globalAlpha = lunge*0.35; c.fillStyle = '#ff5252';
    c.font = fontSans(18,'700'); c.textAlign='center';
    c.fillText('!', w*0.1, -h*0.95); c.restore();
  }
  switch(zh.type){
    case 'bear': drawHazardBear(c, w, h, t, lunge, mouth); break;
    case 'hunter': drawHazardHunter(c, w, h, t, lunge); break;
    case 'scorpion': drawHazardScorpion(c, w, h, t, lunge); break;
    case 'vulture': drawHazardVulture(c, w, h, t, lunge); break;
    case 'seal': drawHazardSeal(c, w, h, t, lunge); break;
    case 'yeti': drawHazardYeti(c, w, h, t, lunge); break;
    case 'shark': drawHazardShark(c, w, h, t, lunge, mouth); break;
    case 'angler': drawHazardAngler(c, w, h, t, lunge); break;
    case 'dog': drawHazardDog(c, w, h, t, lunge, mouth); break;
    case 'guard': drawHazardGuard(c, w, h, t, lunge); break;
    case 'wolf': drawHazardWolf(c, w, h, t, lunge, mouth); break;
    case 'lion': drawHazardLion(c, w, h, t, lunge, mouth); break;
    case 'rat': drawHazardRat(c, w, h, t, lunge); break;
    case 'tanuki': drawHazardTanuki(c, w, h, t, lunge); break;
    case 'jackal': drawHazardJackal(c, w, h, t, lunge, mouth); break;

function drawNitroFlames(c, b){
  if(game.nitroTime<=0) return;
  c.save();
  const pulse = 0.75 + 0.25*Math.sin(game.t*22);
  for(let i=0;i<10;i++){
    const fy = b.y + Math.sin(game.t*16 + i*1.4)*12;
    const fx = b.x - b.r*(0.85 + i*0.14);
    c.globalAlpha = pulse * (0.4 + i*0.06);
    c.fillStyle = ['#ff9800','#ffeb3b','#ff5722','#fff176'][i%4];
    c.beginPath(); c.ellipse(fx, fy, 10+i*2.5, 5+i*1.2, 0, 0, TAU); c.fill();
  }
  c.globalAlpha = 0.42*pulse;
  const g = c.createLinearGradient(b.x-b.r*2.8, b.y, b.x, b.y);
  g.addColorStop(0, 'rgba(255,87,34,0)');
  g.addColorStop(0.45, 'rgba(255,152,0,0.85)');
  g.addColorStop(1, 'rgba(255,235,59,0.95)');
  c.fillStyle = g;
  c.beginPath(); c.moveTo(b.x-b.r*1.0, b.y);
  c.lineTo(b.x-b.r*2.9, b.y-b.r*0.55);
  c.lineTo(b.x-b.r*2.6, b.y+b.r*0.55);
  c.closePath(); c.fill();
  c.restore();
}
function drawObstacle(c, o, lv){
  const col=obstacleColor(lv);
  const topH=o.gapY, botY=o.gapY+o.gapH;
  if(o.moving){
    c.save();
    c.globalAlpha = 0.35 + 0.2*Math.sin(game.t*6 + o.x*0.02);
    c.fillStyle = '#fff59d';
    const ax = o.x + o.w*0.5;
    c.beginPath(); c.moveTo(ax, topH-14); c.lineTo(ax-6, topH-4); c.lineTo(ax+6, topH-4); c.fill();
    c.beginPath(); c.moveTo(ax, botY+14); c.lineTo(ax-6, botY+4); c.lineTo(ax+6, botY+4); c.fill();
    c.restore();
  }
  // style per theme
  if(o.kind==='forest'){
    // tree trunks
    drawTrunk(c,o.x,0,o.w,topH,true,col);
    drawTrunk(c,o.x,botY,o.w,H-botY,false,col);
  } else if(o.kind==='underwater'){
    drawCoral(c,o.x,0,o.w,topH,true);
    drawCoral(c,o.x,botY,o.w,H-botY,false);
  } else if(o.kind==='antarctica'){
    drawIceCol(c,o.x,0,o.w,topH,true);
    drawIceCol(c,o.x,botY,o.w,H-botY,false);
  } else {
    // generic pillar (pipe) with cap
    pillar(c,o.x,0,o.w,topH,true,col);
    pillar(c,o.x,botY,o.w,H-botY,false,col);
  }
}
function pillar(c,x,y,w,h,top,col){
  const g=c.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,shade(col.main,-20)); g.addColorStop(0.4,col.main); g.addColorStop(1,shade(col.main,-30));
  c.fillStyle=g; c.fillRect(x,y,w,h);
  c.fillStyle=col.cap;
  const capY = top? y+h-18 : y;
  rr(c,x-6,capY,w+12,18,6); c.fill();
}

  c.fillStyle=g; c.fillRect(x,y,w,h);
  c.strokeStyle='rgba(0,0,0,0.18)'; c.lineWidth=2;
  for(let i=1;i<3;i++){ c.beginPath(); c.moveTo(x+w*i/3,y); c.lineTo(x+w*i/3,y+h); c.stroke(); }
  // leafy cap
  const cy = top? y+h : y;
  c.fillStyle='#2e7d32';
  c.beginPath(); c.arc(x+w*0.5,cy + (top?-6:6), w*0.7, 0, TAU); c.fill();
  c.fillStyle='#388e3c'; c.beginPath(); c.arc(x+w*0.25,cy+(top?-2:2),w*0.4,0,TAU); c.arc(x+w*0.75,cy+(top?-2:2),w*0.4,0,TAU); c.fill();
}
function drawCoral(c,x,y,w,h,top){
  const g=c.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#0e7d5e'); g.addColorStop(0.5,'#15a37a'); g.addColorStop(1,'#0e7d5e');
  c.fillStyle=g; rr(c,x,y,w,h, w*0.3); c.fill();
  c.fillStyle='#ff7e9d';
  const cy=top?y+h:y;
  for(let i=0;i<4;i++){ c.beginPath(); c.arc(x+w*(0.2+i*0.2), cy+(top?-8:8), 6,0,TAU); c.fill(); }
}
function drawIceCol(c,x,y,w,h,top){
  const g=c.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#a7d8f5'); g.addColorStop(0.5,'#e3f4ff'); g.addColorStop(1,'#a7d8f5');
  c.fillStyle=g; c.fillRect(x,y,w,h);
  c.fillStyle='#cdeefe';
  const cy=top?y+h:y;
  c.beginPath();
  if(top){ c.moveTo(x,cy-10); c.lineTo(x+w*0.5,cy+12); c.lineTo(x+w,cy-10); }
  else   { c.moveTo(x,cy+10); c.lineTo(x+w*0.5,cy-12); c.lineTo(x+w,cy+10); }
  c.fill();
}

let muteHotspot=null;
function drawHUD(c){
  const p=game.params;
  // top gradient
  const g=c.createLinearGradient(0,0,0,80); g.addColorStop(0,'rgba(0,0,0,0.32)'); g.addColorStop(1,'rgba(0,0,0,0)');

  const pad = 14 + safeTop();

  c.fillStyle='#fff'; c.font=fontSans(18,'700'); c.textAlign='left'; c.textBaseline='top';
  c.fillText('Ур. '+(game.level+1)+' · '+levelLabel(game.level), 16, pad);

  // Hearts
  c.textAlign='right';
  for(let i=0;i<3;i++){
    drawHeart(c, W-22 - i*30, pad+10, 11, i<game.lives ? '#ff5252':'rgba(255,255,255,0.25)');
  }

  // progress bar — пролёты до следующего уровня
  const barW=Math.min(W-32, 360), barX=(W-barW)/2, barY=pad+34, barH=14;
  const nextReq = flightsToUnlockNext(progress.unlocked);
  const tierStart = cumulativeFlightsForLevel(progress.unlocked - 1);
  const tierProg = clamp((progress.totalFlights - tierStart) / nextReq, 0, 1);
  rr(c,barX,barY,barW,barH,7); c.fillStyle='rgba(0,0,0,0.3)'; c.fill();
  rr(c,barX,barY, Math.max(8,barW*tierProg), barH,7);
  const bg=c.createLinearGradient(barX,0,barX+barW,0); bg.addColorStop(0,'#9fd9b8'); bg.addColorStop(1,'#7ec4a0');
  c.fillStyle=bg; c.fill();
  c.fillStyle='#fff'; c.font=fontSans(11,'600'); c.textAlign='center'; c.textBaseline='middle';
  const flightsInTier = progress.totalFlights - tierStart;
  c.fillText('Пролёты: '+game.flightsPassed+' · '+flightsInTier+'/'+nextReq+' до ур. '+(progress.unlocked+1), barX+barW/2, barY+barH/2+1);

  if(state===STATE.PLAY && game.runStartFat && game.displayFat < game.runStartFat - 0.02){
    const slimPct = Math.round((1 - game.displayFat) * 100);
    c.textAlign='center'; c.font=fontSans(11,'600'); c.fillStyle='rgba(174,234,0,0.85)';
    c.fillText('Стройность '+slimPct+'%', W/2, barY+barH+16);
  }

  // score bottom-left
  c.textAlign='left'; c.textBaseline='bottom'; c.font=fontSans(16,'700'); c.fillStyle='#fff';
  c.fillText('Очки: '+game.score+(game.multiplier>1?'  x'+game.multiplier.toFixed(1):''), 16, H-14-safeBottom());

  if(game.combo>1){
    c.textAlign='center'; c.fillStyle='#ffd54f'; c.font=fontSans(13,'700');
    c.fillText('Комбо '+game.combo, W/2, H-16-safeBottom());
    c.textAlign='left';
  }
  if(game.hazardBanner && game.hazardBanner.time > 0){
    const a = clamp(game.hazardBanner.time / 2.8, 0, 1);
    c.save(); c.globalAlpha = a * (0.75 + 0.25*Math.sin(game.t*5));
    c.textAlign='center'; c.font=fontSans(13,'700'); c.fillStyle='#fff59d';
    c.fillText('🌿 Ветки и лёд падают с труб!', W/2, pad + 58);
    c.restore();
  }
  if(pointer.down && state===STATE.PLAY && game.intro<=0){
    c.textAlign='right'; c.fillStyle='rgba(238,245,240,0.55)'; c.font=fontSans(10,'500');
    c.fillText('Планирование', W-16, H-16-safeBottom());
    c.textAlign='left';
  }
  drawPowerIcons(c);

  // mute button (top-left under title not to overlap)
  const mx=16, my=pad+ (barY-pad) + 0; // we'll place near bottom-right corner instead
  muteHotspot = {x:W-46, y:H-46-safeBottom(), w:34, h:34};
  c.save();
  rr(c,muteHotspot.x,muteHotspot.y,muteHotspot.w,muteHotspot.h,8); c.fillStyle='rgba(0,0,0,0.3)'; c.fill();
  c.fillStyle='#fff'; c.font=fontSans(16,'500'); c.textAlign='center'; c.textBaseline='middle';
  c.fillText(muted?'🔇':'🔊', muteHotspot.x+muteHotspot.w/2, muteHotspot.y+muteHotspot.h/2+1);
  c.restore();
}
function drawHeart(c,x,y,s,col){
  c.save(); c.translate(x,y); c.fillStyle=col;
  c.beginPath();
  c.moveTo(0,s*0.3);
  c.bezierCurveTo(0,-s*0.2, -s, -s*0.2, -s, s*0.25);
  c.bezierCurveTo(-s, s*0.7, 0, s, 0, s*1.1);
  c.bezierCurveTo(0, s, s, s*0.7, s, s*0.25);
  c.bezierCurveTo(s, -s*0.2, 0, -s*0.2, 0, s*0.3);
  c.fill(); c.restore();
}
function safeTop(){ try{ return (TG && TG.safeAreaInset && TG.safeAreaInset.top)||0; }catch(e){ return 0; } }
function safeBottom(){ try{ return (TG && TG.safeAreaInset && TG.safeAreaInset.bottom)||0; }catch(e){ return 0; } }

function buildLevels(){
  clearButtons();
  const cols=3;
  const levelCount = Math.max(6, progress.unlocked + 1);
  const rows = Math.ceil(levelCount / cols);
  const gw=Math.min(W*0.86,420), cell=gw/cols, gx=(W-gw)/2, gy=H*0.16+safeTop();
  const size=cell-12;
  for(let i=0;i<levelCount;i++){
    const cx=gx + (i%cols)*cell + 6;
    const cy=gy + Math.floor(i/cols)*(size+14);
    const unlocked = i < progress.unlocked;
    const need = cumulativeFlightsForLevel(i);
    addButton({ x:cx, y:cy, w:size, h:size, label:'', idx:i, locked:!unlocked, needFlights:need,
      onClick:()=>{ if(unlocked){ startLevel(i); } else { haptic('warning'); } }, id:'lvl'+i });
  }
  const bw=Math.min(W*0.6,260);
  addButton({ x:(W-bw)/2, y:H-80-safeBottom(), w:bw, h:50, label:'← Назад', onClick:()=>{ state=STATE.MENU; buildMenu(); }, id:'back' });

}

/* ============================ WORLD RENDER ============================== */
function renderWorld(c, frozen){
  const lv=getLevel(game.level);
  c.save();
  if(game.shake>0){ const s=game.shake; c.translate(rand(-s,s),rand(-s,s)); }
  drawBackground(c, lv, game.scrollX, game.t);
  // ground strip
  const gy=H*0.80;
  c.fillStyle=lv.ground; c.fillRect(0,gy,W,H-gy);
  c.fillStyle=shade(lv.ground,-18);
  for(let x=-( (game.scrollX*0.6)%40);x<W;x+=40){ c.fillRect(x,gy,20,6); }

  drawThermals(c);
  for(const d of game.debris){ drawDebris(c, d, game.t); }
  for(const o of game.obstacles){ drawObstacle(c, o, lv); }
  for(const zh of game.zoneHazards){ drawZoneHazard(c, zh, game.t); }
  // foods
  for(const f of game.foods){ if(f.taken) continue;
    const bobY = Math.sin(game.t*3.2+f.bob)*5;
    const by = f.y + bobY;
    const pulse = 1 + 0.04*Math.sin(game.t*4.5+f.bob);
    if(!f.junk){
      c.save(); c.globalAlpha=0.28+0.12*Math.sin(game.t*5+f.bob);
      const glowCol = f.type==='alarmclock' ? '#90caf9' : f.type==='turboorange' ? '#ff9800' : f.power==='golden' ? '#ffd54f' : (f.power ? POWER[f.power].color : '#fff59d');
      c.fillStyle = glowCol;
      c.beginPath(); c.arc(f.x,by,f.r*1.55*pulse,0,TAU); c.fill(); c.restore();
    }
    drawFood(c, f.type, f.x, by, f.r*pulse, game.t, f.bob, f.junk);
  }
  if(game.magnetTime>0 && game.bird){
    c.save(); c.globalAlpha=0.12+0.06*Math.sin(game.t*6);
    c.strokeStyle = getBirdSpec().perk==='neon' ? '#ea80fc' : '#ba68c8'; c.lineWidth=2;
    c.beginPath(); c.arc(game.bird.x, game.bird.y, magnetRadius(), 0, TAU); c.stroke();
    c.restore();
  }
  if(game.chronoTime>0){
    c.save(); c.globalAlpha=0.1+0.05*Math.sin(game.t*4); c.fillStyle='#90caf9'; c.fillRect(0,0,W,H); c.restore();
  } else if(game.slowmoTime>0){
    c.save(); c.globalAlpha=0.08; c.fillStyle='#4dd0e1'; c.fillRect(0,0,W,H); c.restore();
  }
  if(game.nitroTime>0 && game.bird){
    c.save(); c.globalAlpha=0.1+0.04*Math.sin(game.t*14); c.fillStyle='#ff9800'; c.fillRect(0,0,W,H); c.restore();
    drawNitroFlames(c, game.bird);
  }
  // bird
  if(game.bird){
    const flash = game.invuln>0 && Math.floor(game.invuln*12)%2===0;
    if(!flash) drawBird(c, game.bird, game.displayFat, game.t);
  }
  drawEatRings(c);
  drawParticles(c);
  drawFloatTexts(c);
  c.restore();

  // flash overlay
  if(game.flashTime>0){
    c.save(); c.globalAlpha=clamp(game.flashTime,0,0.6); c.fillStyle=game.flashColor||'#fff'; c.fillRect(0,0,W,H); c.restore();
  }
  drawHUD(c);

  // intro countdown
  if(game.intro>0){
    c.save();
    c.fillStyle='rgba(0,0,0,0.25)'; c.fillRect(0,0,W,H);
    c.textAlign='center'; c.textBaseline='middle'; c.fillStyle='#eef5f0';
    const n=Math.ceil(game.intro);
    c.font=fontDisplay(80,'700');
    c.globalAlpha=clamp(game.intro%1+0.2,0,1);
    c.fillText(n>0?n:'', W/2, H*0.45);
    c.globalAlpha=1; c.font=fontSans(18,'600');
    c.fillText('Тап — взлёт · Удерживай — планирование', W/2, H*0.45+70);
    c.restore();
  }

  if(game.unlockBanner){
    const ub = game.unlockBanner;
    const alpha = clamp(ub.time / 0.4, 0, 1);
    c.save();
    c.globalAlpha = alpha * 0.92;
    const bw = Math.min(W*0.88, 360), bx = (W-bw)/2, by = H*0.14 + safeTop();
    rr(c, bx, by, bw, 52, 14);
    c.fillStyle = 'rgba(30,42,36,0.92)'; c.fill();
    rr(c, bx, by, bw, 52, 14); c.strokeStyle = '#7ec4a0'; c.lineWidth = 2; c.stroke();
    c.fillStyle = '#7ec4a0'; c.font = fontDisplay(20,'700');
    c.textAlign = 'center'; c.textBaseline = 'middle';
    c.fillText('🎉 Открыт уровень '+ub.level+'!', W/2, by+26);
    c.restore();
  }
}

/* ============================ UPDATE (PLAY) ============================= */
function updatePlay(dt){
  const p=game.params, b=game.bird;
  if(game.chronoTime>0) game.chronoTime -= dt;
  if(game.slowmoTime>0) game.slowmoTime -= dt;
  if(game.nitroTime>0) game.nitroTime -= dt;
  if(game.shieldTime>0) game.shieldTime -= dt;
  if(game.magnetTime>0) game.magnetTime -= dt;
  if(game.comboTimer>0){
    game.comboTimer -= dt;
    if(game.comboTimer<=0) resetCombo();
  }
  if(game.nearMissCd>0) game.nearMissCd -= dt;

  const slow = scrollSlowFactor();
  const scrollDt = dt * slow;
  const speed = p.speed * slow * nitroSpeedMult();
  game.scrollX += speed*scrollDt;
  game.distance += speed*scrollDt;

  if(game.intro>0){ game.intro-=dt; b.y=H*0.45+Math.sin(game.t*4)*8; b.tilt=0; return; }

  updateRunSlimming();
  game.displayFat = lerp(game.displayFat, game.targetFat, 1-Math.pow(0.5, dt*1.35));

  const gliding = pointer.down;
  const nitro = game.nitroTime > 0;
  const grav = gliding ? (nitro ? 420 : 720) : (nitro ? 780 : 1500);
  b.vy += grav*dt;
  if(gliding) b.vy = clamp(b.vy, -280, 420);
  else b.vy = clamp(b.vy, -520, 760);
  b.y += b.vy*dt;
  b.tilt = gliding ? clamp(b.vy/500, -0.35, 0.55) : clamp(b.vy/700, -0.5, 0.9);
  updateBirdWingCycle(b, dt);
  if(gliding && b.wing<0.6) b.wing = 0.35;
  b.wing = Math.max(0, b.wing - dt*2.2);
  b.flapBoost = Math.max(0, b.flapBoost - dt*3.5);
  b.bodySquash = lerp(b.bodySquash, 1, 1-Math.pow(0.001, dt));
  b.blinkTimer-=dt; if(b.blinkTimer<=0){ b.blink=1; if(b.blinkTimer<-0.12){ b.blink=0; b.blinkTimer=rand(1.8,4.5);} }
  if(b.blink>0 && b.blinkTimer>-0.12) {}
  b.eat=Math.max(0,b.eat-dt*3);
  b.eatPop=Math.max(0,b.eatPop-dt*2.5);
  b.happy=Math.max(0,b.happy-dt*1.8);
  if(game.invuln>0) game.invuln-=dt;
  if(game.shake>0) game.shake=Math.max(0,game.shake-dt*30);
  if(game.flashTime>0) game.flashTime-=dt*2;
  if(game.unlockBanner){
    game.unlockBanner.time -= dt;
    if(game.unlockBanner.time <= 0) game.unlockBanner = null;
  }
  if(game.hazardBanner){
    game.hazardBanner.time -= dt;
    if(game.hazardBanner.time <= 0) game.hazardBanner = null;
  }

  // ground / ceiling collision
  const gy=H*0.80;
  if(b.y + b.r*0.8 > gy){ b.y=gy-b.r*0.8; if(game.invuln<=0){ hitPlayer(); } b.vy=-300; }
  if(b.y - b.r < 0){ b.y=b.r; b.vy=0; }

  game.thermalTimer -= dt;
  if(game.thermalTimer<=0){ spawnThermal(); game.thermalTimer = rand(5, 9); }
  for(let i=game.thermals.length-1;i>=0;i--){
    const t = game.thermals[i];
    t.x -= speed*scrollDt;
    if(b.x>t.x && b.x<t.x+t.w && b.y>t.y && b.y<t.y+t.h){
      b.vy -= 520*dt;
      if(Math.random()<0.25) spawnParticle(b.x, b.y+b.r*0.5, {vx:rand(-20,20), vy:rand(-80,-30), g:80, color:'rgba(255,255,255,0.6)', size:rand(2,4), decay:2});
    }
    if(t.x+t.w<-40) game.thermals.splice(i,1);
  }

  game.spawnTimer-=scrollDt;
  if(game.spawnTimer<=0){ spawnObstacle(); game.spawnTimer=p.spacing*rand(0.85,1.12); }

  const shielded = game.shieldTime>0;
  for(let i=game.obstacles.length-1;i>=0;i--){
    const o=game.obstacles[i];
    o.x -= speed*scrollDt;
    if(o.moving){
      o.gapY += o.gapVy * dt;
      if(o.gapY < o.gapYMin){ o.gapY = o.gapYMin; o.gapVy = Math.abs(o.gapVy); }
      if(o.gapY + o.gapH > o.gapYMax){ o.gapY = o.gapYMax; o.gapVy = -Math.abs(o.gapVy); }
    }
    if(hazardActive() && !o.passed && o.x < W && o.x > -o.w){
      o.debrisTimer -= dt;
      if(o.debrisTimer <= 0){
        spawnDebrisFromPipe(o);
        o.debrisTimer = rand(3.2, 6.5) / (1 + clamp((game.score-100)/350, 0, 0.45));
      }
    }
    checkNearMiss(b, o);
    if(!o.passed && o.x+o.w < b.x){ o.passed=true; onObstaclePassed(o); }
    if(o.x+o.w < -20) game.obstacles.splice(i,1);
    else if(game.invuln<=0 && !shielded){
      if(circleRect(b.x,b.y,b.r*0.78, o.x,0,o.w,o.gapY) ||
         circleRect(b.x,b.y,b.r*0.78, o.x,o.gapY+o.gapH,o.w,H-(o.gapY+o.gapH))){
        hitPlayer();
      }
    }
  }
  for(let i=game.zoneHazards.length-1;i>=0;i--){
    const zh = game.zoneHazards[i];
    zh.x -= speed*scrollDt;
    zh.emerge = Math.min(1, zh.emerge + dt*1.6);
    if(game.intro <= 0) updateZoneHazardAI(zh, b);
    const hb = zoneHazardHitbox(zh);
    if(zh.x + zh.w*0.5 < -60){
      game.zoneHazards.splice(i,1);
      continue;
    }
    if(hb && game.invuln<=0 && !shielded){
      if(circleRect(b.x, b.y, b.r*0.76, hb.x, hb.y, hb.w, hb.h)){
        hitPlayer();
        burst(zh.x, zh.y - zh.h*0.5, '#ff7043', 14);
        game.shake = 10;
      }
    }
  }
  for(let i=game.debris.length-1;i>=0;i--){
    const d = game.debris[i];
    d.x += (d.vx - speed*0.85) * scrollDt;
    d.y += d.vy * dt;
    d.vy += 320 * dt;
    d.rot += d.spin * dt;
    if(d.y > H*0.82 || d.x < -40){
      game.debris.splice(i,1);
      continue;
    }
    if(game.invuln<=0 && !shielded){
      const dx = b.x - d.x, dy = b.y - d.y;
      if(dx*dx + dy*dy < (b.r*0.75 + d.r)*(b.r*0.75 + d.r)){
        hitPlayer();
        burst(d.x, d.y, '#ff7043', 10);
        game.debris.splice(i,1);
      }
    }
  }
  const magnetR = game.magnetTime>0 ? magnetRadius() : 0;
  const perk = getBirdSpec().perk;
  if(state===STATE.PLAY && game.intro<=0 && (perk==='ember'||perk==='neon') && Math.random()<0.35){
    const col = perk==='ember' ? '#ff7043' : '#ea80fc';
    spawnParticle(b.x-b.r*0.5, b.y+rand(-8,8), {vx:-p.speed*0.15, vy:rand(-15,15), g:30, color:col, size:rand(2,4), decay:2, shape:'circle'});
  }
  for(let i=game.foods.length-1;i>=0;i--){
    const f=game.foods[i]; if(f.taken){ continue; }
    f.x -= speed*scrollDt;
    const bobY = Math.sin(game.t*3+f.bob)*4;
    if(magnetR>0 && !f.junk){
      const fy = f.y + bobY;
      const dx=b.x-f.x, dy=b.y-fy, d=Math.sqrt(dx*dx+dy*dy)||1;
      if(d<magnetR){
        f.x += (dx/d)*240*dt;
        f.y += (dy/d)*240*dt;
      }
    }
    const by=f.y + bobY;
    const dx=b.x-f.x, dy=b.y-by;
    if(dx*dx+dy*dy < (b.r*0.85+f.r)*(b.r*0.85+f.r)){
      f.taken=true; game.foods.splice(i,1);
      if(f.junk){
        SFX.bad(); haptic('warning');
        burst(f.x,by,'#ff7043',16);
        game.score=Math.max(0, game.score-3);
        resetCombo();
        game.flashColor='#ff5252'; game.flashTime=0.5; game.shake=8;
        applyJunkWeight();
        b.bodySquash=1.28; b.eat=0.8;
        addFloatText(f.x, by-18, '+вес', '#ff7043', 0.95);
      } else if(f.type==='alarmclock' || f.type==='turboorange'){
        game.foodCollected++;
        bumpCombo();
        b.eat=1; b.eatPop=1.2; b.happy=1;
        if(f.type==='alarmclock'){
          SFX.eat(); haptic('medium');
          eatRings.push({x:f.x,y:by,r:10,life:1,color:'#90caf9'});
          activatePower('chrono');
        } else {
          b.bodySquash=1.22;
          activatePower('nitro');
        }
      } else {
        SFX.eat(); haptic('light');
        spawnEatBurst(f.x, by, f.type==='golden'?'apple':f.type);
        game.foodCollected++;
        bumpCombo();
        b.eat=1; b.eatPop=1; b.happy=1; b.bodySquash=1.14;
        game.targetFat = clamp(game.targetFat - 0.01, game.runMinFat, 1);
        if(f.power==='golden') activatePower('golden');
        else {
          addScore(10, null, f.x, by);
          if(f.power && f.power!=='chrono' && f.power!=='nitro') activatePower(f.power);
          else {
            const roll = powerFromFood(f.type);
            if(roll && Math.random()<0.35) activatePower(roll);
          }
        }
      }
    }
  }
  if(game.nitroTime>0 && Math.random()<0.72){
    spawnParticle(b.x-b.r*0.8, b.y+rand(-10,12), {vx:rand(-420,-180), vy:rand(-35,35), g:25, color:['#ff9800','#ffeb3b','#ff5722'][randi(0,2)], size:rand(4,9), decay:1.5, shape:'circle'});
  }
  if(Math.random()<0.3) spawnParticle(b.x-b.r*0.7, b.y+rand(-6,8), {vx:-speed*0.2,vy:rand(-20,20),g:40,color:'rgba(255,255,255,0.5)',size:rand(1.5,3),decay:2.5});
}

function circleRect(cx,cy,r, rx,ry,rw,rh){
  const nx=clamp(cx,rx,rx+rw), ny=clamp(cy,ry,ry+rh);
  const dx=cx-nx, dy=cy-ny;
  return dx*dx+dy*dy < r*r;
}
function hitPlayer(){
  if(game.invuln>0 || game.shieldTime>0) return;
  resetCombo();
  game.lives--; game.invuln=1.3;
  SFX.hit(); haptic('error');
  game.shake=14; game.flashColor='#ff3b3b'; game.flashTime=0.6;
  burst(game.bird.x,game.bird.y,'#ff5252',20);
  if(game.lives<=0){ gameOver(); }
}
function gameOver(){
  progress.best = Math.max(progress.best, game.score);
  progress.totalFood += game.foodCollected;
  progress.unlocked = Math.max(progress.unlocked, computeUnlockedFromFlights(progress.totalFlights || 0));
  saveProgress(progress);
  notifyParent({
    event:'game_over',
    score: game.score,
    level: progress.unlocked,
    flights: game.flightsPassed,
    fruits: game.foodCollected,
    best: progress.best,
    totalFlights: progress.totalFlights
  });
  state=STATE.OVER; buildOver();
  haptic('error');
}

/* ============================== MAIN LOOP ============================== */
let last=performance.now();
function loop(now){
  let dt=(now-last)/1000; last=now;
  dt=Math.min(dt, 1/30); // clamp big gaps
  game.t += dt;

  // background animation for menu/levels uses game.t
  if(state===STATE.PLAY){ updatePlay(dt); updateParticles(dt); updateFloatTexts(dt); }
  else if(state!==STATE.WIN){ updateParticles(dt); updateFloatTexts(dt); }

  // render
  ctx.save();
  switch(state){
    case STATE.MENU: drawMenu(ctx); break;
    case STATE.LEVELS: drawLevels(ctx); break;
    case STATE.PLAY: renderWorld(ctx,false); break;
    case STATE.OVER: drawOver(ctx); break;
    case STATE.WIN: drawWin(ctx); break;
  }
  ctx.restore();

  requestAnimationFrame(loop);
}

/* ============================== BOOTSTRAP ============================== */
function boot(){
  initTelegram();
  resize();
  try{
    const saved = localStorage.getItem('nutrirun_bird');
    if(saved && BIRD_SPECIES[saved]) selectedBirdId = saved;
  }catch(e){}
  buildMenu();
  state=STATE.MENU;
  const loader=document.getElementById('loader');
  setTimeout(()=>{ loader.classList.add('hidden'); }, 500);
  last=performance.now();
  requestAnimationFrame(loop);
}
window.addEventListener('load', boot);
// also try immediately in case load already fired
if(document.readyState==='complete') boot();
</script>
